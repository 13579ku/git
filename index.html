function useBattleItem(id){
  useItem(id);updateBattleUI();addBattleLog(`使用了 ${ITEMS[id].name}`,'player-action');
  $('skill-submenu').classList.remove('active');
  setTimeout(()=>enemyTurn(),600);
}

function getEffectiveDef(target,isEnemy){
  let def=isEnemy?battleState.enemy.def:player.def;
  const buffs=isEnemy?battleState.enemy.buffs:player.buffs;
  buffs.forEach(b=>{if(b.key==='defBuff')def+=def*b.val});
  buffs.forEach(b=>{if(b.key==='swordParry')def+=def*b.val});
  buffs.forEach(b=>{if(b.key==='thunderStrike')def-=def*b.val});
  buffs.forEach(b=>{if(b.key==='ironShirt')def+=def*b.val});
  return Math.max(def,0);
}

function getEffectiveAtk(isEnemy){
  let atk=isEnemy?battleState.enemy.atk:player.atk;
  const buffs=isEnemy?battleState.enemy.buffs:player.buffs;
  buffs.forEach(b=>{if(b.key==='flamePalm')atk+=atk*b.val});
  buffs.forEach(b=>{if(b.key==='nineYang')atk+=atk*b.val});
  buffs.forEach(b=>{if(b.key==='eagleEye')atk+=atk*b.val});
  buffs.forEach(b=>{if(b.key==='thunderStrike')atk-=atk*b.val});
  return Math.max(atk,1);
}

function getDodgeChance(isEnemy){
  const buffs=isEnemy?battleState.enemy.buffs:player.buffs;
  let dodge=0;
  buffs.forEach(b=>{if(b.key==='dodge')dodge+=b.val});
  buffs.forEach(b=>{if(b.key==='smoke')dodge+=b.val});
  buffs.forEach(b=>{if(b.key==='cloudStep')dodge+=b.val});
  return dodge;
}

function tickBuffs(isEnemy){
  const target=isEnemy?battleState.enemy:player;
  const buffs=target.buffs;
  
  if(isEnemy&&battleState.enemy.poison&&battleState.enemy.poison.length>0){
    let totalPdmg=0;
    for(let i=battleState.enemy.poison.length-1;i>=0;i--){
      battleState.enemy.poison[i].turns--;
      totalPdmg+=battleState.enemy.poison[i].dmg;
      if(battleState.enemy.poison[i].turns<=0){
        battleState.enemy.poison.splice(i,1);
      }
    }
    if(totalPdmg>0){
      battleState.enemy.hp=Math.max(battleState.enemy.hp-totalPdmg,0);
      addBattleLog(`${battleState.enemy.name} 受到 ${totalPdmg} 点毒伤！(${battleState.enemy.poison.length}层)`,'system');
      showDamageFloat($('enemy-sprite'),totalPdmg,false,'poison');
    }
  }
  
  if(!isEnemy&&player.poison&&player.poison.length>0){
    let totalPdmg=0;
    for(let i=player.poison.length-1;i>=0;i--){
      player.poison[i].turns--;
      totalPdmg+=player.poison[i].dmg;
      if(player.poison[i].turns<=0){
        player.poison.splice(i,1);
      }
    }
    if(totalPdmg>0){
      player.hp=Math.max(player.hp-totalPdmg,0);
      addBattleLog(`你受到 ${totalPdmg} 点毒伤！(${player.poison.length}层)`,'system');
      showDamageFloat($('player-sprite'),totalPdmg,false,'poison');
    }
  }
  
  for(let i=buffs.length-1;i>=0;i--){
    buffs[i].dur--;
    if(buffs[i].dur<=0)buffs.splice(i,1);
  }
}

function playerAttack(sid){
  const s=SKILLS[sid];
  if(player.mp<s.mp){addBattleLog('内力不足！','system');return}
  player.mp-=s.mp;$('skill-submenu').classList.remove('active');hideTip();

  // Self-damage mechanic (mad_blade)
  if(s.selfDmg){
    const selfCost=Math.floor(player.hp*s.selfDmg);
    player.hp=Math.max(player.hp-selfCost,1);
    addBattleLog(`${s.name} 消耗了 ${selfCost} 生命！`,'system');
    showDamageFloat($('player-sprite'),selfCost,false);
  }

  const eDodge=getDodgeChance(false);

  if(s.type==='heal'){
    const heal=Math.floor(player.maxHp*s.healMult+player.atk*.3);
    player.hp=Math.min(player.hp+heal,player.maxHp);
    addBattleLog(`施展 ${s.name}，恢复 ${heal} 生命！`,'player-action');
    showDamageFloat($('player-sprite'),heal,true);
    showHealEffect('player-sprite');
    if(s.mpRestore){
      const mpHeal=Math.floor(player.maxMp*s.mpRestore);
      player.mp=Math.min(player.mp+mpHeal,player.maxMp);
      addBattleLog(`同时恢复了 ${mpHeal} 点内力！`,'system');
    }
    if(s.curePoison&&player.poison){
      player.poison=null;
      addBattleLog(`清除了毒伤！`,'system');
    }
    if(s.selfBuff){
      player.buffs.push({key:s.selfBuff.key,val:s.selfBuff.atkMult,dur:s.selfBuff.dur,icon:s.icon,name:s.name});
      addBattleLog(`${s.name} 的力量加持了你！`,'system');
    }
  }else if(s.type==='debuff'){
    battleState.enemy.buffs.push({key:s.debuffKey,val:s.debuffVal,dur:s.debuffDur,icon:s.icon,name:s.name});
    addBattleLog(`你施展 ${s.name}！${battleState.enemy.name} 被削弱了！`,'player-action');
    showSkillEffect(sid,'enemy-sprite');
  }else if(s.type==='buff'){
    player.buffs.push({key:s.buffKey,val:s.buffVal,dur:s.buffDur,icon:s.icon,name:s.name});
    if(s.buffKey==='nextAtk')player.buffNextAtk=s.buffVal;
    addBattleLog(`施展 ${s.name}！${s.desc||s.flavor||''}`,'player-action');
    showSkillEffect(sid,'player-sprite');
  }else if(s.type==='multi'){
    let totalDmg=0;
    const hits=s.hits||1;
    let hitsRemaining=hits;
    const critRate=s.critRate||0.15;
    
    function doHit(){
      if(hitsRemaining<=0){
        battleState.enemy.hp=Math.max(battleState.enemy.hp-totalDmg,0);
        addBattleLog(`${s.name} 连击 ${hits} 次，共造成 ${totalDmg} 伤害！`,'player-action');
        showDamageFloat($('enemy-sprite'),totalDmg,false);
        showSkillEffect(sid,'enemy-sprite');
        applyWeaponBonus(totalDmg);
        finishAttack();
        return;
      }
      
      const canDodge=s.ignoreDodge?false:(Math.random()*100<eDodge);
      if(canDodge){
        showDamageFloat($('enemy-sprite'),0,false,'miss');
      }else{
        const eDef=getEffectiveDef(battleState.enemy,true);
        const pierceVal=s.pierce||0;
        let dmg=Math.floor((getEffectiveAtk(false)*s.mult-eDef*.5*(1-pierceVal))*player.buffNextAtk);
        dmg=Math.max(dmg,1);
        
        if(s.lastHitCrit&&hitsRemaining===1){
          dmg=Math.floor(dmg*1.5);
          addBattleLog('最后一击暴击！','system');
        }else if(Math.random()<critRate){
          dmg=Math.floor(dmg*1.5);
          addBattleLog('暴击！','system');
        }
        
        totalDmg+=dmg;
        showDamageFloat($('enemy-sprite'),dmg,false);
        showHitEffect('enemy-sprite');
        
        if(s.poison){
          if(!s.poisonChance||Math.random()<s.poisonChance){
            if(!battleState.enemy.poison)battleState.enemy.poison=[];
            battleState.enemy.poison.push({dmg:s.poison.dmg,turns:s.poison.turns});
            if(battleState.enemy.poison.length>10){
              battleState.enemy.poison.shift();
            }
            addBattleLog(`${battleState.enemy.name} 中毒了！(毒伤${battleState.enemy.poison.length}层)`,'system');
          }
        }
      }
      
      hitsRemaining--;
      setTimeout(doHit,180);
    }
    
    addBattleLog(`施展 ${s.name}！`,'player-action');
    doHit();
    return;
  }else if(s.type==='drain'){
    if(Math.random()*100<eDodge){addBattleLog(`${s.name} 被闪避了！`,'system');showDamageFloat($('enemy-sprite'),0,false,'miss')}
    else{
      const eDef=getEffectiveDef(battleState.enemy,true);
      const pierceVal=s.pierce||0;
      let dmg=Math.floor((getEffectiveAtk(false)*s.mult-eDef*.5*(1-pierceVal))*player.buffNextAtk);
      player.buffNextAtk=1;dmg=Math.max(dmg,1);
      if(Math.random()<.15){dmg=Math.floor(dmg*1.5);addBattleLog('暴击！','system')}
      battleState.enemy.hp=Math.max(battleState.enemy.hp-dmg,0);
      const heal=Math.floor(dmg*(s.selfHeal||.3));
      player.hp=Math.min(player.hp+heal,player.maxHp);
      addBattleLog(`${s.name} 造成 ${dmg} 伤害，吸取 ${heal} 生命！`,'player-action');
      showDamageFloat($('enemy-sprite'),dmg,false);
      showSkillEffect(sid,'enemy-sprite');
      showDamageFloat($('player-sprite'),heal,true);
    }
  }else{
    if(Math.random()*100<eDodge){addBattleLog(`攻击被闪避了！`,'system');showDamageFloat($('enemy-sprite'),0,false,'miss')}
    else{
      const eDef=getEffectiveDef(battleState.enemy,true);
      const pierceVal=s.pierce||0;
      let dmg=Math.floor((getEffectiveAtk(false)*s.mult-eDef*.5*(1-pierceVal))*player.buffNextAtk);
      if(player.buffNextAtk>1)addBattleLog('蓄势一击！','system');
      player.buffNextAtk=1;dmg=Math.max(dmg,1);
      if(Math.random()<.15){dmg=Math.floor(dmg*1.5);addBattleLog('暴击！','system')}
      battleState.enemy.hp=Math.max(battleState.enemy.hp-dmg,0);
      addBattleLog(`${s.name} 造成 ${dmg} 伤害！`,'player-action');
      showDamageFloat($('enemy-sprite'),dmg,false);
      showSkillEffect(sid,'enemy-sprite');
      if(s.poison){
        if(!battleState.enemy.poison)battleState.enemy.poison=[];
        battleState.enemy.poison.push({dmg:s.poison.dmg,turns:s.poison.turns});
        if(battleState.enemy.poison.length>10){
          battleState.enemy.poison.shift();
        }
        addBattleLog(`${battleState.enemy.name} 中毒了！(毒伤${battleState.enemy.poison.length}层)`,'system');
      }
      // Stun mechanic
      if(s.stun&&Math.random()<s.stun){
        battleState.enemy.stunned=true;
        addBattleLog(`${battleState.enemy.name} 被眩晕了！将跳过下一回合`,'system');
      }
      // Weapon drain bonus
      applyWeaponBonus(dmg);
      // Weapon poisonHit bonus
      applyWeaponPoisonHit();
      // Skill drain bonus
      if(s.drain){
        const drainHeal=Math.floor(dmg*s.drain);
        player.hp=Math.min(player.hp+drainHeal,player.maxHp);
        addBattleLog(`吸取了 ${drainHeal} 生命！`,'player-action');
        showDamageFloat($('player-sprite'),drainHeal,true);
      }
    }
  }

  updateBattleUI();updateUI();
  if(battleState.enemy.hp<=0){setTimeout(()=>endBattle(true),800);return}
  
  battleState.playerCharge=0;
  updateBattleUI();
  
  if(battleState.enemyCharge>=100){
    $('battle-actions').innerHTML='<div style="color:#776644;font-size:13px">敌方回合...</div>';
    setTimeout(()=>enemyTurn(),800);
  }else{
    $('battle-actions').innerHTML='<div style="color:#776644;font-size:13px">集气中...</div>';
    startChargeTick();
  }
}

function finishAttack(){
  updateBattleUI();updateUI();
  if(battleState.enemy.hp<=0){setTimeout(()=>endBattle(true),800);return}
  
  battleState.playerCharge=0;
  updateBattleUI();
  
  if(battleState.enemyCharge>=100){
    $('battle-actions').innerHTML='<div style="color:#776644;font-size:13px">敌方回合...</div>';
    setTimeout(()=>enemyTurn(),800);
  }else{
    $('battle-actions').innerHTML='<div style="color:#776644;font-size:13px">集气中...</div>';
    startChargeTick();
  }
}

function applyWeaponBonus(dmg){
  const wEid=player.equipment.weapon;
  if(!wEid)return;
  const eq=EQUIPMENT[wEid];
  if(eq.drain){
    const heal=Math.floor(dmg*eq.drain);
    if(heal>0){
      player.hp=Math.min(player.hp+heal,player.maxHp);
      addBattleLog(`武器吸血 ${heal} 生命！`,'player-action');
      showDamageFloat($('player-sprite'),heal,true);
    }
  }
}

function applyWeaponPoisonHit(){
  const wEid=player.equipment.weapon;
  if(!wEid)return;
  const eq=EQUIPMENT[wEid];
  if(eq.poisonHit){
    if(!battleState.enemy.poison)battleState.enemy.poison=[];
    battleState.enemy.poison.push({dmg:eq.poisonHit.dmg,turns:eq.poisonHit.turns});
    if(battleState.enemy.poison.length>10){
      battleState.enemy.poison.shift();
    }
    addBattleLog(`武器附带毒伤！${battleState.enemy.name} 中毒了！(毒伤${battleState.enemy.poison.length}层)`,'system');
  }
}

function applyReflectDamage(dmg){
  let reflectDmg=0;
  let counterIndex=-1;
  for(let i=0;i<player.buffs.length;i++){
    const b=player.buffs[i];
    if(b.reflect){
      reflectDmg+=Math.floor(dmg*b.reflect);
    }
    if(b.key==='counter'){
      reflectDmg+=Math.floor(dmg*b.val);
      counterIndex=i;
    }
  }
  if(reflectDmg>0){
    battleState.enemy.hp=Math.max(battleState.enemy.hp-reflectDmg,0);
    addBattleLog(`反弹了 ${reflectDmg} 伤害！`,'system');
    showDamageFloat($('enemy-sprite'),reflectDmg,false);
    if(counterIndex>-1){
      player.buffs.splice(counterIndex,1);
    }
  }
}

function enemyTurn(){
  if(battleState.finished)return;
  battleState.turnCount++;
  tickBuffs(true);
  if(battleState.enemy.hp<=0){setTimeout(()=>endBattle(true),600);return}

  // Stun check - stunned enemies skip their turn
  if(battleState.enemy.stunned){
    battleState.enemy.stunned=false;
    addBattleLog(`${battleState.enemy.name} 处于眩晕状态，跳过了回合！`,'system');
    tickBuffs(false);
    updateBattleUI();updateUI();
    if(player.hp<=0){setTimeout(()=>endBattle(false),800);return}
    setTimeout(()=>showPlayerActions(),400);
    return;
  }

  const e=battleState.enemy;
  const pDodge=getDodgeChance(false);

  let availableSkills=e.skills.filter(sid=>{
    const skill=SKILLS[sid];
    return skill&&(!skill.mp||e.mp>=skill.mp);
  });

  if(availableSkills.length===0){
    const mpRecover=Math.floor(e.maxMp*0.2);
    e.mp=Math.min(e.mp+mpRecover,e.maxMp);
    addBattleLog(`${e.name} 调息，恢复 ${mpRecover} 内力！`,'enemy-action');
  }else{
    let selectedSkillId=null;
    const hpPercent=e.hp/e.maxHp;
    
    if(hpPercent<0.3){
      const healSkills=availableSkills.filter(sid=>SKILLS[sid].type==='heal');
      if(healSkills.length>0){
        selectedSkillId=healSkills[Math.floor(Math.random()*healSkills.length)];
      }
    }
    
    if(!selectedSkillId){
      selectedSkillId=availableSkills[Math.floor(Math.random()*availableSkills.length)];
    }
    
    const s=SKILLS[selectedSkillId];
    e.mp-=s.mp||0;
    
    if(s.type==='heal'){
      const heal=Math.floor(e.maxHp*s.healMult);e.hp=Math.min(e.hp+heal,e.maxHp);
      addBattleLog(`${e.name} 施展 ${s.name}，恢复 ${heal} 生命！`,'enemy-action');
      showDamageFloat($('enemy-sprite'),heal,true);
    }else if(s.type==='buff'){
      e.buffs.push({key:s.buffKey,val:s.buffVal,dur:s.buffDur,icon:s.icon,name:s.name});
      addBattleLog(`${e.name} 施展 ${s.name}！`,'enemy-action');
    }else if(s.type==='debuff'){
      player.buffs.push({key:s.debuffKey,val:s.debuffVal,dur:s.debuffDur,icon:s.icon,name:s.name});
      addBattleLog(`${e.name} 施展 ${s.name}！你被削弱了！`,'enemy-action');
      $('player-sprite').classList.add('flash');setTimeout(()=>$('player-sprite').classList.remove('flash'),300);
    }else if(s.type==='drain'){
      if(Math.random()*100<pDodge){addBattleLog(`敌方攻击被你闪避了！`,'system');showDamageFloat($('player-sprite'),0,false,'miss')}
      else{
        let dmg=Math.floor(getEffectiveAtk(true)*(s.mult||1)-getEffectiveDef(player,false)*.4);dmg=Math.max(dmg,1);
        if(Math.random()<.1){dmg=Math.floor(dmg*1.5);addBattleLog('敌方暴击！','system')}
        player.hp=Math.max(player.hp-dmg,0);
        const heal=Math.floor(dmg*(s.selfHeal||.3));e.hp=Math.min(e.hp+heal,e.maxHp);
        addBattleLog(`${e.name} 施展 ${s.name}，造成 ${dmg} 伤害并吸取 ${heal} 生命！`,'enemy-action');
        showDamageFloat($('player-sprite'),dmg,false);$('player-sprite').classList.add('shake');setTimeout(()=>$('player-sprite').classList.remove('shake'),400);
        applyReflectDamage(dmg);
      }
    }else{
      if(Math.random()*100<pDodge){addBattleLog(`敌方攻击被你闪避了！`,'system');showDamageFloat($('player-sprite'),0,false,'miss')}
      else{
        let dmg=Math.floor(getEffectiveAtk(true)*(s.mult||1)-getEffectiveDef(player,false)*.4);dmg=Math.max(dmg,1);
        if(Math.random()<.1){dmg=Math.floor(dmg*1.5);addBattleLog('敌方暴击！','system')}
        player.hp=Math.max(player.hp-dmg,0);
        addBattleLog(`${e.name} 施展 ${s.name}，造成 ${dmg} 伤害！`,'enemy-action');
        showDamageFloat($('player-sprite'),dmg,false);$('player-sprite').classList.add('shake');setTimeout(()=>$('player-sprite').classList.remove('shake'),400);
        applyReflectDamage(dmg);
        if(s.poison){addBattleLog('你中毒了！(暂不影响)','system')}
      }
    }
  }

  tickBuffs(false);
  updateBattleUI();updateUI();
  if(player.hp<=0){setTimeout(()=>endBattle(false),800);return}
  
  battleState.enemyCharge=0;
  updateBattleUI();
  
  if(battleState.playerCharge>=100){
    showPlayerActions();
  }else{
    startChargeTick();
  }
}

function tryFlee(){
  const chance=.4+(player.spd-battleState.enemy.spd)*.05;
  if(Math.random()<Math.max(chance,.2)){
    addBattleLog('成功逃脱！','system');addLog('从战斗中逃脱','');battleState.finished=true;
    setTimeout(()=>{$('battle-screen').style.display='none';goScene(currentScene)},600);
  }else{
    addBattleLog('逃跑失败！','system');
    $('battle-actions').innerHTML='<div style="color:#776644;font-size:13px">敌方回合...</div>';
    setTimeout(()=>enemyTurn(),600);
  }
}

function endBattle(won){
  battleState.finished=true;const e=battleState.enemy;
  if(won){
    addBattleLog(`击败了 ${e.name}！`,'system');
    addBattleLog(`+${e.exp}经验 +${e.gold}银两`,'system');
    addLog(`击败 ${e.name} ${e.exp}经验 ${e.gold}银两`,'important');
    player.exp+=e.exp;player.gold+=e.gold;

    if(e.loot&&Math.random()<.5){
      const eq=EQUIPMENT[e.loot];
      if(eq&&!player.equipInventory.includes(e.loot)&&!Object.values(player.equipment).includes(e.loot)){
        player.equipInventory.push(e.loot);
        addBattleLog(`掉落了 ${eq.icon} ${eq.name}！`,'system');
        addLog(`获得 ${eq.icon} ${eq.name}`,'loot');
        showItemPopup('equipment',eq);
      }
    }

    if(currentScene==='forest')gameFlags.forestWins=(gameFlags.forestWins||0)+1;
    if(currentScene==='mountain')gameFlags.mountainWins=(gameFlags.mountainWins||0)+1;
    if(e.id==='elder')gameFlags.clearedCave=true;
    
    if(!gameFlags.firstBattleReward){
      const wt=player.startWeaponType||'sword';
      const xuanAttackSkills=Object.keys(SKILLS).filter(sid=>{
        const s=SKILLS[sid];
        return s.tier==='xuan'&&s.type==='attack'&&s.reqWeapon===wt&&!player.skills.includes(sid);
      });
      if(xuanAttackSkills.length>0){
        const randomSkill=xuanAttackSkills[Math.floor(Math.random()*xuanAttackSkills.length)];
        player.skills.push(randomSkill);
        autoEquipSkill(randomSkill);
        const s=SKILLS[randomSkill];
        addLog(`获得 ${s.icon} ${s.name}！`,'skill');
        showItemPopup('skill',s);
      }
      gameFlags.firstBattleReward=true;
    }
    if(e.id==='sword_ghost'){
      gameFlags.defeatedSwordGhost=true;
      if(!player.skills.includes('ice_sword')){player.skills.push('ice_sword');autoEquipSkill('ice_sword');addLog('从无名剑客的剑意中领悟了寒冰剑意！','skill')}
      if(!player.skills.includes('falling_bloom')){player.skills.push('falling_bloom');autoEquipSkill('falling_bloom');addLog('领悟了落英神剑！','skill')}
      player.baseAtk+=3;recalcStats();
      addLog('剑道境界提升，攻击力永久+3！','important');
    }
    if(e.id==='poison_king'){
      gameFlags.defeatedPoisonKing=true;
      if(!player.skills.includes('poison_palm')){player.skills.push('poison_palm');autoEquipSkill('poison_palm');addLog('从五毒老祖的毒术中领悟了毒砂掌！','skill')}
      if(gameFlags.herbQuestAccepted&&!gameFlags.herbQuestDone){
        gameFlags.herbQuestDone=true;
        addLog('取得了万毒经，可以回去交差了','important');
      }
    }
    if(e.id==='shadow_lord'){
      gameFlags.defeatedShadowLord=true;
      if(!player.skills.includes('dugu')){player.skills.push('dugu');autoEquipSkill('dugu');addLog('从暗影之主的剑法中领悟了独孤九剑！','skill')}
      player.baseAtk+=5;player.baseDef+=3;player.baseSpd+=3;recalcStats();
      addLog('击败暗影之主！全属性大幅提升！','important');
    }
    if(e.id==='wolf_king'){
      gameFlags.wolfKingDefeated=true;
      addLog('击败了狼王银牙！','important');
    }
    if(e.id==='herb_guard'){
      gameFlags.herbGuardDefeated=true;
      if(!gameFlags.herbQuestDone){
        gameFlags.herbQuestDone=true;
        addLog('采集到了灵芝仙草，可以回去复命了','important');
      }
    }

    // === Chapter 2 endBattle handlers ===
    // Tournament fights
    if(['tournament_fighter','blade_master','tournament_champ'].includes(e.id) && gameFlags.c2_started && !gameFlags.c2_tournamentDone){
      gameFlags.c2_tournamentRound=(gameFlags.c2_tournamentRound||0)+1;
      if(gameFlags.c2_tournamentRound>=3){
        gameFlags.c2_tournamentDone=true;
        addLog('英雄大会比武冠军！','important');
        if(!player.skills.includes('ch2_palm')){player.skills.push('ch2_palm');autoEquipSkill('ch2_palm');addLog('观摩群雄武艺，领悟了大金刚掌！','skill')}
        player.gold+=300;

function endBattleTransition(scene){
  if(player.exp>=player.expNext){
    setTimeout(()=>{
      levelUp();
      // store target scene for after level up overlay
      battleState._nextScene=scene;
    },800);
  }else{
    $('battle-screen').style.display='none';
    if(scene)goScene(scene);
    updateUI();
  }
}

function levelUp(){
  if(player.level>=25){
    player.exp=player.expNext; // cap exp at max level
    $('battle-screen').style.display='none';goScene(currentScene);updateUI();
    return;
  }
  player.level++;player.exp-=player.expNext;
  player.expNext=Math.floor(100+player.level*50+player.level*player.level*3);
  const hg=15+Math.floor(Math.random()*11)+Math.floor(player.level*0.5);
  const mg=8+Math.floor(Math.random()*8)+Math.floor(player.level*0.3);
  const ag=2+Math.floor(Math.random()*2),dg=1+Math.floor(Math.random()*2),sg=1+Math.floor(Math.random()*2);
  player.baseAtk+=ag;player.baseDef+=dg;player.baseSpd+=sg;
  recalcStats();
  player.maxHp=100+((player.level-1)*22);player.maxMp=50+((player.level-1)*12);
  recalcStats();
  player.hp=player.maxHp;player.mp=player.maxMp;

  let ns=null;
  const wt=getWeaponType();
  if(player.level===2&&!player.skills.includes('heal')){player.skills.push('heal');ns=SKILLS.heal;autoEquipSkill('heal')}
  if(player.level===3&&!player.skills.includes('wind_blade')&&wt==='sword'){player.skills.push('wind_blade');ns=SKILLS.wind_blade;autoEquipSkill('wind_blade')}
  if(player.level===3&&!player.skills.includes('flame_blade')&&wt==='blade'){player.skills.push('flame_blade');ns=SKILLS.flame_blade;autoEquipSkill('flame_blade')}
  if(player.level===3&&!player.skills.includes('poison_palm')&&wt==='hidden'){player.skills.push('poison_palm');ns=SKILLS.poison_palm;autoEquipSkill('poison_palm')}
  if(player.level===3&&!player.skills.includes('shadow')&&!ns){player.skills.push('shadow');ns=SKILLS.shadow;autoEquipSkill('shadow')}
  if(player.level===5&&!player.skills.includes('thunder')){player.skills.push('thunder');ns=SKILLS.thunder;autoEquipSkill('thunder')}
  if(player.level===6&&!player.skills.includes('golden_bell')){player.skills.push('golden_bell');ns=SKILLS.golden_bell;autoEquipSkill('golden_bell')}
  if(player.level===8&&!player.skills.includes('ripple_walk')){player.skills.push('ripple_walk');ns=SKILLS.ripple_walk;autoEquipSkill('ripple_walk')}
  if(player.level===10&&wt==='sword'&&!player.skills.includes('sword_qi')){player.skills.push('sword_qi');ns=SKILLS.sword_qi;autoEquipSkill('sword_qi')}
  if(player.level===10&&wt==='blade'&&!player.skills.includes('blade_blood')){player.skills.push('blade_blood');ns=SKILLS.blade_blood;autoEquipSkill('blade_blood')}
  if(player.level===10&&wt==='hidden'&&!player.skills.includes('hidden_ice')){player.skills.push('hidden_ice');ns=SKILLS.hidden_ice;autoEquipSkill('hidden_ice')}
  if(player.level===12&&!player.skills.includes('nine_yang')){player.skills.push('nine_yang');ns=SKILLS.nine_yang;autoEquipSkill('nine_yang')}
  if(player.level===15&&wt==='sword'&&!player.skills.includes('sword_heaven')){player.skills.push('sword_heaven');ns=SKILLS.sword_heaven;autoEquipSkill('sword_heaven')}
  if(player.level===15&&wt==='blade'&&!player.skills.includes('blade_destroy')){player.skills.push('blade_destroy');ns=SKILLS.blade_destroy;autoEquipSkill('blade_destroy')}
  if(player.level===15&&wt==='hidden'&&!player.skills.includes('hidden_shadow')){player.skills.push('hidden_shadow');ns=SKILLS.hidden_shadow;autoEquipSkill('hidden_shadow')}
  if(player.level===18&&!player.skills.includes('north_sea')){player.skills.push('north_sea');ns=SKILLS.north_sea;autoEquipSkill('north_sea')}
  // Give basic skills for current weapon type if missing
  if(wt==='blade'&&!player.skills.includes('basic_blade')){player.skills.push('basic_blade')}
  if(wt==='hidden'&&!player.skills.includes('basic_hidden')){player.skills.push('basic_hidden')}

  let info=`等级 ${player.level}<br>生命 +${hg} → ${player.maxHp}<br>内力 +${mg} → ${player.maxMp}<br>攻击 +${ag} → ${player.atk}<br>防御 +${dg} → ${player.def}<br>集气 +${sg} → ${player.spd}`;
  if(ns){info+=`<br><br>领悟新武学: <span>${ns.icon} ${ns.name}</span>`;addLog(`领悟了 ${ns.name}！`,'skill')}
  $('levelup-info').innerHTML=info;$('levelup-overlay').classList.add('active');
  addLog(`升级到 ${player.level} 级！`,'important');updateUI();
}

function closeLevelUp(){
  $('levelup-overlay').classList.remove('active');
  if(player.exp>=player.expNext)setTimeout(()=>levelUp(),300);
  else{
    $('battle-screen').style.display='none';
    const next=battleState?battleState._nextScene:null;
    if(battleState)battleState._nextScene=null;
    if(next)goScene(next);else goScene(currentScene);
    updateUI();
  }
}

  const title=titles[Math.min(player.level-1,titles.length-1)]||'不朽传说';
  let ending='';let endingTitle='';

  // Count total achievements
  let achCount=0;
  const achList=[];

  // Chapter 1 achievements
  if(gameFlags.girlAlive&&gameFlags.girlHelped&&gameFlags.caveListened){achCount+=3;achList.push('苏小蝶是你最坚定的盟友')}
  else if(gameFlags.girlAlive){achCount+=1;achList.push('苏小蝶虽在却渐行渐远')}
  if(gameFlags.blacksmithOre)achList.push('铁匠老赵为你打造了稀有兵器');
  if(gameFlags.defeatedSwordGhost){achList.push('剑冢无名剑客被你击败');achCount++}
  if(gameFlags.defeatedPoisonKing){achList.push('你征服了五毒谷');achCount++}
  if(gameFlags.defeatedShadowLord){achList.push('你揭露了暗影组织');achCount+=2}

  // Chapter 2 achievements
  if(gameFlags.c2_tournamentDone){achList.push('英雄大会冠军');achCount++}
  if(gameFlags.c2_defeatedCultLeader){achList.push('铲除了魔教余孽');achCount++}
  if(gameFlags.c2_defeatedSecretKeeper){achList.push('通过了千年守秘人考验');achCount+=2}
  if(gameFlags.c2_banditCleared)achList.push('清剿了洛阳古道匪患');
  if(gameFlags.c2_ghostDone)achList.push('降服了荒宅鬼王');
  if(gameFlags.c2_arenaCleared){achList.push('地下竞技场冠军');achCount++}

  // Chapter 3 achievements
  if(gameFlags.c3_defeatedFinalBoss){achList.push('封印了天魔');achCount+=3}
  if(gameFlags.c3_defeatedPrimordial){achList.push('获得了太古神将传承');achCount+=3}
  if(gameFlags.c3_banditKingDone)achList.push('讨伐了天山匪王');
  if(gameFlags.c3_ruinDone){achList.push('通过了远古遗迹试炼');achCount++}

  // Determine ending based on total achievements
  if(achCount>=15){
    endingTitle='完美结局 · 千古传奇';
    ending=`<br><br>🌟 你的功绩前无古人，后无来者。从清风镇的无名侠客，到天山顶峰的绝世强者。`;
    ending+=`<br>天魔被封印，魔教被铲除，江湖恢复了太平。你的名字被刻在了武林史册的最前列。`;
    if(gameFlags.girlAlive&&gameFlags.girlHelped)
      ending+=`<br>苏小蝶与你携手，共同书写了这段传奇。`;
    ending+=`<br><br>「千古之下，唯你一人而已。」`;
  }else if(achCount>=10){
    endingTitle='辉煌结局 · 一代宗师';
    ending=`<br><br>⭐ 你成功封印了天魔，拯救了天下苍生。虽有些许遗憾，但你已是当之无愧的一代宗师。`;
    ending+=`<br>江湖上留下了你的无数传说，后人将永远铭记你的名字。`;
    ending+=`<br><br>「大侠者，为国为民。你做到了。」`;
  }else if(achCount>=6){
    endingTitle='英雄结局 · 名震江湖';
    ending=`<br><br>你击败了天魔，成为了江湖上的英雄。虽然路途上有过迷茫和遗憾，但最终你完成了使命。`;
    ending+=`<br>也许有些故事没有完美结局，但这正是江湖的魅力。`;
    ending+=`<br><br>「江湖路远，来日方长。」`;
  }else{
    endingTitle='平凡结局 · 功成身退';
    ending=`<br><br>你完成了使命，封印了天魔。但一路上错过了太多，留下了不少遗憾。`;
    ending+=`<br>你选择默默离开，回到清风镇，过上普通人的生活。偶尔想起那些江湖往事，恍如隔世。`;
    ending+=`<br><br>「平平淡淡才是真。」`;
  }

  let summary=`<b style="color:#ffd700;font-size:20px">${endingTitle}</b><br><br>`;
  summary+=`最终等级: Lv.${player.level} · ${title}<br><br>`;
  summary+=`<span style="color:#daa520">— 成就 —</span><br>`;
  achList.forEach(a=>summary+=`${a}<br>`);
  summary+=ending;
  summary+=`<br><br><span style="color:#ffd700">「${player.name}」之名，从此响彻武林！</span>`;

  $('victory-summary').innerHTML=summary;
  $('victory-overlay').classList.add('active');
}

// ======================= SAVE / LOAD SYSTEM =======================
const SAVE_KEY='wuxia_rpg_saves';
const MAX_SLOTS=3;
let saveMode='save'; // 'save' or 'load'

let _memSaves=null; // in-memory fallback when localStorage unavailable
function _lsOk(){try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true}catch(e){return false}}

function getAllSaves(){
  if(_lsOk()){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{}}catch(e){return{}}}
  if(_memSaves)return JSON.parse(JSON.stringify(_memSaves));
  return{};
}
function writeAllSaves(data){
  if(_lsOk()){try{localStorage.setItem(SAVE_KEY,JSON.stringify(data));return}catch(e){}}
  _memSaves=JSON.parse(JSON.stringify(data));
}

function exportSave(){
  const data=getAllSaves();
  if(!Object.keys(data).length){showToast('\u6ca1\u6709\u5b58\u6863\u53ef\u5bfc\u51fa','warn');return}
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='\u6c5f\u6e56\u884c_\u5b58\u6863_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('\u5b58\u6863\u5df2\u5bfc\u51fa','success');
}
function importSave(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        if(!data||typeof data!=='object')throw new Error('bad');
        writeAllSaves(data);
        renderSaveSlots();checkContinueBtn();
        showToast('\u5b58\u6863\u5bfc\u5165\u6210\u529f','success');
      }catch(err){showToast('\u6587\u4ef6\u683c\u5f0f\u9519\u8bef','warn')}
    };
    reader.readAsText(f);
  };
  inp.click();
}

function buildSaveData(slot){
  return {
    player:JSON.parse(JSON.stringify(player)),
    gameFlags:JSON.parse(JSON.stringify(gameFlags)),
    currentScene:currentScene,
    logEntries:logEntries.slice(0,40),
    slot:slot,
    time:new Date().toLocaleString('zh-CN'),
    ts:Date.now()
  };
}

function saveGame(slot){
  const data=getAllSaves();
  data[slot]=buildSaveData(slot);
  writeAllSaves(data);
  showToast('存档成功 — 档位 '+slot,'success');
  addLog('游戏已存档至档位 '+slot,'important');
  renderSaveSlots();
}

function loadGame(slot){
  const data=getAllSaves();
  if(!data[slot]){showToast('该档位无存档','warn');return false}
  const save=data[slot];
  player=save.player;
  
  if(!player.equippedWeaponSkills)player.equippedWeaponSkills=[];
  if(!player.equippedInnerSkills)player.equippedInnerSkills=[];
  if(!player.startWeaponType){
    const wt=getWeaponType();
    player.startWeaponType=wt;
  }
  if(!player.poison)player.poison=[];
  
  gameFlags=save.gameFlags;
  currentScene=save.currentScene;
  logEntries.length=0;
  if(save.logEntries)save.logEntries.forEach(e=>logEntries.push(e));
  recalcStats();
  return true;
}

function deleteSave(slot){
  const data=getAllSaves();
  if(!data[slot])return;
  delete data[slot];
  writeAllSaves(data);
  showToast('已删除档位 '+slot,'info');
  renderSaveSlots();
}

function hasAnySave(){
  const data=getAllSaves();
  return Object.keys(data).length>0;
}

function getLatestSave(){
  const data=getAllSaves();
  let latest=null;
  for(let k in data){if(!latest||(data[k].ts||0)>(latest.ts||0))latest=data[k]}
  return latest;
}

function showToast(msg,type='info'){
  const t=$('save-toast');
  t.textContent=msg;
  t.className='save-toast '+type+' show';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2000);
}

function showItemPopup(type,item){
  const modal=$('item-popup');
  const icons={skill:'📜',equipment:'⚔️',consumable:'🧪'};
  const titles={skill:'获得功法',equipment:'获得装备',consumable:'获得药品'};
  
  let desc='';
  if(type==='skill'){
    desc=item.desc||item.flavor||'';
  }else if(type==='equipment'){
    desc=item.desc||'';
    if(item.atk)desc+=' 攻击+'+item.atk;
    if(item.def)desc+=' 防御+'+item.def;
    if(item.spd)desc+=' 速度+'+item.spd;
    if(item.hp)desc+=' 生命+'+item.hp;
    if(item.mp)desc+=' 内力+'+item.mp;
  }else if(type==='consumable'){
    desc=item.desc||'';
  }
  
  modal.innerHTML=`
    <div class="item-popup-content">
      <div class="item-popup-icon">${icons[type]}</div>
      <div class="item-popup-title">${titles[type]}</div>
      <div class="item-popup-item">${item.icon} ${item.name}</div>
      <div class="item-popup-desc">${desc}</div>
      <button class="item-popup-btn" onclick="hideItemPopup()">确定</button>
    </div>
  `;
  modal.classList.add('active');
}

function hideItemPopup(){
  $('item-popup').classList.remove('active');
}

function openSaveModal(){
  saveMode='save';
  $('saveslots-title').textContent='存档';
  renderSaveSlots();
  $('modal-saveslots').classList.add('active');
}

function openLoadModal(){
  saveMode='load';
  $('saveslots-title').textContent='读档';
  renderSaveSlots();
  $('modal-saveslots').classList.add('active');
}

function closeSaveModal(){$('modal-saveslots').classList.remove('active')}

function renderSaveSlots(){
  const data=getAllSaves();
  const titles=['第一卷','第二卷','第三卷'];
  let html='<div class="save-slots">';
  for(let i=1;i<=MAX_SLOTS;i++){
    const save=data[i];
    if(save){
      const p=save.player;
      const sceneName=(SCENES[save.currentScene]||{}).name||save.currentScene;
      const titles_arr=['江湖新秀','初出茅庐','小有所成','武林好汉','一方豪杰','名震江湖','绝世高手','一代宗师'];
      const title=titles_arr[Math.min(p.level-1,titles_arr.length-1)]||'传说侠客';
      html+=`<div class="save-slot">
        <div class="save-slot-info">
          <div class="save-slot-title">${titles[i-1]} · ${p.name}</div>
          <div class="save-slot-detail">Lv.${p.level} ${title} | ${sceneName} | 💰${p.gold} | ❤${p.hp}/${p.maxHp}</div>
          <div class="save-slot-time">${save.time}</div>
        </div>
        <div class="save-slot-actions">
          ${saveMode==='save'?`<button class="save-slot-btn sv-save" onclick="event.stopPropagation();saveGame(${i})">覆盖</button>`:''}
          <button class="save-slot-btn sv-load" onclick="event.stopPropagation();doLoadSlot(${i})">读取</button>
          <button class="save-slot-btn sv-del" onclick="event.stopPropagation();if(confirm('确定删除档位${i}？'))deleteSave(${i})">删除</button>
        </div>
      </div>`;
    }else{
      html+=`<div class="save-slot">
        <div class="save-slot-info">
          <div class="save-slot-title">${titles[i-1]}</div>
          <div class="save-slot-empty">— 空档位 —</div>
        </div>
        <div class="save-slot-actions">
          ${saveMode==='save'?`<button class="save-slot-btn sv-save" onclick="event.stopPropagation();saveGame(${i})">存档</button>`:''}
        </div>
      </div>`;
    }
  }
  html+='</div>';
  $('saveslots-body').innerHTML=html;
}

function doLoadSlot(slot){
  if(loadGame(slot)){
    closeSaveModal();
    $('battle-screen').style.display='none';
    $('battle-log').innerHTML='';
    ['gameover-overlay','victory-overlay','levelup-overlay'].forEach(id=>$(id).classList.remove('active'));
    $('title-screen').style.display='none';
    $('game-screen').style.display='flex';
    updateUI();
    goScene(currentScene);
    showToast('读档成功','success');
    addLog('读取了存档','important');
  }
}

function loadAndContinue(){
  const latest=getLatestSave();
  if(!latest){showToast('没有找到存档','warn');return}
  if(loadGame(latest.slot)){
    $('title-screen').style.display='none';
    $('game-screen').style.display='flex';
    updateUI();
    goScene(currentScene);
    showToast('续写江湖 — 读档成功','success');
    addLog('续写江湖，读取存档成功','important');
  }
}

function checkContinueBtn(){
  if(hasAnySave())$('continue-btn').style.display='';
  else $('continue-btn').style.display='none';
}

function autoSave(){
  if(!player||!player.name)return;
  const data=getAllSaves();
  data['auto']=buildSaveData('auto');
  data['auto'].time=new Date().toLocaleString('zh-CN')+' [自动]';
  writeAllSaves(data);
}
