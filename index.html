<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江湖行 - 武侠回合制RPG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e8d5b7;font-family:'Noto Serif SC',serif;min-height:100vh;overflow:hidden}

/* ===== TITLE ===== */
#title-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at center,#1a0a00 0%,#0a0a0a 70%);position:relative;overflow:hidden}
#title-screen::before{content:'';position:absolute;width:200%;height:200%;background:radial-gradient(circle at 20% 50%,rgba(139,69,19,.1) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(178,34,34,.08) 0%,transparent 50%),radial-gradient(circle at 50% 80%,rgba(218,165,32,.06) 0%,transparent 50%);animation:float 20s ease-in-out infinite}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(-2%,-1%)}}
.title-text{font-family:'Ma Shan Zheng',cursive;font-size:92px;color:#daa520;text-shadow:0 0 40px rgba(218,165,32,.3),0 4px 8px rgba(0,0,0,.8);z-index:1;letter-spacing:20px;animation:tg 3s ease-in-out infinite}
@keyframes tg{0%,100%{text-shadow:0 0 40px rgba(218,165,32,.3),0 4px 8px rgba(0,0,0,.8)}50%{text-shadow:0 0 60px rgba(218,165,32,.5),0 4px 8px rgba(0,0,0,.8),0 0 100px rgba(218,165,32,.2)}}
.title-sub{font-size:17px;color:#8b6914;margin-top:10px;z-index:1;letter-spacing:8px}
.title-quote{font-size:14px;color:#665533;margin-top:30px;z-index:1;font-style:italic;letter-spacing:3px}
.title-btn{margin-top:50px;z-index:1;padding:14px 50px;font-family:'Noto Serif SC',serif;font-size:20px;color:#daa520;background:transparent;border:1px solid #8b6914;cursor:pointer;letter-spacing:6px;transition:all .3s}
.title-btn:hover{background:rgba(218,165,32,.1);border-color:#daa520;box-shadow:0 0 30px rgba(218,165,32,.2)}

/* ===== GAME LAYOUT ===== */
#game-screen{display:none;height:100vh;flex-direction:column}

/* TOP BAR */
.top-bar{display:flex;align-items:center;padding:8px 16px;background:linear-gradient(180deg,#150a04,#0e0604);border-bottom:1px solid #2a1a0a;gap:14px;flex-shrink:0;height:56px}
.tb-scene{display:flex;align-items:center;gap:7px;min-width:120px}
.tb-scene-icon{font-size:22px}
.tb-scene-name{font-family:'Ma Shan Zheng',cursive;font-size:18px;color:#daa520}
.tb-bars{display:flex;gap:10px;flex:1;justify-content:center;align-items:center}
.tb-bar-group{display:flex;align-items:center;gap:4px;font-size:11px}
.tb-bar-label{color:#886633;font-size:10px;min-width:18px}
.tb-bar-track{width:100px;height:8px;background:#1a0a00;border-radius:4px;overflow:hidden;border:1px solid #2a1a0a}
.tb-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.tb-hp{background:linear-gradient(90deg,#8b0000,#cd5c5c)}
.tb-mp{background:linear-gradient(90deg,#1a3a6a,#4a8adb)}
.tb-exp{background:linear-gradient(90deg,#6b6b00,#dada00)}
.tb-bar-text{color:#aa8855;font-size:10px;min-width:56px}
.tb-info{display:flex;align-items:center;gap:12px;font-size:12px}
.tb-level{color:#daa520;font-family:'Ma Shan Zheng',cursive;font-size:16px}
.tb-gold{color:#daa520;font-size:12px}
.tb-gold::before{content:'💰 '}
.tb-nav{display:flex;gap:5px}
.nav-btn{padding:5px 12px;font-family:'Noto Serif SC',serif;font-size:12px;color:#aa8855;background:rgba(139,69,19,.08);border:1px solid #2a1a0a;border-radius:4px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.nav-btn:hover{color:#daa520;border-color:#5a3a1a;background:rgba(218,165,32,.1)}
.nav-btn.active{color:#daa520;border-color:#8b6914;background:rgba(218,165,32,.12)}
.nav-btn.save-btn{color:#5ccd5c;border-color:#2a5a2a}
.nav-btn.save-btn:hover{color:#44ff44;border-color:#44aa44;background:rgba(68,255,68,.08)}
.nav-btn.load-btn{color:#7cacdb;border-color:#2a3a5a}
.nav-btn.load-btn:hover{color:#aaccff;border-color:#5588cc;background:rgba(74,138,219,.08)}

/* SAVE TOAST */
.save-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);padding:10px 28px;font-family:'Noto Serif SC',serif;font-size:13px;border-radius:8px;z-index:400;pointer-events:none;opacity:0;transition:all .4s ease}
.save-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.save-toast.success{color:#44ff44;background:rgba(10,40,10,.9);border:1px solid #2a5a2a}
.save-toast.info{color:#7cacdb;background:rgba(10,20,40,.9);border:1px solid #2a3a5a}
.save-toast.warn{color:#daa520;background:rgba(40,30,10,.9);border:1px solid #5a3a1a}

.item-popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s ease}
.item-popup-overlay.active{opacity:1;pointer-events:auto}
.item-popup-content{background:#2a1a0a;border:2px solid #daa520;border-radius:12px;padding:30px 40px;text-align:center;min-width:300px;box-shadow:0 0 30px rgba(218,165,32,.3)}
.item-popup-icon{font-size:48px;margin-bottom:12px}
.item-popup-title{color:#daa520;font-size:16px;margin-bottom:8px;font-weight:bold}
.item-popup-item{font-size:18px;color:#fff;margin-bottom:12px}
.item-popup-desc{color:#aaa;font-size:13px;margin-bottom:20px;line-height:1.5}
.item-popup-btn{background:#daa520;color:#1a0a00;border:none;padding:10px 30px;font-size:14px;border-radius:6px;cursor:pointer;font-family:'Noto Serif SC',serif}
.item-popup-btn:hover{background:#c99410}

/* TITLE CONTINUE BTN */
.title-btn-continue{margin-top:12px;z-index:1;padding:10px 40px;font-family:'Noto Serif SC',serif;font-size:16px;color:#7cacdb;background:transparent;border:1px solid #2a3a5a;cursor:pointer;letter-spacing:4px;transition:all .3s}
.title-btn-continue:hover{background:rgba(74,138,219,.1);border-color:#7cacdb;box-shadow:0 0 20px rgba(74,138,219,.2)}
.weapon-choice-btn{width:100px;height:110px;background:rgba(139,69,19,.1);border:2px solid #5a3a1a;border-radius:10px;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.weapon-choice-btn:hover{background:rgba(139,69,19,.2);border-color:#daa520;transform:translateY(-3px)}
.weapon-choice-btn.selected{background:rgba(218,165,32,.15);border-color:#daa520;box-shadow:0 0 15px rgba(218,165,32,.3)}
.weapon-icon{font-size:32px}
.weapon-name{font-family:'Ma Shan Zheng',cursive;font-size:16px;color:#daa520}
.weapon-desc{font-size:10px;color:#776644;text-align:center;max-width:80px}

/* SAVE SLOT MODAL */
.save-slots{display:flex;flex-direction:column;gap:8px}
.save-slot{padding:12px 16px;background:rgba(139,69,19,.06);border:1px solid #2a1a0a;border-radius:8px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
.save-slot:hover{border-color:#5a3a1a;background:rgba(218,165,32,.08)}
.save-slot-info{display:flex;flex-direction:column;gap:2px}
.save-slot-title{font-size:14px;color:#daa520;font-family:'Ma Shan Zheng',cursive}
.save-slot-detail{font-size:11px;color:#aa8855}
.save-slot-time{font-size:10px;color:#776644}
.save-slot-empty{color:#554433;font-style:italic;font-size:12px}
.save-slot-actions{display:flex;gap:6px}
.save-slot-btn{padding:4px 10px;font-family:'Noto Serif SC',serif;font-size:11px;border-radius:4px;cursor:pointer;transition:all .2s;border:1px solid}
.save-slot-btn.sv-save{color:#5ccd5c;border-color:#2a5a2a;background:rgba(68,255,68,.05)}
.save-slot-btn.sv-save:hover{background:rgba(68,255,68,.15)}
.save-slot-btn.sv-load{color:#7cacdb;border-color:#2a3a5a;background:rgba(74,138,219,.05)}
.save-slot-btn.sv-load:hover{background:rgba(74,138,219,.15)}
.save-slot-btn.sv-del{color:#cd5c5c;border-color:#5a2a2a;background:rgba(205,92,92,.05)}
.save-slot-btn.sv-del:hover{background:rgba(205,92,92,.15)}

/* MAIN AREA */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:radial-gradient(ellipse at center,#140a04,#0a0604)}
.scene-body{flex:1;padding:20px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.narrative{font-size:14px;line-height:1.9;color:#c8b898;padding:14px;background:rgba(139,69,19,.05);border-left:3px solid #8b6914;border-radius:0 4px 4px 0}
.dialogue{padding:10px 14px;background:rgba(0,0,0,.3);border-radius:8px;border:1px solid #2a1a0a}
.dialogue-speaker{color:#daa520;font-weight:bold;font-size:13px;margin-bottom:3px}
.dialogue-text{color:#c8b898;font-size:13px;line-height:1.7}
.choice-btn{display:block;width:100%;text-align:left;padding:12px 16px;margin:4px 0;font-family:'Noto Serif SC',serif;font-size:13px;color:#e8d5b7;background:rgba(139,69,19,.1);border:1px solid #3a2a1a;border-radius:6px;cursor:pointer;transition:all .2s;line-height:1.6}
.choice-btn:hover{background:rgba(218,165,32,.15);border-color:#daa520;color:#daa520;padding-left:22px}
.choice-btn .choice-tag{font-size:11px;color:#886633;margin-right:6px}

/* BOTTOM ACTIONS */
.actions-bar{padding:12px 24px;border-top:1px solid #2a1a0a;display:flex;flex-wrap:wrap;gap:8px;flex-shrink:0;background:rgba(10,5,2,.6)}
.action-btn{padding:9px 18px;font-family:'Noto Serif SC',serif;font-size:13px;color:#e8d5b7;background:rgba(139,69,19,.15);border:1px solid #5a3a1a;border-radius:4px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.action-btn:hover{background:rgba(218,165,32,.2);border-color:#daa520;color:#daa520}
.action-btn:disabled{opacity:.4;cursor:not-allowed}
.action-btn.primary{background:rgba(218,165,32,.2);border-color:#8b6914;color:#daa520}
.action-btn.danger{border-color:#8b2222;color:#cd5c5c}
.action-btn.danger:hover{background:rgba(139,34,34,.2);border-color:#cd5c5c}

/* ===== MODAL OVERLAY ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-panel{background:linear-gradient(180deg,#160a04,#0e0604);border:1px solid #3a2a1a;border-radius:12px;width:90%;max-width:680px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.8);animation:modalIn .25s ease}
@keyframes modalIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #2a1a0a}
.modal-title{font-family:'Ma Shan Zheng',cursive;font-size:24px;color:#daa520}
.modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#886633;background:rgba(139,69,19,.08);border:1px solid #2a1a0a;border-radius:6px;cursor:pointer;transition:all .2s}
.modal-close:hover{color:#daa520;border-color:#5a3a1a;background:rgba(218,165,32,.1)}
.modal-body{flex:1;padding:16px 20px;overflow-y:auto}

/* ===== CHARACTER MODAL ===== */
.char-top{display:flex;gap:20px;align-items:flex-start;margin-bottom:16px}
.char-portrait-lg{width:80px;height:80px;border:2px solid #8b6914;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;background:radial-gradient(circle,#1a0a00,#0a0505);flex-shrink:0}
.char-info-block{flex:1}
.char-name-lg{font-family:'Ma Shan Zheng',cursive;font-size:26px;color:#daa520}
.char-title-lg{font-size:12px;color:#886633;margin-top:-2px}
.char-bars{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.char-bar-row{display:flex;align-items:center;gap:8px;font-size:12px}
.char-bar-label{min-width:50px;color:#aa8855}
.char-bar-track{flex:1;height:10px;background:#1a0a00;border-radius:5px;overflow:hidden;border:1px solid #2a1a0a}
.char-bar-fill{height:100%;border-radius:5px;transition:width .5s ease}
.char-bar-text{min-width:70px;text-align:right;color:#aa8855;font-size:11px}
.char-stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.char-stat-card{background:rgba(139,69,19,.06);border:1px solid #1a1008;border-radius:6px;padding:10px;text-align:center}
.char-stat-val{font-family:'Ma Shan Zheng',cursive;font-size:24px;color:#daa520}
.char-stat-label{font-size:11px;color:#886633;margin-top:2px}
.char-stat-bonus{font-size:10px;color:#44ff44}

/* ===== EQUIPMENT MODAL ===== */
.equip-slots{display:flex;gap:14px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.equip-slot-box{width:140px;height:130px;border:2px dashed #3a2a1a;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .2s;background:rgba(139,69,19,.04);position:relative}
.equip-slot-box:hover{border-color:#5a3a1a;background:rgba(218,165,32,.06)}
.equip-slot-box.equipped{border-style:solid;border-color:#5a3a1a;background:rgba(218,165,32,.08)}
.equip-slot-label{font-size:11px;color:#665533;letter-spacing:2px}
.equip-slot-icon{font-size:32px}
.equip-slot-name{font-size:12px;text-align:center;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.equip-slot-empty{font-size:11px;color:#554433}
.equip-inv-title{font-size:13px;color:#886633;letter-spacing:2px;padding-bottom:6px;border-bottom:1px solid #2a1a0a;margin-bottom:10px}
.equip-inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.equip-inv-cell{background:rgba(139,69,19,.06);border:1px solid #1a1008;border-radius:6px;padding:8px;text-align:center;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px}
.equip-inv-cell:hover{border-color:#5a3a1a;background:rgba(218,165,32,.1)}
.equip-inv-cell .eq-icon{font-size:22px}
.equip-inv-cell .eq-name{font-size:10px;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.equip-inv-cell .eq-slot-tag{font-size:9px;color:#665533}

/* ===== INVENTORY MODAL ===== */
.inv-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.inv-cell{aspect-ratio:1;background:rgba(139,69,19,.06);border:1px solid #1a1008;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .2s;position:relative;padding:4px}
.inv-cell:hover{border-color:#5a3a1a;background:rgba(218,165,32,.1)}
.inv-cell .inv-icon{font-size:24px}
.inv-cell .inv-name{font-size:9px;text-align:center;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inv-cell .inv-count{position:absolute;top:3px;right:5px;font-size:10px;color:#daa520;background:rgba(0,0,0,.6);padding:0 4px;border-radius:3px}
.inv-empty{grid-column:1/-1;text-align:center;color:#554433;font-size:13px;padding:30px 0}

/* ===== SKILLS MODAL ===== */
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.skill-card{background:rgba(139,69,19,.06);border:1px solid #1a1008;border-radius:8px;padding:12px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:flex-start}
.skill-card:hover{border-color:#5a3a1a;background:rgba(218,165,32,.08)}
.skill-card.equipped{border-color:#44ff44;background:rgba(68,255,68,.05)}
.skill-card-icon{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.skill-card-info{flex:1}
.skill-card-name{font-family:'Ma Shan Zheng',cursive;font-size:16px;color:#daa520}
.skill-card-mp{font-size:10px;color:#4a8adb;margin-top:1px}
.skill-card-desc{font-size:11px;color:#aa8855;margin-top:4px;line-height:1.5}
.skill-card-stats{font-size:10px;color:#44ff44;margin-top:3px}
.skill-card-flavor{font-size:10px;color:#554433;font-style:italic;margin-top:3px}
.skill-card-actions{margin-top:6px}
.skill-btn{background:#3a2a1a;color:#daa520;border:1px solid #5a3a1a;padding:4px 12px;font-size:11px;border-radius:4px;cursor:pointer;font-family:'Noto Serif SC',serif;transition:all .2s}
.skill-btn:hover{background:#5a3a1a;border-color:#daa520}
.skill-btn.active{background:#2a5a2a;color:#44ff44;border-color:#44ff44}
.skill-btn.active:hover{background:#3a6a3a}
.skill-btn:disabled{opacity:0.5;cursor:not-allowed}

/* ===== LOG MODAL ===== */
.log-list{display:flex;flex-direction:column;gap:3px}
.log-entry{font-size:12px;color:#776644;padding:4px 0;border-bottom:1px solid rgba(139,69,19,.06);line-height:1.5}
.log-entry.important{color:#daa520}
.log-entry.damage{color:#cd5c5c}
.log-entry.heal{color:#5ccd5c}
.log-entry.skill{color:#7cacdb}
.log-entry.loot{color:#c85cd8}

/* ===== TOOLTIP ===== */
.tooltip{position:fixed;z-index:999;background:rgba(15,8,4,.96);border:1px solid #5a3a1a;border-radius:8px;padding:14px;max-width:240px;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.8);opacity:0;transition:opacity .15s}
.tooltip.show{opacity:1}
.tooltip-name{font-family:'Ma Shan Zheng',cursive;font-size:18px;margin-bottom:4px}
.tooltip-type{font-size:11px;color:#886633;margin-bottom:8px}
.tooltip-desc{font-size:12px;color:#c8b898;line-height:1.6;margin-bottom:6px}
.tooltip-stats{font-size:11px;color:#44ff44;line-height:1.6}
.tooltip-flavor{font-size:11px;color:#665533;font-style:italic;margin-top:6px;border-top:1px solid #2a1a0a;padding-top:6px}
.tooltip-action{font-size:11px;color:#daa520;margin-top:6px}

/* ===== BATTLE ===== */
#battle-screen{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.battle-field{display:flex;align-items:center;justify-content:center;gap:100px;width:100%;max-width:800px}
.battle-unit{text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.battle-sprite{width:96px;height:96px;border:2px solid #5a3a1a;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:48px;background:rgba(139,69,19,.1);transition:all .3s}
.battle-sprite.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.battle-sprite.flash{animation:bflash .3s ease}
@keyframes bflash{0%{filter:brightness(1)}50%{filter:brightness(2.5)}100%{filter:brightness(1)}}
.battle-name{font-family:'Ma Shan Zheng',cursive;font-size:19px;color:#daa520}
.battle-hp-bar{width:140px;height:11px;background:#1a0a00;border-radius:6px;overflow:hidden;border:1px solid #3a2a0a}
.battle-hp-fill{height:100%;background:linear-gradient(90deg,#8b0000,#cd5c5c);transition:width .5s ease;border-radius:6px}
.battle-hp-text{font-size:11px;color:#aa8855}
.battle-mp-text{font-size:11px;color:#5588bb}
.battle-charge-bar{width:100px;height:6px;background:#1a0a00;border-radius:3px;overflow:hidden;border:1px solid #3a2a0a;margin-top:4px}
.battle-charge-fill{height:100%;background:linear-gradient(90deg,#4a8adb,#daa520);transition:width .3s ease;border-radius:3px}
.battle-charge-fill.enemy-charge{background:linear-gradient(90deg,#8b2222,#cd5c5c)}
.battle-charge-text{font-size:9px;color:#7cacdb;margin-top:1px}
.battle-buffs{display:flex;gap:4px;min-height:18px}
.buff-icon{font-size:14px;padding:1px 4px;background:rgba(218,165,32,.15);border-radius:3px;border:1px solid #5a3a1a}
.battle-vs{font-family:'Ma Shan Zheng',cursive;font-size:34px;color:#8b2222;text-shadow:0 0 20px rgba(139,34,34,.5)}
.battle-log{width:100%;max-width:600px;min-height:70px;max-height:110px;overflow-y:auto;padding:10px 18px;background:rgba(0,0,0,.5);border:1px solid #2a1a0a;border-radius:8px;display:flex;flex-direction:column;gap:3px}
.battle-log-entry{font-size:12px;color:#aa8855;line-height:1.5}
.battle-log-entry.player-action{color:#daa520}
.battle-log-entry.enemy-action{color:#cd5c5c}
.battle-log-entry.system{color:#7cacdb}
.battle-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:700px}
.battle-btn{padding:10px 20px;font-family:'Noto Serif SC',serif;font-size:14px;color:#e8d5b7;background:rgba(139,69,19,.2);border:1px solid #5a3a1a;border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:2px;min-width:90px}
.battle-btn:hover{background:rgba(218,165,32,.25);border-color:#daa520;color:#daa520;transform:translateY(-2px)}
.battle-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.battle-btn.skill-btn{font-size:12px;padding:8px 14px;border-color:#3a5a8a;color:#7cacdb}
.battle-btn.skill-btn:hover{background:rgba(74,138,219,.2);border-color:#7cacdb}
.damage-float{position:fixed;font-family:'Ma Shan Zheng',cursive;font-size:30px;color:#ff4444;text-shadow:0 0 10px rgba(255,0,0,.5);pointer-events:none;animation:dfloat 1.2s ease-out forwards;z-index:200}
.damage-float.heal{color:#44ff44;text-shadow:0 0 10px rgba(0,255,0,.5)}
.damage-float.poison{color:#a040d0;text-shadow:0 0 10px rgba(160,64,208,.5)}
.damage-float.miss{color:#888;font-size:22px}
@keyframes dfloat{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}
.skill-submenu{display:none;flex-wrap:wrap;gap:6px;justify-content:center;max-width:700px}
.skill-submenu.active{display:flex}
#battle-particles{position:absolute;inset:0;pointer-events:none;z-index:150}
.particle{position:absolute;width:8px;height:8px;border-radius:50%;pointer-events:none;animation:particle-float 1s ease-out forwards}
@keyframes particle-float{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.battle-sprite.charged{animation:charge-glow 0.5s ease-in-out infinite}
@keyframes charge-glow{0%,100%{box-shadow:0 0 10px rgba(218,165,32,.3);border-color:#5a3a1a}50%{box-shadow:0 0 25px rgba(218,165,32,.8);border-color:#daa520}}
.battle-sprite.attack-flash{animation:attack-flash 0.2s ease-out}
@keyframes attack-flash{0%{filter:brightness(3) saturate(2)}100%{filter:brightness(1) saturate(1)}}

/* OVERLAYS */
.level-up-overlay,.gameover-overlay,.victory-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:fadeIn .5s ease}
.level-up-overlay.active,.gameover-overlay.active,.victory-overlay.active{display:flex}
.level-up-title{font-family:'Ma Shan Zheng',cursive;font-size:52px;color:#daa520;text-shadow:0 0 40px rgba(218,165,32,.5);animation:lp 1s ease infinite}
@keyframes lp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.level-up-info{font-size:15px;color:#c8b898;text-align:center;line-height:2}
.level-up-info span{color:#44ff44}
.gameover-text{font-family:'Ma Shan Zheng',cursive;font-size:60px;color:#8b2222;text-shadow:0 0 40px rgba(139,34,34,.5)}
.victory-text{font-family:'Ma Shan Zheng',cursive;font-size:52px;color:#daa520;text-shadow:0 0 40px rgba(218,165,32,.5)}

/* SHOP */
.shop-grid{display:flex;flex-direction:column;gap:6px}
.shop-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(139,69,19,.08);border:1px solid #2a1a0a;border-radius:4px;transition:all .2s}
.shop-item:hover{border-color:#5a3a1a}
.shop-item-info{display:flex;align-items:center;gap:8px}
.shop-item-desc{font-size:10px;color:#776644}
.shop-buy-btn{padding:4px 12px;font-family:'Noto Serif SC',serif;font-size:11px;color:#daa520;background:rgba(218,165,32,.1);border:1px solid #5a3a1a;border-radius:3px;cursor:pointer;transition:all .2s}
.shop-buy-btn:hover{background:rgba(218,165,32,.25)}
.shop-buy-btn:disabled{opacity:.4;cursor:not-allowed}
.gold-display{font-size:12px;color:#daa520;text-align:right;padding:4px 0}

/* RARITY */
.rarity-common{color:#c8b898}
.rarity-fine{color:#4a8adb}
.rarity-rare{color:#c85cd8}
.rarity-legend{color:#daa520}

/* TIER COLORS */
.tier-huang{color:#c8b898}.tier-huang-bg{border-color:#665533}
.tier-xuan{color:#4a8adb}.tier-xuan-bg{border-color:#2a4a7a}
.tier-di{color:#c85cd8}.tier-di-bg{border-color:#6a2a8a}
.tier-tian{color:#daa520}.tier-tian-bg{border-color:#8b6914}

/* WEAPON TYPE */
.wtype-tag{font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid;display:inline-block;margin-left:4px;vertical-align:middle}
.wtype-sword{color:#7cacdb;border-color:#3a5a8a}
.wtype-blade{color:#cd5c5c;border-color:#8b2222}
.wtype-hidden{color:#a040d0;border-color:#6a2a8a}
.wtype-inner{color:#5ccd5c;border-color:#2a5a2a}

/* AFFINITY */
.aff-hearts{display:inline-flex;gap:2px;font-size:13px;margin-left:6px}
.aff-heart-full{color:#cd3333}
.aff-heart-empty{color:#3a2a2a}
.aff-label{font-size:10px;color:#886633;margin-left:4px}
.aff-choice-btn{border-left:3px solid #cd3333}
.aff-choice-btn:hover{border-left-color:#daa520}

/* QUEST INDICATOR */
.quest-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin:4px 0;letter-spacing:1px}
.quest-tag.active{color:#daa520;background:rgba(218,165,32,.1);border:1px solid #5a3a1a}
.quest-tag.done{color:#5ccd5c;background:rgba(92,205,92,.08);border:1px solid #2a5a2a}
.quest-tag.locked{color:#776644;background:rgba(100,80,50,.08);border:1px solid #2a1a0a}

/* EQUIP TYPE TAG */
.eq-type-tag{font-size:8px;padding:1px 4px;border-radius:2px;border:1px solid;color:#886633;border-color:#2a1a0a;margin-top:1px}
.equip-slots-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.equip-slots-4 .equip-slot-box{width:auto;min-width:120px;height:120px}

/* CHAPTER BANNER */
.chapter-banner{text-align:center;padding:20px;background:linear-gradient(180deg,rgba(218,165,32,.08),transparent);border-bottom:1px solid #2a1a0a;margin:-20px -20px 10px;padding:30px 20px}
.chapter-banner h2{font-family:'Ma Shan Zheng',cursive;font-size:32px;color:#daa520;text-shadow:0 0 20px rgba(218,165,32,.3)}
.chapter-banner p{font-size:13px;color:#886633;margin-top:4px}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3a2a0a;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#5a3a1a}
</style>
</head>
<body>

<div id="title-screen">
  <div class="title-text">江 湖 行</div>
  <div class="title-sub">武侠回合制 RPG</div>
  <div class="title-quote">「 恩怨情仇，一剑了之 」</div>
  <button class="title-btn" onclick="showCharacterCreation()">踏 入 江 湖</button>
  <button class="title-btn-continue" id="continue-btn" style="display:none" onclick="loadAndContinue()">续 写 江 湖</button>
</div>

<div id="char-create-screen" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:90;flex-direction:column;align-items:center;justify-content:center;gap:20px">
  <div class="title-text" style="font-size:48px">初入江湖</div>
  <div style="color:#aa8855;font-size:14px;margin-top:-10px">请为你的侠客取个名字，并选择初始武器</div>
  
  <div style="display:flex;flex-direction:column;gap:10px;width:320px">
    <input type="text" id="char-name-input" placeholder="输入侠客姓名..." maxlength="8" 
           style="padding:12px 16px;font-family:'Noto Serif SC',serif;font-size:16px;background:rgba(139,69,19,.1);border:1px solid #5a3a1a;border-radius:8px;color:#daa520;text-align:center;outline:none">
  </div>
  
  <div style="display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin-top:10px">
    <button class="weapon-choice-btn" onclick="selectWeapon('sword')" id="weapon-sword">
      <div class="weapon-icon">⚔️</div>
      <div class="weapon-name">剑法</div>
      <div class="weapon-desc">攻守兼备，飘逸灵动</div>
    </button>
    <button class="weapon-choice-btn" onclick="selectWeapon('blade')" id="weapon-blade">
      <div class="weapon-icon">🔪</div>
      <div class="weapon-name">刀法</div>
      <div class="weapon-desc">刚猛霸道，势不可挡</div>
    </button>
    <button class="weapon-choice-btn" onclick="selectWeapon('hidden')" id="weapon-hidden">
      <div class="weapon-icon">🎯</div>
      <div class="weapon-name">暗器</div>
      <div class="weapon-desc">迅捷致命，出其不意</div>
    </button>
  </div>
  
  <button class="title-btn" id="confirm-char-btn" onclick="confirmCharacter()" disabled>
    踏入江湖
  </button>
  
  <button class="title-btn-continue" onclick="backToTitle()" style="font-size:14px">返回标题</button>
</div>

<div id="game-screen">
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="tb-scene">
      <span class="tb-scene-icon" id="scene-icon">🏘️</span>
      <span class="tb-scene-name" id="scene-name">清风镇</span>
    </div>
    <div class="tb-bars">
      <div class="tb-bar-group">
        <span class="tb-bar-label" style="color:#cd5c5c">HP</span>
        <div class="tb-bar-track"><div class="tb-bar-fill tb-hp" id="hp-bar" style="width:100%"></div></div>
        <span class="tb-bar-text" id="hp-text">100/100</span>
      </div>
      <div class="tb-bar-group">
        <span class="tb-bar-label" style="color:#4a8adb">MP</span>
        <div class="tb-bar-track"><div class="tb-bar-fill tb-mp" id="mp-bar" style="width:100%"></div></div>
        <span class="tb-bar-text" id="mp-text">50/50</span>
      </div>
      <div class="tb-bar-group">
        <span class="tb-bar-label" style="color:#dada00">EXP</span>
        <div class="tb-bar-track"><div class="tb-bar-fill tb-exp" id="exp-bar" style="width:0%"></div></div>
        <span class="tb-bar-text" id="exp-text">0/100</span>
      </div>
    </div>
    <div class="tb-info">
      <span class="tb-level" id="tb-level">Lv.1</span>
      <span class="tb-gold" id="tb-gold">50</span>
    </div>
    <div class="tb-nav">
      <button class="nav-btn" onclick="openModal('char')">角色</button>
      <button class="nav-btn" onclick="openModal('equip')">装备</button>
      <button class="nav-btn" onclick="openModal('inv')">背包</button>
      <button class="nav-btn" onclick="openModal('skills')">武学</button>
      <button class="nav-btn" onclick="openModal('log')">日志</button>
      <button class="nav-btn save-btn" onclick="openSaveModal()">存档</button>
      <button class="nav-btn load-btn" onclick="openLoadModal()">读档</button>
    </div>
  </div>

  <!-- MAIN SCENE AREA -->
  <div class="main-area">
    <div class="scene-body" id="scene-body"></div>
    <div class="actions-bar" id="actions-area"></div>
  </div>
</div>

<!-- ===== MODALS ===== -->

<!-- CHARACTER MODAL -->
<div class="modal-overlay" id="modal-char">
  <div class="modal-panel">
    <div class="modal-header"><span class="modal-title">角色属性</span><button class="modal-close" onclick="closeModal('char')">✕</button></div>
    <div class="modal-body" id="modal-char-body"></div>
  </div>
</div>

<!-- EQUIPMENT MODAL -->
<div class="modal-overlay" id="modal-equip">
  <div class="modal-panel">
    <div class="modal-header"><span class="modal-title">装备管理</span><button class="modal-close" onclick="closeModal('equip')">✕</button></div>
    <div class="modal-body" id="modal-equip-body"></div>
  </div>
</div>

<!-- INVENTORY MODAL -->
<div class="modal-overlay" id="modal-inv">
  <div class="modal-panel">
    <div class="modal-header"><span class="modal-title">背包</span><button class="modal-close" onclick="closeModal('inv')">✕</button></div>
    <div class="modal-body" id="modal-inv-body"></div>
  </div>
</div>

<!-- SKILLS MODAL -->
<div class="modal-overlay" id="modal-skills">
  <div class="modal-panel">
    <div class="modal-header"><span class="modal-title">武学</span><button class="modal-close" onclick="closeModal('skills')">✕</button></div>
    <div class="modal-body" id="modal-skills-body"></div>
  </div>
</div>

<!-- LOG MODAL -->
<div class="modal-overlay" id="modal-log">
  <div class="modal-panel" style="max-width:540px">
    <div class="modal-header"><span class="modal-title">江湖日志</span><button class="modal-close" onclick="closeModal('log')">✕</button></div>
    <div class="modal-body" id="modal-log-body"></div>
  </div>
</div>

<!-- SAVE/LOAD SLOT MODAL -->
<div class="modal-overlay" id="modal-saveslots">
  <div class="modal-panel" style="max-width:500px">
    <div class="modal-header"><span class="modal-title" id="saveslots-title">存档</span><button class="modal-close" onclick="closeSaveModal()">✕</button></div>
    <div class="modal-body" id="saveslots-body"></div>
    <div style="display:flex;gap:8px;padding:8px 16px 12px;justify-content:flex-end">
      <button class="nav-btn" onclick="exportSave()" style="color:#7cacdb;border-color:#2a3a5a">导出存档</button>
      <button class="nav-btn" onclick="importSave()" style="color:#daa520;border-color:#5a3a1a">导入存档</button>
    </div>
  </div>
</div>

<!-- SAVE TOAST -->
<div class="save-toast" id="save-toast"></div>

<!-- ITEM POPUP -->
<div class="item-popup-overlay" id="item-popup"></div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-name" id="tt-name"></div>
  <div class="tooltip-type" id="tt-type"></div>
  <div class="tooltip-desc" id="tt-desc"></div>
  <div class="tooltip-stats" id="tt-stats"></div>
  <div class="tooltip-flavor" id="tt-flavor"></div>
  <div class="tooltip-action" id="tt-action"></div>
</div>

<!-- BATTLE SCREEN -->
<div id="battle-screen">
  <div class="battle-field">
    <div class="battle-unit">
      <div class="battle-sprite" id="player-sprite">⚔️</div>
      <div class="battle-name" id="battle-player-name">无名侠客</div>
      <div class="battle-hp-bar"><div class="battle-hp-fill" id="battle-player-hp" style="width:100%"></div></div>
      <div class="battle-hp-text" id="battle-player-hp-text">100/100</div>
      <div class="battle-mp-text" id="battle-player-mp-text">内力: 50/50</div>
      <div class="battle-charge-bar"><div class="battle-charge-fill" id="battle-player-charge" style="width:0%"></div></div>
      <div class="battle-charge-text" id="battle-player-charge-text">集气: 0%</div>
      <div class="battle-buffs" id="player-buffs"></div>
    </div>
    <div class="battle-vs">⚡</div>
    <div class="battle-unit">
      <div class="battle-sprite" id="enemy-sprite">🐺</div>
      <div class="battle-name" id="battle-enemy-name">野狼</div>
      <div class="battle-stats" id="battle-enemy-stats" style="font-size:10px;color:#888;margin-top:2px"></div>
      <div class="battle-hp-bar"><div class="battle-hp-fill" id="battle-enemy-hp" style="width:100%"></div></div>
      <div class="battle-hp-text" id="battle-enemy-hp-text">40/40</div>
      <div class="battle-charge-bar"><div class="battle-charge-fill enemy-charge" id="battle-enemy-charge" style="width:0%"></div></div>
      <div class="battle-charge-text" id="battle-enemy-charge-text">集气: 0%</div>
      <div class="battle-buffs" id="enemy-buffs"></div>
    </div>
  </div>
  <div id="battle-particles"></div>
  <div class="battle-log" id="battle-log"></div>
  <div class="battle-actions" id="battle-actions"></div>
  <div class="skill-submenu" id="skill-submenu"></div>
</div>

<!-- LEVEL UP / GAMEOVER / VICTORY -->
<div class="level-up-overlay" id="levelup-overlay">
  <div class="level-up-title">境界提升!</div>
  <div class="level-up-info" id="levelup-info"></div>
  <button class="battle-btn" onclick="closeLevelUp()">继续</button>
</div>
<div class="gameover-overlay" id="gameover-overlay">
  <div class="gameover-text">侠士陨落</div>
  <div style="color:#aa8855;font-size:15px">江湖路远，来日再战</div>
  <button class="battle-btn" onclick="restartGame()">重新开始</button>
</div>
<div class="victory-overlay" id="victory-overlay">
  <div class="victory-text">通关 · 名震江湖</div>
  <div id="victory-summary" style="color:#c8b898;font-size:14px;text-align:center;line-height:2"></div>
  <button class="battle-btn" onclick="restartGame()">重入江湖</button>
</div>

<script>
// ======================= SKILLS =======================

let player={},currentScene='',battleState=null,gameFlags={};
const logEntries=[];

function initPlayer(name='无名侠客',weaponType='sword'){
  const weaponMap={
    sword:{skill:'basic_sword',equip:'rusty_sword'},
    blade:{skill:'basic_blade',equip:'iron_blade'},
    hidden:{skill:'basic_hidden',equip:'throwing_darts'}
  };
  const w=weaponMap[weaponType]||weaponMap.sword;
  
  player={
    name:name,level:1,
    hp:100,maxHp:100,mp:50,maxMp:50,
    baseAtk:12,baseDef:6,baseSpd:8,
    atk:12,def:6,spd:8,
    exp:0,expNext:153,gold:50,
    skills:[w.skill],
    inventory:{hp_pot:3,mp_pot:1},
    equipInventory:[w.equip,'cloth'],
    equipment:{weapon:null,armor:null,accessory1:null,accessory2:null},
    buffs:[],
    startWeaponType:weaponType,
    equippedWeaponSkills:[],
    equippedInnerSkills:[],
  };
  gameFlags={
    affinity:{elder:0,girl:0,blacksmith:0,master:0,innkeeper:0,herb_doctor:0,c2_shenTiangao:0,c2_monk:0,c2_arenaBoss:0}
  };
  logEntries.length=0;
  equipItem(w.equip);
  equipItem('cloth');
}

function recalcStats(){
  let atkB=player.baseAtk,defB=player.baseDef,spdB=player.baseSpd,hpB=0,mpB=0;
  for(let slot of ['weapon','armor','accessory1','accessory2']){
    const eid=player.equipment[slot];
    if(!eid)continue;
    const eq=EQUIPMENT[eid];
    if(eq.atk)atkB+=eq.atk;
    if(eq.def)defB+=eq.def;
    if(eq.spd)spdB+=eq.spd;
    if(eq.hp)hpB+=eq.hp;
    if(eq.mp)mpB+=eq.mp;
  }
  player.atk=atkB;player.def=defB;player.spd=spdB;
  const oldMax=player.maxHp,oldMp=player.maxMp;
  player.maxHp=100+((player.level-1)*22)+hpB;
  player.maxMp=50+((player.level-1)*12)+mpB;
  if(player.maxHp>oldMax)player.hp+=player.maxHp-oldMax;
  if(player.maxMp>oldMp)player.mp+=player.maxMp-oldMp;
  player.hp=Math.min(player.hp,player.maxHp);
  player.mp=Math.min(player.mp,player.maxMp);
}

function equipItem(eid){
  const eq=EQUIPMENT[eid];
  const idx=player.equipInventory.indexOf(eid);
  if(idx===-1)return;
  let targetSlot=eq.slot;
  // Handle dual accessory slots
  if(eq.slot==='accessory'){
    if(!player.equipment.accessory1) targetSlot='accessory1';
    else if(!player.equipment.accessory2) targetSlot='accessory2';
    else targetSlot='accessory1'; // replace accessory1 if both full
  }
  
  const oldWeapon=player.equipment.weapon;
  const oldWtype=oldWeapon?EQUIPMENT[oldWeapon].wtype:null;
  const newWtype=eq.slot==='weapon'?eq.wtype:null;
  
  if(player.equipment[targetSlot]){
    player.equipInventory.push(player.equipment[targetSlot]);
  }
  player.equipInventory.splice(idx,1);
  player.equipment[targetSlot]=eid;
  
  if(eq.slot==='weapon'&&oldWtype&&newWtype&&oldWtype!==newWtype){
    player.equippedWeaponSkills=[];
    showToast('切换武器类型，已重置功法栏位','info');
  }
  
  recalcStats();
  addLog(`装备了 ${eq.icon} ${eq.name}`,'important');
  updateUI();
}

function unequipItem(slot){
  const eid=player.equipment[slot];
  if(!eid)return;
  player.equipInventory.push(eid);
  player.equipment[slot]=null;
  recalcStats();
  addLog(`卸下了 ${EQUIPMENT[eid].name}`);
  updateUI();
}

// ======================= WEAPON & TIER HELPERS =======================
function getWeaponType(){
  const w=player.equipment.weapon;
  if(!w)return 'sword';
  return EQUIPMENT[w].wtype||'sword';
}
function getTierName(t){return {huang:'黄阶',xuan:'玄阶',di:'地阶',tian:'天阶'}[t]||'';}
function getTierClass(t){return 'tier-'+t;}
function getTierColor(t){return {huang:'#c8b898',xuan:'#4a8adb',di:'#c85cd8',tian:'#daa520'}[t]||'#c8b898';}
function getWtypeName(w){return {sword:'剑',blade:'刀',hidden:'暗器',any:'内功'}[w]||'';}
function getWtypeClass(w){return 'wtype-'+w;}
function countSideQuests(){
  let c=0;
  if(gameFlags.blacksmithWeaponUp||(gameFlags.weaponUpTier&&gameFlags.weaponUpTier>=1))c++;
  if(gameFlags.trainingAccept)c++;
  if(gameFlags.herbQuestDone)c++;
  if(gameFlags.wolfKingDefeated)c++;
  if(gameFlags.blacksmithOre)c++;
  if(gameFlags.trainingDef)c++;
  if(gameFlags.trainingSpd)c++;
  if(gameFlags.armorUpTier&&gameFlags.armorUpTier>=1)c++;
  if(gameFlags.c2_banditCleared)c++;
  if(gameFlags.c2_ghostDone)c++;
  if(gameFlags.c2_cultInvestigated)c++;
  if(gameFlags.c2_arenaCleared)c++;
  if(gameFlags.c3_banditKingDone)c++;
  if(gameFlags.c3_ruinDone)c++;
  return c;
}

// ======================= AFFINITY SYSTEM =======================
function getAffinity(npc){return (gameFlags.affinity&&gameFlags.affinity[npc])||0;}
function addAffinity(npc,amount){
  if(!gameFlags.affinity) gameFlags.affinity={};
  gameFlags.affinity[npc]=Math.min(100,Math.max(0,(gameFlags.affinity[npc]||0)+amount));
  if(amount>0) addLog(getAffinityName(npc)+' 好感度+'+amount,'');
  if(amount<0) addLog(getAffinityName(npc)+' 好感度'+amount,'');
}
function getAffinityLevel(npc){
  const v=getAffinity(npc);
  if(v>=80)return 4; if(v>=50)return 3; if(v>=20)return 2; if(v>0)return 1; return 0;
}
function getAffinityName(npc){
  return {elder:'李老爷子',girl:'苏小蝶',blacksmith:'铁匠老赵',master:'白发老者',innkeeper:'掌柜',herb_doctor:'柳青青'}[npc]||npc;
}
function renderHearts(npc){
  const lvl=getAffinityLevel(npc);
  let h='<span class="aff-hearts">';
  for(let i=0;i<4;i++) h+=i<lvl?'<span class="aff-heart-full">♥</span>':'<span class="aff-heart-empty">♥</span>';
  h+='</span>';
  return h;
}

const rarityName=r=>({common:'普通',fine:'精良',rare:'稀有',legend:'传说'}[r]||'');

function openModal(type){
  if(type==='char')rChar();
  else if(type==='equip')rEquip();
  else if(type==='inv')rInv();
  else if(type==='skills')rSkills();
  else if(type==='log')rLog();
  $('modal-'+type).classList.add('active');
}
function closeModal(type){$('modal-'+type).classList.remove('active')}

// Close modal on overlay click
document.addEventListener('click',function(e){
  if(e.target.classList.contains('modal-overlay')){
    e.target.classList.remove('active');
  }
});

// EQUIPMENT MODAL
function rEquip(){
  const slotIcons={weapon:'🗡',armor:'🛡',accessory1:'💍',accessory2:'💍'};
  const slotLabels={weapon:'武 器',armor:'防 具',accessory1:'饰品一',accessory2:'饰品二'};
  let html='<div class="equip-slots-4">';
  for(let slot of['weapon','armor','accessory1','accessory2']){
    const eid=player.equipment[slot];
    if(eid){
      const eq=EQUIPMENT[eid];
      const wtypeTag=eq.wtype?`<span class="wtype-tag ${getWtypeClass(eq.wtype)}">${getWtypeName(eq.wtype)}</span>`:'';
      html+=`<div class="equip-slot-box equipped" onclick="unequipItem('${slot}');rEquip()" onmouseenter="showItemTip(event,'${eid}','equip')" onmouseleave="hideTip()">
        <div class="equip-slot-label">${slotLabels[slot]}</div>
        <div class="equip-slot-icon">${eq.icon}</div>
        <div class="equip-slot-name ${rarityClass(eq.rarity)}">${eq.name}${wtypeTag}</div>
      </div>`;
    }else{
      html+=`<div class="equip-slot-box">
        <div class="equip-slot-label">${slotLabels[slot]}</div>
        <div class="equip-slot-icon" style="opacity:.3">${slotIcons[slot]}</div>
        <div class="equip-slot-empty">空</div>
      </div>`;
    }
  }
  html+='</div>';
  // Current weapon type display
  const wt=getWeaponType();
  html+=`<div style="text-align:center;font-size:12px;color:#886633;margin-bottom:10px">当前武器类型: <span class="wtype-tag ${getWtypeClass(wt)}">${getWtypeName(wt)}</span></div>`;
  // Unequipped gear inventory
  html+='<div class="equip-inv-title">未装备的器具</div><div class="equip-inv-grid">';
  if(player.equipInventory.length===0){
    html+='<div style="grid-column:1/-1;text-align:center;color:#554433;font-size:12px;padding:16px 0">暂无</div>';
  }
  for(let eid of player.equipInventory){
    const eq=EQUIPMENT[eid];
    const wtypeTag=eq.wtype?`<span class="wtype-tag ${getWtypeClass(eq.wtype)}">${getWtypeName(eq.wtype)}</span>`:'';
    html+=`<div class="equip-inv-cell" onclick="equipItem('${eid}');rEquip()" onmouseenter="showItemTip(event,'${eid}','equip')" onmouseleave="hideTip()">
      <span class="eq-icon">${eq.icon}</span>
      <span class="eq-name ${rarityClass(eq.rarity)}">${eq.name}</span>
      <span class="eq-slot-tag">${slotName(eq.slot)}${wtypeTag}</span>
    </div>`;
  }
  html+='</div>';
  $('modal-equip-body').innerHTML=html;
}

  for(let[id,count]of Object.entries(player.inventory)){
    if(count<=0)continue;
    hasItems=true;
    const item=ITEMS[id];
    html+=`<div class="inv-cell" onclick="useItem('${id}');rInv()" onmouseenter="showItemTip(event,'${id}','item')" onmouseleave="hideTip()">
      <span class="inv-count">x${count}</span>
      <span class="inv-icon">${item.icon}</span>
      <span class="inv-name ${rarityClass(item.rarity)}">${item.name}</span>
    </div>`;
  }
  if(!hasItems)html+='<div class="inv-empty">背包空空如也</div>';
  html+='</div>';
  $('modal-inv-body').innerHTML=html;
}

function getMaxSkillSlots(){
  if(player.level>=15)return {weapon:5,inner:5};
  if(player.level>=10)return {weapon:4,inner:4};
  if(player.level>=5)return {weapon:3,inner:4};
  return {weapon:3,inner:3};
}

function isBasicSkill(sid){
  return ['basic_sword','basic_blade','basic_hidden'].includes(sid);
}

function equipSkill(sid){
  const s=SKILLS[sid];
  if(!s)return;
  if(isBasicSkill(sid)){showToast('基础技能不可卸下','warn');return}
  
  const isInner=s.reqWeapon==='any';
  const slots=getMaxSkillSlots();
  
  if(isInner){
    if(player.equippedInnerSkills.includes(sid)){showToast('已经上阵','warn');return}
    if(player.equippedInnerSkills.length>=slots.inner){showToast('心法栏位已满','warn');return}
    player.equippedInnerSkills.push(sid);
    showToast(s.icon+' '+s.name+' 已上阵','info');
  }else{
    if(player.equippedWeaponSkills.includes(sid)){showToast('已经上阵','warn');return}
    if(player.equippedWeaponSkills.length>=slots.weapon){showToast('功法栏位已满','warn');return}
    player.equippedWeaponSkills.push(sid);
    showToast(s.icon+' '+s.name+' 已上阵','info');
  }
  $('modal-skills').classList.add('active');
  if(gameState!=='battle')rSkills();
  else showSkillMenu();
}

function unequipSkill(sid){
  const s=SKILLS[sid];
  if(!s)return;
  if(isBasicSkill(sid)){showToast('基础技能不可卸下','warn');return}
  
  const isInner=s.reqWeapon==='any';
  if(isInner){
    const idx=player.equippedInnerSkills.indexOf(sid);
    if(idx>-1)player.equippedInnerSkills.splice(idx,1);
  }else{
    const idx=player.equippedWeaponSkills.indexOf(sid);
    if(idx>-1)player.equippedWeaponSkills.splice(idx,1);
  }
  showToast(s.icon+' '+s.name+' 已卸下','warn');
  $('modal-skills').classList.add('active');
  if(gameState!=='battle')rSkills();
  else showSkillMenu();
}

// AUTO EQUIP: when learning a new skill, auto-equip if slot available
function autoEquipSkill(sid){
  const s=SKILLS[sid];
  if(!s)return;
  const isInner=s.reqWeapon==='any';
  const slots=getMaxSkillSlots();
  if(isInner){
    if(!player.equippedInnerSkills.includes(sid)&&player.equippedInnerSkills.length<slots.inner){
      player.equippedInnerSkills.push(sid);
      addLog(s.icon+' '+s.name+' 自动装备到心法栏位','skill');
    }
  }else{
    const wt=getWeaponType();
    if(s.reqWeapon!==wt)return;
    if(!player.equippedWeaponSkills.includes(sid)&&player.equippedWeaponSkills.length<slots.weapon){
      player.equippedWeaponSkills.push(sid);
      addLog(s.icon+' '+s.name+' 自动装备到功法栏位','skill');
    }
  }
}

// SKILLS MODAL
function rSkills(){
  const wt=getWeaponType();
  const maxSlots=getMaxSkillSlots();
  const groups={sword:[],blade:[],hidden:[],any:[]};
  player.skills.forEach(sid=>{
    const s=SKILLS[sid];
    const rw=s.reqWeapon||'any';
    if(groups[rw]) groups[rw].push(sid);
    else groups.any.push(sid);
  });
  let html='';
  const groupNames={sword:'🗡 剑法',blade:'🔪 刀法',hidden:'🎯 暗器',any:'☯ 内功心法'};
  
  for(let gk of ['sword','blade','hidden','any']){
    if(groups[gk].length===0)continue;
    const isInner=gk==='any';
    const currentCount=isInner?player.equippedInnerSkills.length:player.equippedWeaponSkills.length;
    const maxCount=isInner?maxSlots.inner:maxSlots.weapon;
    html+=`<div style="font-size:13px;color:#886633;margin:10px 0 6px;border-bottom:1px solid #2a1a0a;padding-bottom:4px">${groupNames[gk]}${gk!=='any'&&gk!==wt?' <span style="color:#554433;font-size:10px">(需装备'+getWtypeName(gk)+'类)</span>':''} <span style="font-size:11px;color:#665533">(${currentCount}/${maxCount})</span></div>`;
    html+='<div class="skills-grid">';
    groups[gk].forEach(sid=>{
      const s=SKILLS[sid];
      const canUse=(s.reqWeapon==='any'||s.reqWeapon===wt);
      const opacity=canUse?'1':'0.4';
      const isBasic=isBasicSkill(sid);
      const isEquipped=isInner?player.equippedInnerSkills.includes(sid):player.equippedWeaponSkills.includes(sid);
      let stats=[];
      if(s.mult)stats.push('倍率 x'+s.mult);
      if(s.hits)stats.push('连击 '+s.hits+' 次');
      if(s.healMult)stats.push('治疗 '+Math.floor(s.healMult*100)+'%');
      if(s.selfHeal)stats.push('吸血 '+Math.floor(s.selfHeal*100)+'%');
      if(s.pierce)stats.push('无视 '+Math.floor(s.pierce*100)+'% 防御');
      if(s.poison)stats.push('毒 '+s.poison.dmg+'/回合');
      if(s.stun)stats.push('眩晕 '+Math.floor(s.stun*100)+'%');
      if(s.selfDmg)stats.push('自伤 '+Math.floor(s.selfDmg*100)+'%HP');
      if(s.buffKey){const n={nextAtk:'攻击强化',dodge:'闪避',defBuff:'防御强化',ironShirt:'铁布衫',eagleEye:'鹰眼术',cloudStep:'梯云纵'};stats.push((n[s.buffKey]||s.buffKey)+' '+s.buffDur+'回合')}
      const tierName=getTierName(s.tier);
      const tierColor=getTierColor(s.tier);
      
      let btnHtml='';
      if(isBasic){
        btnHtml='<button class="skill-btn" disabled style="background:#3a2a1a;color:#665544">基础技能</button>';
      }else if(isEquipped){
        btnHtml=`<button class="skill-btn active" onclick="unequipSkill('${sid}')">✓ 卸下</button>`;
      }else{
        btnHtml=`<button class="skill-btn" onclick="equipSkill('${sid}')">上阵</button>`;
      }
      
      html+=`<div class="skill-card ${isEquipped?'equipped':''}" style="opacity:${opacity};border-left:3px solid ${tierColor}" onmouseenter="showSkillTip(event,'${sid}')" onmouseleave="hideTip()">
        <div class="skill-card-icon">${s.icon}</div>
        <div class="skill-card-info">
          <div class="skill-card-name" style="color:${tierColor}">${s.name} <span style="font-size:10px;opacity:0.7">${tierName}</span></div>
          <div class="skill-card-mp">${s.mp>0?'消耗 '+s.mp+' 内力':'无消耗'}</div>
          <div class="skill-card-desc">${s.desc||s.flavor||''}</div>
          ${stats.length?'<div class="skill-card-stats">'+stats.join(' · ')+'</div>':''}
          <div class="skill-card-flavor">${s.flavor||''}</div>
          ${!canUse?'<div style="font-size:10px;color:#cd5c5c;margin-top:2px">需装备'+getWtypeName(s.reqWeapon)+'类武器</div>':''}
          <div class="skill-card-actions">${btnHtml}</div>
        </div>
      </div>`;
    });
    html+='</div>';
  }
  $('modal-skills-body').innerHTML=html;
}

function rLog(){

function showItemTip(e,id,type){
  const tt=$('tooltip');
  if(type==='item'){
    const item=ITEMS[id];
    $('tt-name').textContent=item.icon+' '+item.name;
    $('tt-name').className='tooltip-name '+rarityClass(item.rarity);
    $('tt-type').textContent=rarityName(item.rarity)+' · 消耗品';
    $('tt-desc').textContent=item.desc;
    $('tt-stats').textContent='';
    $('tt-flavor').textContent=item.flavor||'';
    $('tt-action').textContent='点击使用';
  }else{
    const eq=EQUIPMENT[id];
    $('tt-name').textContent=eq.icon+' '+eq.name;
    $('tt-name').className='tooltip-name '+rarityClass(eq.rarity);
    const tierStr=eq.tier?getTierName(eq.tier)+' · ':'';
    const wtypeStr=eq.wtype?getWtypeName(eq.wtype)+' · ':'';
    $('tt-type').textContent=tierStr+wtypeStr+rarityName(eq.rarity)+' · '+slotName(eq.slot);
    $('tt-desc').textContent=eq.desc;
    let stats=[];
    if(eq.atk)stats.push('攻击 +'+eq.atk);
    if(eq.def)stats.push('防御 +'+eq.def);
    if(eq.spd)stats.push('集气 +'+eq.spd);
    if(eq.hp)stats.push('生命 +'+eq.hp);
    if(eq.mp)stats.push('内力 +'+eq.mp);
    if(eq.drain)stats.push('吸血 '+Math.floor(eq.drain*100)+'%');
    if(eq.poisonHit)stats.push('毒伤 '+eq.poisonHit.dmg+'/回合');
    $('tt-stats').textContent=stats.join('  ');
    $('tt-flavor').textContent=eq.flavor||'';
    const isEquipped=Object.values(player.equipment).includes(id);
    $('tt-action').textContent=isEquipped?'点击卸下':'点击装备';
  }
  tt.style.left=Math.min(e.clientX+12,window.innerWidth-260)+'px';
  tt.style.top=Math.min(e.clientY+12,window.innerHeight-200)+'px';
  tt.classList.add('show');
}
function hideTip(){$('tooltip').classList.remove('show')}

function showSkillTip(e,sid){

  if(s.drain)stats.push('吸血 '+Math.floor(s.drain*100)+'%');
  if(s.stun)stats.push('眩晕 '+Math.floor(s.stun*100)+'%');
  if(s.selfDmg)stats.push('自伤 '+Math.floor(s.selfDmg*100)+'%HP');

  if(s.buffKey){
    const names={nextAtk:'攻击翻倍',dodge:'闪避提升',defBuff:'防御强化',ironShirt:'铁布衫',eagleEye:'鹰眼术',cloudStep:'梯云纵',flamePalm:'烈焰掌·攻击强化',swordParry:'御剑术·防御强化',smoke:'烟雾弹·闪避提升',taijiBarrier:'太极护体·防御强化',counter:'以彼之道·伤害反弹',nineYang:'九阳神功·攻击强化'};

  $('tt-stats').textContent=stats.join('  ');
  $('tt-flavor').textContent=s.flavor||'';

  tt.style.left=Math.min(e.clientX+12,window.innerWidth-260)+'px';

function addLog(text,cls=''){
  logEntries.unshift({text,cls});

}

function showDamageFloat(el,val,isHeal,extra=''){
  const r=el.getBoundingClientRect();const f=document.createElement('div');
  f.className='damage-float'+(isHeal?' heal':'')+(extra==='poison'?' poison':'')+(extra==='miss'?' miss':'');
  f.textContent=isHeal?`+${val}`:extra==='miss'?'闪避！':`-${val}`;
  f.style.left=(r.left+r.width/2-20)+'px';f.style.top=(r.top-10)+'px';
  document.body.appendChild(f);setTimeout(()=>f.remove(),1200);
}

    const owned=player.equipInventory.includes(id)||Object.values(player.equipment).includes(id);
    const wtypeTag=eq.wtype?` <span class="wtype-tag ${getWtypeClass(eq.wtype)}">${getWtypeName(eq.wtype)}</span>`:'';

function buyItem(id){
  const it=ITEMS[id];if(player.gold<it.price)return;
  player.gold-=it.price;player.inventory[id]=(player.inventory[id]||0)+1;
  addLog(`购买了 ${it.name}`);goScene('shop');updateUI();
}
function buyEquip(id){
  const eq=EQUIPMENT[id];if(player.gold<eq.price)return;
  player.gold-=eq.price;player.equipInventory.push(id);
  addLog(`购买了 ${eq.icon} ${eq.name}`,'loot');goScene('shop');updateUI();
}

// ======================= REST =======================
function rest(){
  if(player.gold<15)return;
  player.gold-=15;player.hp=player.maxHp;player.mp=player.maxMp;
  addAffinity('innkeeper',2);
  addLog('在客栈休息，完全恢复','heal');goScene('inn');updateUI();
}

function useItem(id){
  const it=ITEMS[id];if(!player.inventory[id]||player.inventory[id]<=0)return;
  player.inventory[id]--;
  if(it.effect==='hp'){const h=Math.min(it.value,player.maxHp-player.hp);player.hp+=h;addLog(`使用 ${it.name}，恢复 ${h} 生命`,'heal')}
  else if(it.effect==='mp'){const r=Math.min(it.value,player.maxMp-player.mp);player.mp+=r;addLog(`使用 ${it.name}，恢复 ${r} 内力`,'skill')}
  else if(it.effect==='both'){player.hp=Math.min(player.hp+it.hpVal,player.maxHp);player.mp=Math.min(player.mp+it.mpVal,player.maxMp);addLog(`使用 ${it.name}，恢复生命和内力`,'heal')}
  else if(it.effect==='full'){player.hp=player.maxHp;player.mp=player.maxMp;addLog(`使用 ${it.name}，完全恢复！`,'heal')}
  updateUI();
}

function renderMartialArtsSchool(location){
  const isLuoyang=location==='luoyang';
  const title=isLuoyang?'洛阳武馆':'清风镇武馆';
  const cost_base=isLuoyang?80:40;

  const learnable=[
    {id:'basic_sword',name:'基础剑法',cost:cost_base,tier:'huang',req:'sword'},
    {id:'basic_blade',name:'基础刀法',cost:cost_base,tier:'huang',req:'blade'},
    {id:'basic_hidden',name:'暗器基础',cost:cost_base,tier:'huang',req:'hidden'},
  ];

  if(isLuoyang){
    learnable.push(
      {id:'wind_blade',name:'风雷斩',cost:120,tier:'xuan',req:'sword'},
      {id:'flame_blade',name:'烈焰刀',cost:120,tier:'xuan',req:'blade'},
      {id:'poison_palm',name:'毒砂掌',cost:100,tier:'xuan',req:'hidden'},
      {id:'sword_combo',name:'连环剑',cost:150,tier:'xuan',req:'sword'},
      {id:'blade_combo',name:'三连斩',cost:150,tier:'xuan',req:'blade'},
      {id:'hidden_star',name:'流星赶月',cost:150,tier:'xuan',req:'hidden'},
      {id:'sword_parry',name:'御剑术',cost:130,tier:'xuan',req:'sword'},
      {id:'blade_spin',name:'旋风刀',cost:130,tier:'xuan',req:'blade'},
      {id:'hidden_smoke',name:'烟雾弹',cost:100,tier:'xuan',req:'hidden'}
    );
  }

  let html=`<div class="narrative" style="border-color:#8b6914">
    <h3 style="color:#8b6914;font-family:'Ma Shan Zheng',cursive">${title}</h3>
    <p>武馆教头抱拳道："想学什么功夫？只要银子到位，包教包会。"</p>
  </div>`;
  html+=`<div class="gold-display" style="color:#daa520;font-size:13px;margin:6px 0">银两: ${player.gold} 两</div>`;

  let btns='';
  learnable.forEach(item=>{
    const s=SKILLS[item.id];
    if(!s)return;
    const known=player.skills.includes(item.id);
    const canLearn=!known&&player.gold>=item.cost;
    const wtypeTag=`<span class="wtype-tag ${getWtypeClass(item.req)}">${getWtypeName(item.req)}</span>`;
    const tierColor=getTierColor(item.tier);
    const tn={huang:'黄',xuan:'玄',di:'地',tian:'天'}[item.tier]||'';
    btns+=`<button class="action-btn" ${canLearn?`onclick="learnSkillAtSchool('${item.id}',${item.cost})"`:'disabled'} style="border-color:${known?'#666':'#8b6914'};color:${known?'#666':tierColor}">
      ${s.icon} ${s.name} ${wtypeTag} <span style="font-size:10px;color:${tierColor}">${tn}</span>
      ${known?'<span style="color:#666">已学会</span>':item.cost+'两'}
    </button>`;
  });
  btns+=`<button class="action-btn" onclick="goScene('${location}')">返回</button>`;

  $('scene-body').innerHTML=html;
  $('actions-area').innerHTML=btns;
}

function learnSkillAtSchool(id,cost){
  if(player.skills.includes(id)){showToast('已经学会了','warn');return}
  if(player.gold<cost){showToast('银两不足','warn');return}
  player.gold-=cost;
  player.skills.push(id);
  autoEquipSkill(id);
  addLog('在武馆学会了 '+SKILLS[id].name,'skill');
  showToast('学会了 '+SKILLS[id].name+'！','success');
  showItemPopup('skill',SKILLS[id]);
  updateUI();
  const loc=gameFlags.c2_started?'luoyang':'town';
  renderMartialArtsSchool(loc);
}

function renderBlacksmith(){
  const wt=gameFlags.weaponUpTier||0;
  const at=gameFlags.armorUpTier||0;
  const wCosts=[50,120,250,500];
  const aCosts=[60,150,300,600];
  const wNames=['精淬','百炼','玄铁重铸','天外陨铁'];
  const aNames=['加固','精织','玄铁内衬','天蚕宝衣'];

  let html=`<div class="scene-npc">
    <div class="npc-icon">🔨</div>
    <div class="npc-name">铁匠老赵 ${renderHearts('blacksmith')}</div>
    <div class="npc-text">`;

  if(!gameFlags.blacksmithIntroTip){
    gameFlags.blacksmithIntroTip=true;
    html+=`"哟，来了个江湖人！老赵我打了三十年铁，手艺在这方圆百里没话说。不过我有个规矩——只给有真本事的人打兵器。多来几趟，让我看看你的诚意。"`;
  }else if(wt===0&&at===0){
    html+=`"来来来，看看老赵的手艺。只要材料到位，什么兵器都能给你整利索了。"`;
  }else if(wt>=2||at>=2){
    html+=`"你这身行头，江湖上也没几个人比得上了。要再往上走，得费些功夫和银两。"`;
  }else{
    html+=`"老顾客了，给你打个折……开玩笑的，手艺不打折。"`;
  }

  html+=`</div></div>`;

  let btns=`<div class="actions-bar" id="actions-area">`;

  // Weapon upgrade button
  if(wt<4){
    const wCost=wCosts[wt];
    const canW=player.gold>=wCost&&getAffinityLevel('blacksmith')>=([0,2,3,4][wt]);
    btns+=`<button class="action-btn" ${canW?`onclick="blacksmithWeaponUpgrade()"`:'disabled'} style="border-color:#cd5c5c;color:#cd5c5c">强化武器 · ${wNames[wt]} (${wCost}两)${wt>0?' [第'+(wt+1)+'阶]':''}</button>`;
  }else{
    btns+=`<button class="action-btn" disabled style="border-color:#666;color:#666">武器已臻化境 ✓</button>`;
  }

  // Armor upgrade button
  if(at<4){
    const aCost=aCosts[at];
    const canA=player.gold>=aCost&&getAffinityLevel('blacksmith')>=([0,2,3,4][at]);
    btns+=`<button class="action-btn" ${canA?`onclick="blacksmithArmorUpgrade()"`:'disabled'} style="border-color:#4a8adb;color:#4a8adb">强化防具 · ${aNames[at]} (${aCost}两)${at>0?' [第'+(at+1)+'阶]':''}</button>`;
  }else{
    btns+=`<button class="action-btn" disabled style="border-color:#666;color:#666">防具已臻化境 ✓</button>`;
  }

  // Accessory crafting (after ore quest)
  if(gameFlags.blacksmithOre){
    const canC=player.gold>=200&&getAffinityLevel('blacksmith')>=3;
    btns+=`<button class="action-btn" ${canC?`onclick="blacksmithCraftAccessory()"`:'disabled'} style="border-color:#daa520;color:#daa520">锻造饰品 (200两)</button>`;
  }

  btns+=`<button class="action-btn" onclick="goScene('town')">返回镇上</button>`;
  btns+=`</div>`;

  $('scene-body').innerHTML=html;
  $('actions-area').outerHTML=btns;
}

function blacksmithWeaponUpgrade(){
  const tier=gameFlags.weaponUpTier||0;
  const costs=[50,120,250,500];
  const atkBonus=[4,3,4,5];
  const names=['精淬','百炼','玄铁重铸','天外陨铁'];
  if(tier>=4){showToast('武器已臻化境','info');return}
  const cost=costs[tier];
  if(player.gold<cost){showToast('银两不足','warn');return}
  const affReq=[0,2,3,4];
  if(getAffinityLevel('blacksmith')<affReq[tier]){
    showToast('铁匠好感不足 (需'+(['','相识','熟络','信赖','至交'][affReq[tier]])+')','warn');return;
  }
  player.gold-=cost;
  player.baseAtk+=atkBonus[tier];
  gameFlags.weaponUpTier=tier+1;
  if(gameFlags.weaponUpTier>=1)gameFlags.blacksmithWeaponUp=true;
  addAffinity('blacksmith',5);
  recalcStats();updateUI();
  addLog('铁匠为武器进行了'+names[tier]+'！攻击+'+atkBonus[tier],'important');
  showToast('武器'+names[tier]+'完成！','success');
  renderBlacksmith();
}

function blacksmithArmorUpgrade(){
  const tier=gameFlags.armorUpTier||0;
  const costs=[60,150,300,600];
  const defBonus=[3,3,4,5];
  const hpBonus=[0,20,40,60];
  const names=['加固','精织','玄铁内衬','天蚕宝衣'];
  if(tier>=4){showToast('防具已臻化境','info');return}
  const cost=costs[tier];
  if(player.gold<cost){showToast('银两不足','warn');return}
  const affReq=[0,2,3,4];
  if(getAffinityLevel('blacksmith')<affReq[tier]){
    showToast('铁匠好感不足 (需'+(['','相识','熟络','信赖','至交'][affReq[tier]])+')','warn');return;
  }
  player.gold-=cost;
  player.baseDef+=defBonus[tier];
  if(hpBonus[tier]>0){player.maxHp+=hpBonus[tier];player.hp=Math.min(player.hp+hpBonus[tier],player.maxHp)}
  gameFlags.armorUpTier=tier+1;
  addAffinity('blacksmith',5);
  recalcStats();updateUI();
  addLog('铁匠为防具进行了'+names[tier]+'！防御+'+defBonus[tier]+(hpBonus[tier]?' 生命+'+hpBonus[tier]:''),'important');
  showToast('防具'+names[tier]+'完成！','success');
  renderBlacksmith();
}

function blacksmithCraftAccessory(){
  if(player.gold<200){showToast('银两不足(需200两)','warn');return}
  if(getAffinityLevel('blacksmith')<3){showToast('铁匠好感不足(需信赖)','warn');return}
  player.gold-=200;
  addAffinity('blacksmith',10);
  const wt=getWeaponType();
  let rewardId;
  if(wt==='blade')rewardId='tiger_amulet';
  else if(wt==='hidden')rewardId='spirit_bell';
  else rewardId='jade_ring';
  if(!player.equipInventory.includes(rewardId)&&!Object.values(player.equipment).includes(rewardId)){
    player.equipInventory.push(rewardId);
    addLog('铁匠打造了一件精美饰品！获得'+EQUIPMENT[rewardId].name,'important');
  }else{
    player.gold+=150;
    addLog('铁匠打造了饰品，但你已拥有同类，折价150两','');
  }
  showToast('饰品锻造完成！','success');
  recalcStats();updateUI();renderBlacksmith();
}

function blacksmithOre(){
  if(gameFlags.blacksmithOre)return;
  gameFlags.blacksmithOre=true;

      reward(){
        gameFlags.evt_forest_chest=true;

      reward(){

      <button class="choice-btn" onclick="buyMerchantPendant()"><span class="choice-tag">[购买]</span> "200两？成交！" (需要200两)</button>

// ======================= BATTLE =======================
function randEnemy(pool){return pool[Math.floor(Math.random()*pool.length)]}

function startBattle(eid){
  const t=ENEMIES[eid];
  const sc=1+(player.level-1)*.08;
  const maxMp=Math.floor(t.hp*0.3);
  battleState={
    enemy:{...t,id:eid,hp:Math.floor(t.hp*sc),maxHp:Math.floor(t.hp*sc),atk:Math.floor(t.atk*sc),def:Math.floor(t.def*sc),mp:maxMp,maxMp:maxMp,buffs:[],poison:[],stunned:false},
    turn:'charge',finished:false,turnCount:0,
    playerCharge:0,enemyCharge:0,
    chargeInterval:null,
  };
  player.buffs=[];
  player.poison=[];
  player.buffNextAtk=1;
  $('battle-screen').style.display='flex';
  $('enemy-sprite').textContent=t.icon;
  $('battle-enemy-name').textContent=t.name;
  $('battle-player-name').textContent=player.name;
  $('battle-log').innerHTML='';
  addBattleLog(`${t.name} 出现了！`,'system');
  if(t.hp>=200)addBattleLog('这是一个强大的对手！','system');
  
  const slots=getMaxSkillSlots();
  const weaponEmpty=slots.weapon-player.equippedWeaponSkills.length;
  const innerEmpty=slots.inner-player.equippedInnerSkills.length;
  if(weaponEmpty>0)addBattleLog(`⚠️ 你有空余功法栏位 (${weaponEmpty}个)！`,'system');
  if(innerEmpty>0)addBattleLog(`⚠️ 你有空余心法栏位 (${innerEmpty}个)！`,'system');
  
  addBattleLog('战斗开始！集气满后即可出手！','system');
  updateBattleUI();
  startChargeTick();
}

function updateBattleUI(){
  const e=battleState.enemy;
  $('battle-enemy-hp').style.width=`${(e.hp/e.maxHp)*100}%`;
  $('battle-enemy-hp-text').textContent=`${e.hp}/${e.maxHp}`;
  $('battle-player-hp').style.width=`${(player.hp/player.maxHp)*100}%`;
  $('battle-player-hp-text').textContent=`${player.hp}/${player.maxHp}`;
  $('battle-player-mp-text').textContent=`内力: ${player.mp}/${player.maxMp}`;
  
  $('battle-enemy-stats').textContent=`攻击: ${e.atk} | 防御: ${e.def}`;
  
  const pCharge=Math.min(battleState.playerCharge||0,100);
  const eCharge=Math.min(battleState.enemyCharge||0,100);
  $('battle-player-charge').style.width=`${pCharge}%`;
  $('battle-player-charge-text').textContent=`集气: ${Math.floor(pCharge)}%`;
  $('battle-enemy-charge').style.width=`${eCharge}%`;
  $('battle-enemy-charge-text').textContent=`集气: ${Math.floor(eCharge)}%`;
  
  $('player-sprite').classList.toggle('charged',pCharge>=100);
  $('enemy-sprite').classList.toggle('charged',eCharge>=100);
  
  let pb='';player.buffs.forEach(b=>pb+=`<span class="buff-icon" title="${b.name}">${b.icon}</span>`);
  if(player.poison&&player.poison.length>0)pb+=`<span class="buff-icon" title="中毒">☠️</span>`;
  $('player-buffs').innerHTML=pb;
  let eb='';battleState.enemy.buffs.forEach(b=>eb+=`<span class="buff-icon">${b.icon}</span>`);
  if(battleState.enemy.poison&&battleState.enemy.poison.length>0)eb+=`<span class="buff-icon" title="中毒">☠️</span>`;
  $('enemy-buffs').innerHTML=eb;
}

function addBattleLog(text,cls=''){const a=$('battle-log');const d=document.createElement('div');d.className='battle-log-entry '+cls;d.textContent=text;a.appendChild(d);a.scrollTop=a.scrollHeight}

function startChargeTick(){
  if(battleState.chargeInterval)clearInterval(battleState.chargeInterval);
  battleState.chargeInterval=setInterval(()=>{
    if(battleState.finished){clearInterval(battleState.chargeInterval);return}
    
    const playerRate=player.spd*2.0;
    const enemyRate=battleState.enemy.spd*2.0;
    
    battleState.playerCharge=(battleState.playerCharge||0)+playerRate;
    battleState.enemyCharge=(battleState.enemyCharge||0)+enemyRate;
    
    updateBattleUI();
    
    const pReady=battleState.playerCharge>=100;
    const eReady=battleState.enemyCharge>=100;
    
    if(pReady&&eReady){
      if(player.spd>=battleState.enemy.spd){
        addBattleLog('双方同时集气完毕！你先出手！','system');
        showPlayerActions();
      }else{
        addBattleLog('双方同时集气完毕！敌方先出手！','system');
        setTimeout(()=>enemyTurn(),800);
      }
      clearInterval(battleState.chargeInterval);
    }else if(pReady){
      addBattleLog('集气完毕！你可以行动了！','system');
      showPlayerActions();
      clearInterval(battleState.chargeInterval);
    }else if(eReady){
      addBattleLog(`${battleState.enemy.name} 集气完毕！`,'system');
      setTimeout(()=>enemyTurn(),800);
      clearInterval(battleState.chargeInterval);
    }
  },200);
}

function createParticles(x,y,color,count=8){
  const container=$('battle-particles');
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=(i/count)*Math.PI*2+Math.random()*0.5;
    const dist=30+Math.random()*40;
    p.style.left=x+'px';
    p.style.top=y+'px';
    p.style.backgroundColor=color;
    p.style.setProperty('--tx',Math.cos(angle)*dist+'px');
    p.style.setProperty('--ty',Math.sin(angle)*dist+'px');
    p.style.animationDuration=(0.6+Math.random()*0.4)+'s';
    container.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function showAttackEffect(attacker,target){
  const attackerEl=$(attacker);
  const targetEl=$(target);
  
  attackerEl.classList.add('attack-flash');
  setTimeout(()=>attackerEl.classList.remove('attack-flash'),200);
  
  const rect=targetEl.getBoundingClientRect();
  const centerX=rect.left+rect.width/2;
  const centerY=rect.top+rect.height/2;
  
  createParticles(centerX,centerY,'#ff6600',12);
  
  const line=document.createElement('div');
  line.style.position='fixed';
  line.style.left=attackerEl.getBoundingClientRect().left+attackerEl.offsetWidth/2+'px';
  line.style.top=attackerEl.getBoundingClientRect().top+attackerEl.offsetHeight/2+'px';
  line.style.width='2px';
  line.style.height='20px';
  line.style.background='linear-gradient(to right,#daa520,#ff4444)';
  line.style.zIndex=180;
  line.style.pointerEvents='none';
  line.style.transform=`rotate(${(Math.random()-0.5)*30}deg)`;
  line.style.transition='all 0.3s ease';
  document.body.appendChild(line);
  
  setTimeout(()=>{
    line.style.left=centerX+'px';
    line.style.top=centerY+'px';
    line.style.opacity='0';
    line.style.transform=`rotate(${Math.random()*360}deg) scale(2)`;
  },50);
  
  setTimeout(()=>line.remove(),400);
}

function showHealEffect(target){
  const el=$(target);
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),300);
  
  const rect=el.getBoundingClientRect();
  const centerX=rect.left+rect.width/2;
  const centerY=rect.top+rect.height/2;
  
  for(let i=0;i<6;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=centerX+'px';
    p.style.top=centerY+'px';
    p.style.backgroundColor='#44ff44';
    const angle=(i/6)*Math.PI*2;
    p.style.setProperty('--tx',Math.cos(angle)*60+'px');
    p.style.setProperty('--ty',Math.sin(angle)*60+'px');
    p.style.animationDuration='0.8s';
    $('battle-particles').appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

function showSkillEffect(skillId,target){
  const s=SKILLS[skillId];
  if(!s)return;
  
  const colors={
    sword:'#7cacdb',blade:'#cd5c5c',hidden:'#a040d0',
    fire:'#ff6600',ice:'#44aaff',lightning:'#ffdd00',
    heal:'#44ff44',poison:'#8844aa',dark:'#443355'
  };
  
  let color=colors[s.reqWeapon]||'#daa520';
  if(s.icon==='🔥')color=colors.fire;
  if(s.icon==='❄️')color=colors.ice;
  if(s.icon==='⚡'||s.icon==='🌩')color=colors.lightning;
  if(s.icon==='☠️'||s.icon==='🕷️')color=colors.poison;
  
  const el=$(target);
  const rect=el.getBoundingClientRect();
  const centerX=rect.left+rect.width/2;
  const centerY=rect.top+rect.height/2;
  
  if(s.type==='multi'){
    for(let i=0;i<s.hits;i++){
      setTimeout(()=>{
        createParticles(centerX,centerY,color,6);
        el.classList.add('shake');
        setTimeout(()=>el.classList.remove('shake'),200);
      },i*150);
    }
  }else if(s.type==='heal'){
    showHealEffect(target);
  }else{
    createParticles(centerX,centerY,color,15);
    el.classList.add('shake');
    setTimeout(()=>el.classList.remove('shake'),400);
  }
}

function getBasicAttackSkill(){
  const wt=getWeaponType();
  if(wt==='blade'&&player.skills.includes('basic_blade'))return 'basic_blade';
  if(wt==='hidden'&&player.skills.includes('basic_hidden'))return 'basic_hidden';
  return 'basic_sword';
}

function showPlayerActions(){
  if(battleState.finished)return;
  $('skill-submenu').classList.remove('active');
  const wt=getWeaponType();
  const basicSkill=getBasicAttackSkill();

function battleMeditate(){
  const restore=Math.floor(player.maxMp*0.3);
  const actual=Math.min(restore,player.maxMp-player.mp);
  player.mp=Math.min(player.mp+restore,player.maxMp);
  addBattleLog(`你运功调息，恢复了 ${actual} 点内力`,'system');
  updateBattleUI();updateUI();
  setTimeout(()=>enemyTurn(),600);
}

function showSkillMenu(){
  const wt=getWeaponType();
  const wtName=getWtypeName(wt);
  const basicSkill=getBasicAttackSkill();
  const weaponSkills=[];
  const innerSkills=[];

  player.equippedWeaponSkills.forEach(sid=>{
    const s=SKILLS[sid];
    if(!s)return;
    if(s.reqWeapon===wt){
      weaponSkills.push({id:sid,...s});
    }

  });

  let html='';
  if(weaponSkills.length>0){
    html+=`<div style="color:#daa520;font-size:11px;margin-bottom:4px;text-align:center">— 功法 · ${wtName} —</div>`;
    weaponSkills.forEach(s=>{
      const canUse=player.mp>=s.mp;
      const tierColor=getTierColor(s.tier);
      const tn={huang:'黄',xuan:'玄',di:'地',tian:'天'}[s.tier]||'';
      html+=`<button class="battle-btn skill-btn" style="border-left:3px solid ${tierColor}" ${canUse?`onclick="playerAttack('${s.id}')"`:'disabled'} onmouseenter="showSkillTip(event,'${s.id}')" onmouseleave="hideTip()">
        ${s.icon} ${s.name} <span style="color:#4a8adb;font-size:11px">${s.mp>0?s.mp+'内力':'无消耗'}</span>
        <span style="font-size:10px;color:${tierColor};margin-left:4px">${tn}</span>
      </button>`;
    });
  }
  if(innerSkills.length>0){
    html+=`<div style="color:#9370db;font-size:11px;margin:6px 0 4px;text-align:center">— 心法 —</div>`;
    innerSkills.forEach(s=>{
      const canUse=player.mp>=s.mp;
      const tierColor=getTierColor(s.tier);
      const tn={huang:'黄',xuan:'玄',di:'地',tian:'天'}[s.tier]||'';
      html+=`<button class="battle-btn skill-btn" style="border-left:3px solid ${tierColor}" ${canUse?`onclick="playerAttack('${s.id}')"`:'disabled'} onmouseenter="showSkillTip(event,'${s.id}')" onmouseleave="hideTip()">
        ${s.icon} ${s.name} <span style="color:#4a8adb;font-size:11px">${s.mp>0?s.mp+'内力':'无消耗'}</span>
        <span style="font-size:10px;color:${tierColor};margin-left:4px">${tn}</span>

function showBattleItems(){
  let html='',has=false;
  for(let[id,c]of Object.entries(player.inventory)){
    if(c<=0)continue;has=true;const it=ITEMS[id];
    html+=`<button class="battle-btn" onclick="useBattleItem('${id}')" onmouseenter="showItemTip(event,'${id}','item')" onmouseleave="hideTip()">${it.icon} ${it.name} x${c}</button>`;
  }
  if(!has)html+=`<div style="color:#776644;font-size:13px">没有可用物品</div>`;
  html+=`<button class="battle-btn" onclick="showPlayerActions()">↩ 返回</button>`;
  $('skill-submenu').innerHTML=html;$('skill-submenu').classList.add('active');$('battle-actions').innerHTML='';
