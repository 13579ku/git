// ======================= BATTLE =======================
function randEnemy(pool){return pool[Math.floor(Math.random()*pool.length)]}

function startBattle(eid){
  const t=ENEMIES[eid];
  // 【平衡】原版 hp/atk/def 一律 ×(1+0.08×等级)，到 Lv24 是 2.8 倍 —— BOSS 两下秒人。
  // 现在：生命随等级成长（保证耐战），攻防成长减半并封顶（保证不被秒）。
  const L=player.level-1;
  const D=getDiff();
  const hpSc=Math.min(1+L*0.055,2.2)*D.hp;
  const asSc=Math.min(1+L*0.022,1.55);
  const maxMp=Math.max(90,Math.floor(t.hp*0.35*D.hp));
  battleState={
    enemy:{...t,id:eid,hp:Math.floor(t.hp*hpSc),maxHp:Math.floor(t.hp*hpSc),
      atk:Math.floor(t.atk*asSc*D.atk),
      def:Math.floor(t.def*asSc*D.def*((gameFlags.gy_intel&&(eid==='corpse_thrall'||eid==='corpse_king'))?0.7:1)),
      spd:Math.max(1,Math.round(t.spd*D.spd)),
      mp:maxMp,maxMp:maxMp,buffs:[],poison:[],stunned:false,shield:0,
      skillCd:{},
      healsLeft:(t.hp>=400?3:2),shieldsLeft:3},   // 【平衡】限制 BOSS 回血次数，杜绝无限回血

    turn:'charge',finished:false,turnCount:0,
    playerCharge:0,enemyCharge:0,
    chargeInterval:null,
  };
  player.buffs=[];
  player.poison=[];
  player.buffNextAtk=1;
  player.stunned=false;
  player.momentum=0;
  player.shield=0;
  battleState.enemy.shield=0;
  $('battle-screen').style.display='flex';
  $('enemy-sprite').textContent=t.icon;
  $('battle-enemy-name').textContent=t.name;
  $('battle-player-name').textContent=player.name;
  $('battle-log').innerHTML='';
  addBattleLog(`${t.name} 出现了！`,'system');
  if(isHard())addBattleLog('【血雨腥风】对手气息凌厉，出招老辣——小心。','system');
  if(t.hp>=200)addBattleLog('这是一个强大的对手！','system');
  
  const slots=getMaxSkillSlots();
  const weaponEmpty=slots.weapon-player.equippedWeaponSkills.length;
  const innerEmpty=slots.inner-player.equippedInnerSkills.length;
  if(weaponEmpty>0)addBattleLog(`⚠️ 你有空余功法栏位 (${weaponEmpty}个)！`,'system');
  if(innerEmpty>0)addBattleLog(`⚠️ 你有空余心法栏位 (${innerEmpty}个)！`,'system');
  
  const eqShield=eqSum('startShield');
  const gangShield=hasPassive('p_gang')?0.15:0;
  if(eqShield+gangShield>0){
    player.shield=Math.floor(player.maxHp*(eqShield+gangShield)*pShieldMult());
    addBattleLog(`护壁自生，起手获得 ${player.shield} 点护盾！`,'system');
  }
  const eqMom=eqSum('startMomentum');
  if(eqMom>0){
    player.momentum=Math.min(maxMomentum(),eqMom);
    addBattleLog(`兵器蓄势，起手 ${player.momentum} 层势！`,'system');
  }
  addBattleLog('战斗开始！集气满后即可出手！','system');
  updateBattleUI();
  startChargeTick();
}

function updateBattleUI(){
  const e=battleState.enemy;
  $('battle-enemy-hp').style.width=`${(e.hp/e.maxHp)*100}%`;
  $('battle-enemy-hp-text').textContent=`${e.hp}/${e.maxHp}`;
  $('battle-player-hp').style.width=`${(player.hp/player.maxHp)*100}%`;
  $('battle-player-hp-text').textContent=`${player.hp}/${player.maxHp}`;
  $('battle-player-mp-text').textContent=`内力: ${player.mp}/${player.maxMp}`;
  
  $('battle-enemy-stats').textContent=`攻击: ${e.atk} | 防御: ${e.def}`;
  
  const pCharge=Math.min(battleState.playerCharge||0,100);
  const eCharge=Math.min(battleState.enemyCharge||0,100);
  $('battle-player-charge').style.width=`${pCharge}%`;
  $('battle-player-charge-text').textContent=`集气: ${Math.floor(pCharge)}%`;
  $('battle-enemy-charge').style.width=`${eCharge}%`;
  $('battle-enemy-charge-text').textContent=`集气: ${Math.floor(eCharge)}%`;
  
  $('player-sprite').classList.toggle('charged',pCharge>=100);
  $('enemy-sprite').classList.toggle('charged',eCharge>=100);

  // —— 护盾：血条覆盖层 + 角色气壁 + 醒目数值 ——
  const ps=player.shield||0, es=battleState.enemy.shield||0;
  $('battle-player-shield-bar').style.width=Math.min(100,(ps/player.maxHp)*100)+'%';
  $('battle-enemy-shield-bar').style.width=Math.min(100,(es/battleState.enemy.maxHp)*100)+'%';
  $('player-sprite').classList.toggle('shielded',ps>0);
  $('enemy-sprite').classList.toggle('shielded',es>0);

  let px='';
  if(ps>0)px+=`<span class="bx-shield">🛡 护盾 ${ps}</span>`;
  if(player.momentum>0)px+=`<span class="bx-mom">💢 势 ${player.momentum}/${maxMomentum()}</span>`;
  $('battle-player-extra').innerHTML=px;
  $('battle-enemy-extra').innerHTML=es>0?`<span class="bx-shield">🛡 护盾 ${es}</span>`:'';
  
  let pb='';player.buffs.forEach(b=>pb+=`<span class="buff-icon" title="${b.name}">${b.icon}</span>`);
  if(player.poison&&player.poison.length>0)pb+=`<span class="buff-icon" title="中毒">☠️</span>`;
  $('player-buffs').innerHTML=pb;
  let eb='';battleState.enemy.buffs.forEach(b=>eb+=`<span class="buff-icon">${b.icon}</span>`);
  if(battleState.enemy.poison&&battleState.enemy.poison.length>0)eb+=`<span class="buff-icon" title="中毒">☠️</span>`;
  $('enemy-buffs').innerHTML=eb;
}

function addBattleLog(text,cls=''){const a=$('battle-log');const d=document.createElement('div');d.className='battle-log-entry '+cls;d.textContent=text;a.appendChild(d);a.scrollTop=a.scrollHeight}

function startChargeTick(){
  if(battleState.chargeInterval)clearInterval(battleState.chargeInterval);
  battleState.chargeInterval=setInterval(()=>{
    if(battleState.finished){clearInterval(battleState.chargeInterval);return}
    
    const playerRate=player.spd*2.0*pChargeMult();
    const enemyRate=battleState.enemy.spd*2.0;
    
    battleState.playerCharge=(battleState.playerCharge||0)+playerRate;
    battleState.enemyCharge=(battleState.enemyCharge||0)+enemyRate;
    
    updateBattleUI();
    
    const pReady=battleState.playerCharge>=100;
    const eReady=battleState.enemyCharge>=100;
    
    if(pReady&&eReady){
      if(player.spd>=battleState.enemy.spd){
        addBattleLog('双方同时集气完毕！你先出手！','system');
        showPlayerActions();
      }else{
        addBattleLog('双方同时集气完毕！敌方先出手！','system');
        setTimeout(()=>enemyTurn(),800);
      }
      clearInterval(battleState.chargeInterval);
    }else if(pReady){
      addBattleLog('集气完毕！你可以行动了！','system');
      showPlayerActions();
      clearInterval(battleState.chargeInterval);
    }else if(eReady){
      addBattleLog(`${battleState.enemy.name} 集气完毕！`,'system');
      setTimeout(()=>enemyTurn(),800);
      clearInterval(battleState.chargeInterval);
    }
  },200);
}

function createParticles(x,y,color,count=8){
  const container=$('battle-particles');
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=(i/count)*Math.PI*2+Math.random()*0.5;
    const dist=30+Math.random()*40;
    p.style.left=x+'px';
    p.style.top=y+'px';
    p.style.backgroundColor=color;
    p.style.setProperty('--tx',Math.cos(angle)*dist+'px');
    p.style.setProperty('--ty',Math.sin(angle)*dist+'px');
    p.style.animationDuration=(0.6+Math.random()*0.4)+'s';
    container.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function showAttackEffect(attacker,target){
  const attackerEl=$(attacker);
  const targetEl=$(target);
  
  attackerEl.classList.add('attack-flash');
  setTimeout(()=>attackerEl.classList.remove('attack-flash'),200);
  
  const rect=targetEl.getBoundingClientRect();
  const centerX=rect.left+rect.width/2;
  const centerY=rect.top+rect.height/2;
  
  createParticles(centerX,centerY,'#ff6600',12);
  
  const line=document.createElement('div');
  line.style.position='fixed';
  line.style.left=attackerEl.getBoundingClientRect().left+attackerEl.offsetWidth/2+'px';
  line.style.top=attackerEl.getBoundingClientRect().top+attackerEl.offsetHeight/2+'px';
  line.style.width='2px';
  line.style.height='20px';
  line.style.background='linear-gradient(to right,#daa520,#ff4444)';
  line.style.zIndex=180;
  line.style.pointerEvents='none';
  line.style.transform=`rotate(${(Math.random()-0.5)*30}deg)`;
  line.style.transition='all 0.3s ease';
  document.body.appendChild(line);
  
  setTimeout(()=>{
    line.style.left=centerX+'px';
    line.style.top=centerY+'px';
    line.style.opacity='0';
    line.style.transform=`rotate(${Math.random()*360}deg) scale(2)`;
  },50);
  
  setTimeout(()=>line.remove(),400);
}

function showHealEffect(target){
  const el=$(target);
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),300);
  
  const rect=el.getBoundingClientRect();
  const centerX=rect.left+rect.width/2;
  const centerY=rect.top+rect.height/2;
  
  for(let i=0;i<6;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=centerX+'px';
    p.style.top=centerY+'px';
    p.style.backgroundColor='#44ff44';
    const angle=(i/6)*Math.PI*2;
    p.style.setProperty('--tx',Math.cos(angle)*60+'px');
    p.style.setProperty('--ty',Math.sin(angle)*60+'px');
    p.style.animationDuration='0.8s';
    $('battle-particles').appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

// 【修复】原版调用了 showHitEffect 却从未定义 —— 任何连击招式都会抛异常并卡死战斗
function showHitEffect(target){
  const el=$(target);
  if(!el)return;
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),120);
  const r=el.getBoundingClientRect();

function showSkillEffect(skillId,target){
  const s=SKILLS[skillId];
  if(!s)return;
  
  const colors={
    sword:'#7cacdb',blade:'#cd5c5c',hidden:'#a040d0',
    fire:'#ff6600',ice:'#44aaff',lightning:'#ffdd00',
    heal:'#44ff44',poison:'#8844aa',dark:'#443355'
  };
  
  let color=colors[s.reqWeapon]||'#daa520';
  if(s.icon==='🔥')color=colors.fire;
  if(s.icon==='❄️')color=colors.ice;
  if(s.icon==='⚡'||s.icon==='🌩')color=colors.lightning;
  if(s.icon==='☠️'||s.icon==='🕷️')color=colors.poison;
  
  const el=$(target);
  const rect=el.getBoundingClientRect();
  const centerX=rect.left+rect.width/2;
  const centerY=rect.top+rect.height/2;
  
  if(s.type==='multi'){
    for(let i=0;i<s.hits;i++){
      setTimeout(()=>{
        createParticles(centerX,centerY,color,6);
        el.classList.add('shake');
        setTimeout(()=>el.classList.remove('shake'),200);
      },i*150);
    }
  }else if(s.type==='heal'){
    showHealEffect(target);
  }else{
    createParticles(centerX,centerY,color,15);
    el.classList.add('shake');
    setTimeout(()=>el.classList.remove('shake'),400);
  }
}

function getBasicAttackSkill(){
  const wt=getWeaponType();
  if(wt==='blade'&&player.skills.includes('basic_blade'))return 'basic_blade';
  if(wt==='hidden'&&player.skills.includes('basic_hidden'))return 'basic_hidden';
  return 'basic_sword';
}

function showPlayerActions(){
  if(battleState.finished)return;
  if(player.stunned){
    player.stunned=false;
    addBattleLog('你处于眩晕状态，跳过了这次出手！','system');
    $('battle-actions').innerHTML='<div style="color:#776644;font-size:13px">眩晕中...</div>';
    setTimeout(()=>finishAttack(),700);
    return;
  }
  $('skill-submenu').classList.remove('active');
  const wt=getWeaponType();
  const basicSkill=getBasicAttackSkill();
  const bs=SKILLS[basicSkill];
  $('battle-actions').innerHTML=`
    <button class="battle-btn" onclick="playerAttack('${basicSkill}')">${bs.icon} ${bs.name} <span class="wtype-tag ${getWtypeClass(wt)}" style="font-size:8px">${getWtypeName(wt)}</span></button>
    <button class="battle-btn" onclick="showSkillMenu()">✦ 武学</button>
    <button class="battle-btn" onclick="battleMeditate()">💠 调息</button>
    <button class="battle-btn" onclick="showBattleItems()">🧪 物品</button>
    <button class="battle-btn" onclick="tryFlee()">🏃 逃跑</button>`;
}

function battleMeditate(){
  const restore=Math.floor(player.maxMp*0.35);
  const actual=Math.min(restore,player.maxMp-player.mp);
  player.mp=Math.min(player.mp+restore,player.maxMp);
  addBattleLog(`你运功调息，恢复了 ${actual} 点内力`,'system');
  finishAttack(); // 修复：调息也是一次行动，应重置集气而非白送敌人一回合
}

function showSkillMenu(){
  const wt=getWeaponType();
  const wtName=getWtypeName(wt);
  const basicSkill=getBasicAttackSkill();
  const weaponSkills=[];
  const innerSkills=[];

  player.equippedWeaponSkills.forEach(sid=>{
    const s=SKILLS[sid];
    if(!s)return;
    if(s.reqWeapon===wt){
      weaponSkills.push({id:sid,...s});
    }
  });

  player.equippedInnerSkills.forEach(sid=>{
    const s=SKILLS[sid];
    if(!s)return;
    innerSkills.push({id:sid,...s});
  });

  let html='';
  if(weaponSkills.length>0){
    html+=`<div style="color:#daa520;font-size:11px;margin-bottom:4px;text-align:center">— 功法 · ${wtName} —</div>`;
    weaponSkills.forEach(s=>{
      const canUse=player.mp>=s.mp;
      const tierColor=getTierColor(s.tier);
      const tn={huang:'黄',xuan:'玄',di:'地',tian:'天'}[s.tier]||'';
      html+=`<button class="battle-btn skill-btn" style="border-left:3px solid ${tierColor}" ${canUse?`onclick="playerAttack('${s.id}')"`:'disabled'} onmouseenter="showSkillTip(event,'${s.id}')" onmouseleave="hideTip()">
        ${s.icon} ${s.name} <span style="color:#4a8adb;font-size:11px">${s.mp>0?s.mp+'内力':'无消耗'}</span>
        <span style="font-size:10px;color:${tierColor};margin-left:4px">${tn}</span>
      </button>`;
    });
  }
  if(innerSkills.length>0){
    html+=`<div style="color:#9370db;font-size:11px;margin:6px 0 4px;text-align:center">— 心法 —</div>`;
    innerSkills.forEach(s=>{
      const canUse=player.mp>=s.mp;
      const tierColor=getTierColor(s.tier);
      const tn={huang:'黄',xuan:'玄',di:'地',tian:'天'}[s.tier]||'';
      html+=`<button class="battle-btn skill-btn" style="border-left:3px solid ${tierColor}" ${canUse?`onclick="playerAttack('${s.id}')"`:'disabled'} onmouseenter="showSkillTip(event,'${s.id}')" onmouseleave="hideTip()">
        ${s.icon} ${s.name} <span style="color:#4a8adb;font-size:11px">${s.mp>0?s.mp+'内力':'无消耗'}</span>
        <span style="font-size:10px;color:${tierColor};margin-left:4px">${tn}</span>
      </button>`;
    });
  }
  if(weaponSkills.length===0&&innerSkills.length===0){
    html+=`<div style="color:#776644;font-size:13px;text-align:center;padding:8px 0">无可用武学</div>`;
  }
  html+=`<button class="battle-btn" onclick="hideSkillSubmenu()">↩ 返回</button>`;
  $('skill-submenu').innerHTML=html;$('skill-submenu').classList.add('active');$('battle-actions').innerHTML='';
}

function hideSkillSubmenu(){$('skill-submenu').classList.remove('active');showPlayerActions()}

function showBattleItems(){
  let html='',has=false;
  for(let[id,c]of Object.entries(player.inventory)){
    if(c<=0)continue;has=true;const it=ITEMS[id];
    html+=`<button class="battle-btn" onclick="useBattleItem('${id}')" onmouseenter="showItemTip(event,'${id}','item')" onmouseleave="hideTip()">${it.icon} ${it.name} x${c}</button>`;
  }
  if(!has)html+=`<div style="color:#776644;font-size:13px">没有可用物品</div>`;
  html+=`<button class="battle-btn" onclick="showPlayerActions()">↩ 返回</button>`;
  $('skill-submenu').innerHTML=html;$('skill-submenu').classList.add('active');$('battle-actions').innerHTML='';
}

function useBattleItem(id){
  useItem(id);addBattleLog(`使用了 ${ITEMS[id].name}`,'player-action');
  $('skill-submenu').classList.remove('active');
  finishAttack();
}


// ======================= 装备特效汇总 =======================
// 把 4 个装备槽上的同名特效相加
// 装备的基础数值
function eqBaseStats(eq){
  const st=[];
  if(eq.atk)st.push('攻击 +'+eq.atk);
  if(eq.def)st.push('防御 +'+eq.def);
  if(eq.spd)st.push('集气 +'+eq.spd);
  if(eq.hp)st.push('生命 +'+eq.hp);
  if(eq.mp)st.push('内力 +'+eq.mp);
  return st;
}
// 装备的特效（非纯数值）
function eqSpecials(eq){
  const st=[];
  if(eq.drain)st.push('吸血 '+Math.round(eq.drain*100)+'%');
  if(eq.poisonHit)st.push('命中附毒 '+eq.poisonHit.dmg+'/回合 ×'+eq.poisonHit.turns);
  if(eq.poisonBoost)st.push('毒伤与引爆 +'+Math.round(eq.poisonBoost*100)+'%');
  if(eq.critBonus)st.push('暴击率 +'+Math.round(eq.critBonus*100)+'%');
  if(eq.critDmg)st.push('暴击伤害 +'+Math.round(eq.critDmg*100)+'%');
  if(eq.dodge)st.push('闪避 +'+eq.dodge+'%');
  if(eq.chargeRate)st.push('集气速率 +'+Math.round(eq.chargeRate*100)+'%');
  if(eq.startShield)st.push('开战自带护盾 '+Math.round(eq.startShield*100)+'%');
  if(eq.startMomentum)st.push('开战自带 '+eq.startMomentum+' 层势');
  if(eq.regenPct)st.push('每回合回复 '+Math.round(eq.regenPct*100)+'% 生命');
  if(eq.mpRegenPct)st.push('每回合回复 '+Math.round(eq.mpRegenPct*100)+'% 内力');
  if(eq.reflect)st.push('反弹 '+Math.round(eq.reflect*100)+'% 伤害');
  if(eq.stunHit)st.push('命中 '+Math.round(eq.stunHit*100)+'% 概率眩晕');
  if(eq.armorBreakHit)st.push('命中破防 -'+Math.round(eq.armorBreakHit.val*100)+'% (×'+eq.armorBreakHit.turns+')');
  if(eq.execBonus)st.push('斩杀增伤 +'+Math.round(eq.execBonus*100)+'%');
  return st;
}

function eqSum(field){
  let v=0;
  for(const slot of ['weapon','armor','accessory1','accessory2']){
    const id=player.equipment[slot];
    if(!id)continue;
    const eq=EQUIPMENT[id];
    if(eq&&typeof eq[field]==='number')v+=eq[field];
  }
  return v;
}
// 取出所有带某个对象型特效的装备（如 armorBreakHit / poisonHit）
function eqEffects(field){
  const out=[];
  for(const slot of ['weapon','armor','accessory1','accessory2']){
    const id=player.equipment[slot];
    if(!id)continue;
    const eq=EQUIPMENT[id];
    if(eq&&eq[field])out.push(eq[field]);
  }
  return out;
}

// ======================= 被动（心诀）效果 =======================
function pCritBonus(){return hasPassive('p_sword_heart')?0.15:0}
function pCritDmgBonus(){return (hasPassive('p_sword_heart')?0.25:0)+eqSum('critDmg')}
function pLifesteal(){return hasPassive('p_blood')?0.08:0}
function pPoisonMult(){return (hasPassive('p_venom')?1.6:1)+eqSum('poisonBoost')}
function pDetonateMult(){return (hasPassive('p_venom')?1.5:1)+eqSum('poisonBoost')}
function pChargeMult(){return (hasPassive('p_swift')?1.35:1)*(1+eqSum('chargeRate'))}
function pDmgTaken(){return hasPassive('p_iron')?0.85:1}
function pShieldMult(){return hasPassive('p_gang')?1.5:1}
function pComboMult(){return hasPassive('p_combo')?1.2:1}
function pExecBonus(){return (hasPassive('p_exec')?0.25:0)+eqSum('execBonus')}
function maxMomentum(){return hasPassive('p_momentum')?10:6}

function getCritChance(){
  let c=0.15+pCritBonus()+eqSum('critBonus');
  player.buffs.forEach(b=>{if(b.key==='critBuff')c+=b.val/100});
  return Math.min(c,0.8);
}
function addMomentum(v){
  player.momentum=Math.min(maxMomentum(),(player.momentum||0)+v);
  addBattleLog(`蓄势 +${v}（当前 ${player.momentum} 层）`,'system');
}

// ======================= 属性结算 =======================
function getEffectiveDef(target,isEnemy){
  let def=isEnemy?battleState.enemy.def:player.def;
  const buffs=isEnemy?battleState.enemy.buffs:player.buffs;
  buffs.forEach(b=>{
    if(b.key==='defBuff')def+=def*b.val;
    if(b.key==='swordParry')def+=def*b.val;
    if(b.key==='ironShirt')def+=def*b.val;
    if(b.key==='taijiBarrier')def+=def*b.val;
    if(b.key==='thunderStrike')def-=def*b.val;
    if(b.key==='armorBreak')def-=def*b.val;   // 新：破防
  });
  return Math.max(def,0);
}
function getEffectiveAtk(isEnemy){
  let atk=isEnemy?battleState.enemy.atk:player.atk;
  const buffs=isEnemy?battleState.enemy.buffs:player.buffs;
  buffs.forEach(b=>{
    if(b.key==='flamePalm'||b.key==='nineYang'||b.key==='eagleEye'||b.key==='rage')atk+=atk*b.val;
    if(b.key==='thunderStrike')atk-=atk*b.val;
  });
  return Math.max(atk,1);
}
function getDodgeChance(isEnemy){
  const buffs=isEnemy?battleState.enemy.buffs:player.buffs;
  let dodge=0;
  buffs.forEach(b=>{if(b.key==='dodge'||b.key==='smoke'||b.key==='cloudStep')dodge+=b.val});
  if(!isEnemy)dodge+=eqSum('dodge');   // 装备闪避
  return Math.min(dodge,75);
}

// ======================= 护盾 / 伤害落地 =======================
function grantShield(pct,who){
  const t=who==='enemy'?battleState.enemy:player;
  const cap=Math.floor(t.maxHp*(who==='enemy'?0.35:0.6)); // 【平衡】护盾封顶，杜绝无限叠盾拖死战斗
  const amt=Math.min(Math.floor(t.maxHp*pct*(who==='enemy'?1:pShieldMult())),Math.max(0,cap-(t.shield||0)));
  if(amt<=0){addBattleLog('护盾已达上限','system');return 0}
  t.shield=(t.shield||0)+amt;
  addBattleLog(`🛡 ${who==='enemy'?battleState.enemy.name:'你'}凝聚出 ${amt} 点护盾！`,who==='enemy'?'enemy-action':'player-action');
  const spriteId=who==='enemy'?'enemy-sprite':'player-sprite';
  shieldBurst(spriteId);
  showDamageFloat($(spriteId),amt,false,'shield');
  return amt;
}
// 返回实际扣血量
function damageEnemy(dmg){
  const e=battleState.enemy;
  if(e.shield>0){
    const absorb=Math.min(e.shield,dmg);
    e.shield-=absorb;dmg-=absorb;
    if(absorb>0){
      addBattleLog(`🛡 护盾吸收了 ${absorb} 点伤害`,'system');
      showDamageFloat($('enemy-sprite'),absorb,false,'absorb');
      if(e.shield<=0)addBattleLog(`💥 ${e.name} 的护盾碎了！`,'system');
    }
  }
  e.hp=Math.max(e.hp-dmg,0);
  return dmg;
}
function damagePlayer(dmg){
  dmg=Math.floor(dmg*pDmgTaken());
  if(player.shield>0){
    const absorb=Math.min(player.shield,dmg);
    player.shield-=absorb;dmg-=absorb;
    if(absorb>0){
      addBattleLog(`🛡 你的护盾吸收了 ${absorb} 点伤害`,'system');
      showDamageFloat($('player-sprite'),absorb,false,'absorb');
      if(player.shield<=0)addBattleLog('💥 你的护盾碎了！','system');
    }
  }
  player.hp=Math.max(player.hp-dmg,0);
  return dmg;
}

// ======================= 玩家单次伤害计算 =======================
function calcPlayerHit(s,opts){
  opts=opts||{};
  const e=battleState.enemy;
  // 【平衡】连击技能的防御减免按段数摊薄。
  // 否则每一段都减一次全额防御，遇到高防敌人时每段伤害被压到 1 —— 连击流直接废掉。
  const hits=Math.max(1,opts.hits||1);
  const eDef=s.trueDmg?0:getEffectiveDef(e,true)*0.5*(1-(s.pierce||0))/hits;
  let dmg=getEffectiveAtk(false)*(s.mult||1)-eDef;
  // 蓄势倾泻
  if(s.consumeMomentum&&player.momentum>0)dmg*=(1+player.momentum*s.consumeMomentum);
  // 斩杀
  const execHp=s.execute?s.execute.hp:0;
  if(s.execute&&e.hp/e.maxHp<=s.execute.hp)dmg*=s.execute.mult;
  // 心诀·索命
  if(e.hp/e.maxHp<=0.4)dmg*=(1+pExecBonus());
  // 蓄势 buff
  dmg*=player.buffNextAtk||1;
  // 连击递增 / 连绵
  if(opts.crescendo)dmg*=opts.crescendo;
  if(opts.isCombo)dmg*=pComboMult();
  dmg=Math.max(Math.floor(dmg),1);
  // 暴击
  let crit=false;
  if(opts.forceCrit||Math.random()<getCritChance()){
    crit=true;
    dmg=Math.floor(dmg*(1.5+pCritDmgBonus()));
  }
  return {dmg,crit};
}

function applyPoisonToEnemy(s){
  if(!s.poison)return;
  if(s.poisonChance&&Math.random()>=s.poisonChance)return;
  const e=battleState.enemy;
  if(!e.poison)e.poison=[];
  const stacks=s.poisonStacks||1;
  for(let i=0;i<stacks;i++){
    e.poison.push({dmg:s.poison.dmg,turns:s.poison.turns});
    if(e.poison.length>8)e.poison.shift();
  }
  addBattleLog(`${e.name} 中毒了！(毒伤 ${e.poison.length} 层)`,'system');
}

// ======================= 回合结束：状态结算 =======================
function tickBuffs(isEnemy){
  const t=isEnemy?battleState.enemy:player;
  const buffs=t.buffs;
  const name=isEnemy?battleState.enemy.name:'你';
  const sprite=isEnemy?$('enemy-sprite'):$('player-sprite');

  // 中毒
  if(t.poison&&t.poison.length>0){
    let total=0;
    for(let i=t.poison.length-1;i>=0;i--){
      t.poison[i].turns--;
      total+=t.poison[i].dmg;
      if(t.poison[i].turns<=0)t.poison.splice(i,1);
    }
    if(total>0){
      if(isEnemy)total=Math.floor(total*pPoisonMult()); // 心诀·毒发
      if(isEnemy)damageEnemy(total);else damagePlayer(total);
      addBattleLog(`${name}受到 ${total} 点毒伤！(剩 ${t.poison.length} 层)`,'system');
      showDamageFloat(sprite,total,false,'poison');
    }
  }
  // 持续回复 / 狂血自伤
  buffs.forEach(b=>{
    if(b.key==='regen'){
      const h=Math.floor(t.maxHp*b.val);
      t.hp=Math.min(t.hp+h,t.maxHp);
      addBattleLog(`${name}回复了 ${h} 点生命`,'heal');
      showDamageFloat(sprite,h,true);
    }
    if(b.key==='rage'&&b.selfBleed){
      const d=Math.floor(t.maxHp*b.selfBleed);
      t.hp=Math.max(t.hp-d,1);
      addBattleLog(`${name}气血翻腾，自损 ${d} 点生命`,'damage');
    }
  });
  // 玩家专属被动
  if(!isEnemy){
    if(hasPassive('p_momentum')){player.momentum=Math.min(maxMomentum(),(player.momentum||0)+1)}
    const mpR=(hasPassive('p_qi_sea')?0.05:0)+eqSum('mpRegenPct');
    if(mpR>0&&player.mp<player.maxMp){
      const m=Math.floor(player.maxMp*mpR);
      player.mp=Math.min(player.mp+m,player.maxMp);
    }
    const hpR=eqSum('regenPct');
    if(hpR>0&&player.hp<player.maxHp){
      const h=Math.floor(player.maxHp*hpR);
      player.hp=Math.min(player.hp+h,player.maxHp);
      addBattleLog(`装备温养，回复 ${h} 点生命`,'heal');
    }
  }
  for(let i=buffs.length-1;i>=0;i--){
    buffs[i].dur--;
    if(buffs[i].dur<=0)buffs.splice(i,1);
  }
}

// ======================= 玩家行动 =======================
function playerAttack(sid){
  const s=SKILLS[sid];
  const e=battleState.enemy;
  // 消耗：内力 or 气血
  if(s.hpCost){
    const cost=Math.floor(player.hp*s.hpCost);
    if(player.hp-cost<1){addBattleLog('气血不足，无法施展！','system');return}
    player.hp-=cost;
    addBattleLog(`${s.name} 以 ${cost} 点气血为引！`,'system');
    showDamageFloat($('player-sprite'),cost,false);
  }
  if(player.mp<(s.mp||0)){addBattleLog('内力不足！','system');return}
  player.mp-=(s.mp||0);
  $('skill-submenu').classList.remove('active');hideTip();

  // 旧式自伤
  if(s.selfDmg){
    const c=Math.floor(player.hp*s.selfDmg);
    player.hp=Math.max(player.hp-c,1);
    addBattleLog(`${s.name} 消耗了 ${c} 生命！`,'system');
    showDamageFloat($('player-sprite'),c,false);
  }

  // —— 通用附带效果（集气 / 蓄势 / 护盾）——
  const applyExtras=()=>{
    if(s.chargeGain){
      battleState.playerCharge=Math.min(100,(battleState.playerCharge||0)+s.chargeGain);
      addBattleLog(`身法提气，集气 +${s.chargeGain}%！`,'player-action');
    }
    if(s.chargeDrain){
      battleState.enemyCharge=Math.max(0,(battleState.enemyCharge||0)-s.chargeDrain);
      addBattleLog(`${e.name} 的气机被打断，集气 -${s.chargeDrain}%！`,'player-action');
    }
    if(s.momentumGain)addMomentum(s.momentumGain);
    if(s.shield)grantShield(s.shield,'player');
  };

  const eDodge=getDodgeChance(true);

  if(s.type==='detonate'){
    // ===== 毒层引爆 =====
    if(!e.poison||e.poison.length===0){
      addBattleLog('敌人身上没有毒，引爆落空！','system');
    }else{
      let total=0;
      e.poison.forEach(pz=>{total+=pz.dmg});
      // 【平衡】线性于毒层总量（原设计含层数二次项，会指数爆炸）
      const dmg=Math.floor(total*(s.detonateMult||2)*pDetonateMult()+getEffectiveAtk(false)*0.5);
      e.poison=[];
      damageEnemy(dmg);
      addBattleLog(`${s.name}！全部毒力轰然炸开，造成 ${dmg} 伤害！`,'player-action');
      showDamageFloat($('enemy-sprite'),dmg,false,'poison');
      showSkillEffect(sid,'enemy-sprite');
      if(pLifesteal()>0){const h=Math.floor(dmg*pLifesteal());player.hp=Math.min(player.hp+h,player.maxHp);showDamageFloat($('player-sprite'),h,true)}
    }
    applyExtras();
  }else if(s.type==='heal'){
    const heal=Math.floor(player.maxHp*(s.healMult||0)+player.atk*.3);
    player.hp=Math.min(player.hp+heal,player.maxHp);
    addBattleLog(`施展 ${s.name}，恢复 ${heal} 生命！`,'player-action');
    showDamageFloat($('player-sprite'),heal,true);
    showHealEffect('player-sprite');
    if(s.mpRestore){
      const m=Math.floor(player.maxMp*s.mpRestore);
      player.mp=Math.min(player.mp+m,player.maxMp);
      addBattleLog(`同时恢复了 ${m} 点内力！`,'system');
    }
    if(s.curePoison&&player.poison&&player.poison.length){player.poison=[];addBattleLog('毒伤已清除！','system')}
    if(s.cleanse){
      const before=player.buffs.length;
      player.buffs=player.buffs.filter(b=>!['thunderStrike','starDrain'].includes(b.key));
      if(before!==player.buffs.length)addBattleLog('负面状态已被洗去！','system');
    }
    if(s.regen)player.buffs.push({key:'regen',val:s.regen.val,dur:s.regen.turns,icon:'🐢',name:'持续回复'});
    if(s.selfBuff)player.buffs.push({key:s.selfBuff.key,val:s.selfBuff.atkMult,dur:s.selfBuff.dur,icon:s.icon,name:s.name});
    applyExtras();
  }else if(s.type==='debuff'){
    e.buffs.push({key:s.debuffKey,val:s.debuffVal,dur:s.debuffDur,icon:s.icon,name:s.name});
    addBattleLog(`你施展 ${s.name}！${e.name} 被削弱了！`,'player-action');
    showSkillEffect(sid,'enemy-sprite');
    applyExtras();
  }else if(s.type==='buff'){
    if(s.buffKey)player.buffs.push({key:s.buffKey,val:s.buffVal,dur:s.buffDur,icon:s.icon,name:s.name,reflect:s.reflect||0,selfBleed:s.selfBleed||0});
    if(s.buffKey==='nextAtk')player.buffNextAtk=s.buffVal;
    if(s.regen)player.buffs.push({key:'regen',val:s.regen.val,dur:s.regen.turns,icon:'🐢',name:'持续回复'});
    if(s.critBuff)player.buffs.push({key:'critBuff',val:s.critBuff.val,dur:s.critBuff.turns,icon:'👁',name:'暴击提升'});
    if(s.counterStance)player.buffs.push({key:'counterStance',val:s.counterStance.mult,dur:s.counterStance.turns,icon:'🔄',name:'反击姿态'});
    addBattleLog(`施展 ${s.name}！${s.desc||s.flavor||''}`,'player-action');
    showSkillEffect(sid,'player-sprite');
    applyExtras();
  }else if(s.type==='multi'){
    const hits=s.hits||1;
    let hitsRemaining=hits,idx=0,totalDmg=0;
    addBattleLog(`施展 ${s.name}！`,'player-action');
    const doHit=()=>{
      if(hitsRemaining<=0){
        player.buffNextAtk=1;
        if(s.consumeMomentum)player.momentum=0;
        addBattleLog(`${s.name} 连击 ${hits} 次，共造成 ${totalDmg} 伤害！`,'player-action');
        showDamageFloat($('enemy-sprite'),totalDmg,false);
        showSkillEffect(sid,'enemy-sprite');
        applyWeaponBonus(totalDmg);
        if(pLifesteal()>0&&totalDmg>0){const h=Math.floor(totalDmg*pLifesteal());player.hp=Math.min(player.hp+h,player.maxHp);showDamageFloat($('player-sprite'),h,true)}
        if(s.mpDrain&&totalDmg>0){const m=Math.floor(totalDmg*s.mpDrain);player.mp=Math.min(player.mp+m,player.maxMp);addBattleLog(`吸取了 ${m} 点内力！`,'player-action')}
        applyExtras();
        finishAttack();
        return;
      }
      const dodged=s.ignoreDodge?false:(Math.random()*100<eDodge);
      if(dodged){
        showDamageFloat($('enemy-sprite'),0,false,'miss');
      }else{
        const cre=s.crescendo?Math.pow(1+s.crescendo,idx):1;
        const r=calcPlayerHit(s,{crescendo:cre,isCombo:true,hits:hits,forceCrit:(s.lastHitCrit&&hitsRemaining===1)});
        totalDmg+=damageEnemy(r.dmg);
        if(r.crit)addBattleLog('暴击！','system');
        showDamageFloat($('enemy-sprite'),r.dmg,false);
        showHitEffect('enemy-sprite');
        applyPoisonToEnemy(s);
        if(idx===0)applyWeaponPoisonHit();   // 连击只在首段触发装备命中特效
        if(s.armorBreak)e.buffs.push({key:'armorBreak',val:s.armorBreak.val,dur:s.armorBreak.turns,icon:'⛏',name:'破防'});
      }
      idx++;hitsRemaining--;
      if(e.hp<=0){hitsRemaining=0}
      setTimeout(doHit,170);
    };
    doHit();
    return;
  }else{
    // ===== 单体攻击 =====
    if(!s.ignoreDodge&&Math.random()*100<eDodge){
      addBattleLog(`${s.name} 被闪避了！`,'system');
      showDamageFloat($('enemy-sprite'),0,false,'miss');
    }else{
      if(player.buffNextAtk>1)addBattleLog('蓄势一击！','system');
      const r=calcPlayerHit(s,{});
      if(r.crit)addBattleLog('暴击！','system');
      if(s.consumeMomentum&&player.momentum>0){
        addBattleLog(`倾泻 ${player.momentum} 层势！`,'player-action');
        player.momentum=0;
      }
      player.buffNextAtk=1;
      const real=damageEnemy(r.dmg);
      addBattleLog(`${s.name} 造成 ${r.dmg} 伤害！${s.trueDmg?'（真伤·无视防御）':''}`,'player-action');
      showDamageFloat($('enemy-sprite'),r.dmg,false);
      showSkillEffect(sid,'enemy-sprite');
      applyPoisonToEnemy(s);
      if(s.armorBreak){
        e.buffs.push({key:'armorBreak',val:s.armorBreak.val,dur:s.armorBreak.turns,icon:'⛏',name:'破防'});
        addBattleLog(`${e.name} 的防御被劈开了！`,'system');
      }
      if(s.stun&&Math.random()<s.stun){
        e.stunned=true;
        addBattleLog(`${e.name} 被震住了，将跳过下一回合！`,'system');
      }
      applyWeaponBonus(r.dmg);
      applyWeaponPoisonHit();
      const totalHeal=(s.drain||0)+pLifesteal();
      if(totalHeal>0){
        const h=Math.floor(r.dmg*totalHeal);
        player.hp=Math.min(player.hp+h,player.maxHp);
        addBattleLog(`吸取了 ${h} 生命！`,'player-action');
        showDamageFloat($('player-sprite'),h,true);
      }
      if(s.mpDrain){
        const m=Math.floor(r.dmg*s.mpDrain);
        const stolen=Math.min(m,e.mp);
        e.mp=Math.max(0,e.mp-stolen);
        player.mp=Math.min(player.mp+m,player.maxMp);
        addBattleLog(`化去 ${m} 点内力据为己有！`,'player-action');
      }
    }
    applyExtras();
  }

  updateBattleUI();updateUI();
  if(e.hp<=0){setTimeout(()=>endBattle(true),800);return}
  finishAttack();
}

function finishAttack(){
  updateBattleUI();updateUI();
  if(battleState.enemy.hp<=0){setTimeout(()=>endBattle(true),800);return}
  if(player.hp<=0){setTimeout(()=>endBattle(false),800);return}
  battleState.playerCharge=0;
  updateBattleUI();
  if(battleState.enemyCharge>=100){
    $('battle-actions').innerHTML='<div style="color:#776644;font-size:13px">敌方回合...</div>';
    setTimeout(()=>enemyTurn(),800);
  }else{
    $('battle-actions').innerHTML='<div style="color:#776644;font-size:13px">集气中...</div>';
    startChargeTick();
  }
}

function applyWeaponBonus(dmg){
  const wEid=player.equipment.weapon;
  if(!wEid)return;
  const eq=EQUIPMENT[wEid];
  if(eq.drain){
    const heal=Math.floor(dmg*eq.drain);
    if(heal>0){
      player.hp=Math.min(player.hp+heal,player.maxHp);
      addBattleLog(`武器吸血 ${heal} 生命！`,'player-action');
      showDamageFloat($('player-sprite'),heal,true);
    }
  }
}

// 装备的"命中触发"特效：附毒 / 破防 / 眩晕（不限于武器，饰品也能触发）
function applyWeaponPoisonHit(){
  const e=battleState.enemy;
  eqEffects('poisonHit').forEach(ph=>{
    if(!e.poison)e.poison=[];
    e.poison.push({dmg:ph.dmg,turns:ph.turns});
    if(e.poison.length>8)e.poison.shift();
    addBattleLog(`兵器附毒！${e.name} 中毒了！(${e.poison.length}层)`,'system');
  });
  eqEffects('armorBreakHit').forEach(ab=>{
    if(!e.buffs.some(b=>b.key==='armorBreak')){
      e.buffs.push({key:'armorBreak',val:ab.val,dur:ab.turns,icon:'⛏',name:'破防'});
      addBattleLog(`装备特效·破甲！${e.name} 的防御被撕开了！`,'system');
    }
  });
  const st=eqSum('stunHit');
  if(st>0&&Math.random()<st&&!e.stunned){
    e.stunned=true;
    addBattleLog(`装备特效·雷震！${e.name} 被麻住了，将跳过下一回合！`,'system');
  }
}

// 反弹 / 反击姿态
function applyReflectDamage(dmg){
  let reflect=Math.floor(dmg*eqSum('reflect')),consume=[];
  player.buffs.forEach((b,i)=>{
    if(b.reflect)reflect+=Math.floor(dmg*b.reflect);
    if(b.key==='counter'){reflect+=Math.floor(dmg*b.val);consume.push(i)}
    if(b.key==='counterStance')reflect+=Math.floor(dmg*b.val);
  });
  if(reflect>0){
    damageEnemy(reflect);
    addBattleLog(`你反击了 ${reflect} 点伤害！`,'player-action');
    showDamageFloat($('enemy-sprite'),reflect,false);
    consume.reverse().forEach(i=>player.buffs.splice(i,1));
  }
}

function tryFlee(){
  const chance=.4+(player.spd-battleState.enemy.spd)*.05;
  if(Math.random()<Math.max(chance,.2)){
    addBattleLog('成功逃脱！','system');addLog('从战斗中逃脱','');battleState.finished=true;
    setTimeout(()=>{$('battle-screen').style.display='none';goScene(currentScene)},600);
  }else{
    addBattleLog('逃跑失败！','system');
    finishAttack();
  }
}

function enemyTurn(){
  if(battleState.finished)return;
  battleState.turnCount++;
  tickBuffs(true);
  if(battleState.enemy.hp<=0){setTimeout(()=>endBattle(true),600);return}
  if(player.hp<=0){setTimeout(()=>endBattle(false),600);return}

  const e=battleState.enemy;

  // 眩晕：跳过回合
  if(e.stunned){
    e.stunned=false;
    addBattleLog(`${e.name} 处于眩晕状态，跳过了回合！`,'system');
    tickBuffs(false);
    updateBattleUI();updateUI();
    if(player.hp<=0){setTimeout(()=>endBattle(false),800);return}
    battleState.enemyCharge=0;updateBattleUI();
    if(battleState.playerCharge>=100)showPlayerActions();else startChargeTick();
    return;
  }

  const pDodge=getDodgeChance(false);
  // 【修复】敌人内力耗尽后永远回不来（只要它有 0 耗的普攻，就永远触发不到"调息"分支），
  // 结果 BOSS 打到后面只会平A。现在每回合自然回复少量内力。
  e.mp=Math.min(e.maxMp,e.mp+Math.floor(e.maxMp*0.12));
  // 冷却递减
  if(!e.skillCd)e.skillCd={};
  for(const k in e.skillCd){if(e.skillCd[k]>0)e.skillCd[k]--}

  let avail=e.skills.filter(sid=>{
    const k=SKILLS[sid];
    if(!k)return false;
    if(k.mp&&e.mp<k.mp)return false;
    if((e.skillCd[sid]||0)>0)return false;                      // 【修复】增益/辅助技能进入冷却，杜绝无限刷同一招
    if(k.type==='heal'&&(e.hp/e.maxHp>0.5||e.healsLeft<=0))return false;
    if(k.shield&&(e.shield>=e.maxHp*0.25||e.shieldsLeft<=0))return false;
    if(k.type==='buff'&&k.buffKey&&e.buffs.some(b=>b.key===k.buffKey))return false;
    return true;
  });
  // 兜底：至少要能出手打人，绝不允许"无事可做"
  if(avail.length===0)avail=e.skills.filter(sid=>{
    const k=SKILLS[sid];
    return k&&(k.type==='attack'||k.type==='multi')&&(!k.mp||e.mp>=k.mp);
  });
  if(avail.length===0)avail=e.skills.filter(sid=>{const k=SKILLS[sid];return k&&(!k.mp||e.mp>=k.mp)});

  if(avail.length===0){
    const r=Math.floor(e.maxMp*0.5);
    e.mp=Math.min(e.mp+r,e.maxMp);
    addBattleLog(`${e.name} 运功调息，恢复 ${r} 内力`,'enemy-action');
  }else{
    const pick=chooseEnemySkill(avail,e);

    const s=SKILLS[pick];
    e.mp=Math.max(0,e.mp-(s.mp||0));
    // 非攻击类招式记冷却（持续时间 + 2 回合），避免刷屏
    if(s.type!=='attack'&&s.type!=='multi'){
      e.skillCd[pick]=(s.buffDur||s.debuffDur||1)+2;
    }
    if(s.hpCost){const c=Math.floor(e.hp*s.hpCost);e.hp=Math.max(e.hp-c,1);addBattleLog(`${e.name} 以 ${c} 气血为引！`,'enemy-action')}

    const enemyExtras=()=>{
      if(s.chargeGain){battleState.enemyCharge=Math.min(100,(battleState.enemyCharge||0)+s.chargeGain);addBattleLog(`${e.name} 提气，集气 +${s.chargeGain}%！`,'enemy-action')}
      if(s.chargeDrain){battleState.playerCharge=Math.max(0,(battleState.playerCharge||0)-s.chargeDrain);addBattleLog(`你的气机被打断，集气 -${s.chargeDrain}%！`,'enemy-action')}
      if(s.shield&&e.shieldsLeft>0){e.shieldsLeft--;grantShield(s.shield,'enemy')}
    };

    if(s.type==='heal'){
      e.healsLeft--;
      const h=Math.floor(e.maxHp*(s.healMult||0)*0.7);
      e.hp=Math.min(e.hp+h,e.maxHp);
      addBattleLog(`${e.name} 施展 ${s.name}，恢复 ${h} 生命！（尚可再运功 ${Math.max(0,e.healsLeft)} 次）`,'enemy-action');
      showDamageFloat($('enemy-sprite'),h,true);
      if(s.curePoison)e.poison=[];
      if(s.regen)e.buffs.push({key:'regen',val:s.regen.val,dur:s.regen.turns,icon:'🐢',name:'回复'});
      enemyExtras();
    }else if(s.type==='buff'){
      if(s.buffKey)e.buffs.push({key:s.buffKey,val:s.buffVal,dur:s.buffDur,icon:s.icon,name:s.name,reflect:s.reflect||0,selfBleed:s.selfBleed||0});
      if(s.regen)e.buffs.push({key:'regen',val:s.regen.val,dur:s.regen.turns,icon:'🐢',name:'回复'});
      addBattleLog(`${e.name} 施展 ${s.name}！`,'enemy-action');
      enemyExtras();
    }else if(s.type==='debuff'){
      player.buffs.push({key:s.debuffKey,val:s.debuffVal,dur:s.debuffDur,icon:s.icon,name:s.name});
      addBattleLog(`${e.name} 施展 ${s.name}！你被削弱了！`,'enemy-action');
      enemyExtras();
    }else if(s.type==='detonate'){
      addBattleLog(`${e.name} 试图引爆毒力，但你身上无毒！`,'system');
      enemyExtras();
    }else{
      const hits=(s.type==='multi'||s.hits)?(s.hits||1):1;
      if(!s.ignoreDodge&&Math.random()*100<pDodge){
        addBattleLog('敌方攻击被你闪避了！','system');
        showDamageFloat($('player-sprite'),0,false,'miss');
      }else{
        let total=0;
        for(let i=0;i<hits;i++){
          const def=s.trueDmg?0:getEffectiveDef(player,false)*0.7*(1-(s.pierce||0))/hits;
          let d=Math.floor((getEffectiveAtk(true)*(s.mult||1)-def)*enemyDmgCoef());
          if(s.execute&&player.hp/player.maxHp<=s.execute.hp)d=Math.floor(d*s.execute.mult);
          total+=Math.max(d,1);
        }
        // 【修复】敌人的"暗影步"等 nextAtk 增益原本完全没有效果 —— 现在真正翻倍并消耗掉
        const nb=e.buffs.find(b=>b.key==='nextAtk');
        if(nb){
          total=Math.floor(total*nb.val);
          addBattleLog(`${e.name} 蓄势一击！`,'enemy-action');
          e.buffs.splice(e.buffs.indexOf(nb),1);
        }
        if(Math.random()<.1){total=Math.floor(total*1.5);addBattleLog('敌方暴击！','system')}
        const real=damagePlayer(total);
        addBattleLog(`${e.name} 施展 ${s.name}，造成 ${total} 伤害！`,'enemy-action');
        showDamageFloat($('player-sprite'),total,false);
        $('player-sprite').classList.add('shake');setTimeout(()=>$('player-sprite').classList.remove('shake'),400);
        applyReflectDamage(total);
        if(s.drain){const h=Math.floor(total*s.drain);e.hp=Math.min(e.hp+h,e.maxHp);addBattleLog(`${e.name} 吸取了 ${h} 生命！`,'enemy-action')}
        if(s.poison){
          if(!player.poison)player.poison=[];
          const st=s.poisonStacks||1;
          for(let i=0;i<st;i++){player.poison.push({dmg:s.poison.dmg,turns:s.poison.turns});if(player.poison.length>8)player.poison.shift()}
          addBattleLog(`你中毒了！(毒伤 ${player.poison.length} 层)`,'system');
        }
        if(s.armorBreak)player.buffs.push({key:'armorBreak',val:s.armorBreak.val,dur:s.armorBreak.turns,icon:'⛏',name:'破防'});
        if(s.stun&&Math.random()<s.stun){player.stunned=true;addBattleLog('你被震得气血翻涌，将跳过下一次出手！','system')}
      }
      enemyExtras();
    }
  }

  tickBuffs(false);
  updateBattleUI();updateUI();
  if(battleState.enemy.hp<=0){setTimeout(()=>endBattle(true),800);return}
  if(player.hp<=0){setTimeout(()=>endBattle(false),800);return}
  battleState.enemyCharge=0;
  updateBattleUI();
  if(battleState.playerCharge>=100)showPlayerActions();else startChargeTick();
}

function grantEquip(id){
  if(!EQUIPMENT[id])return false;
  if(player.equipInventory.includes(id)||Object.values(player.equipment).includes(id)){
    const refund=Math.floor((EQUIPMENT[id].price||100)*0.4);
    player.gold+=refund;
    addBattleLog(`重复的 ${EQUIPMENT[id].name}，折价 ${refund} 两`,'system');
    return false;
  }
  player.equipInventory.push(id);
  addBattleLog(`获得 ${EQUIPMENT[id].icon} ${EQUIPMENT[id].name}！`,'system');
  addLog(`获得 ${EQUIPMENT[id].icon} ${EQUIPMENT[id].name}`,'loot');
  showItemPopup('equipment',EQUIPMENT[id]);
  return true;
}

// 从该品阶里随机送一门"还没学会、且当前武器用得上"的功法
function grantRandomSkill(tier){
  const wt=getWeaponType();
  let pool=Object.keys(SKILLS).filter(sid=>{
    const k=SKILLS[sid];
    return k.tier===tier&&!player.skills.includes(sid)&&(k.reqWeapon===wt||k.reqWeapon==='any');
  });
  if(pool.length===0){
    pool=Object.keys(SKILLS).filter(sid=>{
      const k=SKILLS[sid];
      return k.tier===tier&&!player.skills.includes(sid);
    });
  }
  if(pool.length===0)return null;
  const sid=pool[Math.floor(Math.random()*pool.length)];
  player.skills.push(sid);autoEquipSkill(sid);
  addBattleLog(`从对手的招式中悟出了 ${SKILLS[sid].icon} ${SKILLS[sid].name}！`,'system');
  addLog(`领悟 ${SKILLS[sid].name}`,'skill');
  showItemPopup('skill',SKILLS[sid]);
  return sid;
}

function giveBossRewards(e){
  const R=BOSS_REWARDS[e.id];
  if(!R)return;
  const D=getDiff();
  if(R.gold){
    const g=Math.round(R.gold*D.gold);
    player.gold+=g;
    addBattleLog(`搜出了 ${g} 两银子`,'system');
  }
  if(R.items){
    for(const [id,c] of Object.entries(R.items)){
      const cnt=isHard()?c+1:c;   // 困难模式多给一份
      player.inventory[id]=(player.inventory[id]||0)+cnt;
      addBattleLog(`获得 ${ITEMS[id].icon} ${ITEMS[id].name} ×${cnt}`,'system');
      addLog(`获得 ${ITEMS[id].name} ×${cnt}`,'loot');
    }
  }
  if(R.equips)R.equips.forEach(id=>grantEquip(id));
  if(R.skillTier)grantRandomSkill(R.skillTier);
}


// ======================= 宝箱系统 =======================
// 战斗胜利后统一开箱，取代原来的"50% 掉一件装备"
// 装备与功法【不再限制武器类型】—— 玩剑的开出天阶刀法，正是转型的契机。
// 池子变成三倍大，所以爆率相应提高；丹药则调低（让玩家自己去买）。
const CHEST_TIERS={
  bronze: {name:'青铜宝箱',icon:'📦',color:'#b87333',
    gold:[12,36],  goldPerLv:2,  items:[0,1],
    equipCount:1, equipChance:.22, skillCount:1, skillChance:.08,
    equipRarity:{common:.70,fine:.30},            skillTier:{huang:.5,xuan:.5}},
  silver: {name:'白银宝箱',icon:'🎁',color:'#c0c0c0',
    gold:[40,90],  goldPerLv:5,  items:[1,2],
    equipCount:2, equipChance:.32, skillCount:1, skillChance:.20,
    equipRarity:{common:.25,fine:.57,rare:.18},   skillTier:{huang:.25,xuan:.6,di:.15}},
  gold:   {name:'黄金宝箱',icon:'🏆',color:'#daa520',
    gold:[110,230],goldPerLv:9, items:[2,3],
    equipCount:2, equipChance:.58, skillCount:2, skillChance:.30,
    equipRarity:{fine:.38,rare:.54,legend:.08},   skillTier:{xuan:.55,di:.41,tian:.04}},
  diamond:{name:'钻石宝箱',icon:'💎',color:'#7cf0e0',
    gold:[320,640],goldPerLv:18, items:[2,4],
    equipCount:3, equipChance:.80, skillCount:2, skillChance:.62,
    equipRarity:{rare:.48,legend:.52},            skillTier:{di:.55,tian:.45}},
};

// 敌人分档 → 掉落哪种箱子
function chestRollFor(baseHp,isBossKill){
  let table;
  if(isBossKill)          table=[['silver',38],['gold',54],['diamond',8]];    // BOSS：黄金为主，但白银占了不小比例
  else if(baseHp>=150)    table=[['bronze',25],['silver',45],['gold',28],['diamond',2]];
  else                    table=[['bronze',62],['silver',30],['gold',8]];      // 小怪最高只到黄金
  const total=table.reduce((a,b)=>a+b[1],0);
  let r=Math.random()*total;
  for(const [k,w] of table){ r-=w; if(r<=0)return k; }
  return table[0][0];
}

function pickWeighted(obj){
  const total=Object.values(obj).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(const k in obj){ r-=obj[k]; if(r<=0)return k; }
  return Object.keys(obj)[0];
}

// 可随机掉落的功法池：三系通吃（排除敌人专用与隐藏BOSS传承）
function randomSkillPool(tier){
  return Object.keys(SKILLS).filter(sid=>{
    if(/^(beast_|venom_bite|ss_)/.test(sid))return false;
    const k=SKILLS[sid];
    if(k.tier!==tier)return false;
    if(player.skills.includes(sid))return false;
    return true;
  });
}
// 可随机掉落的装备池：三系通吃
function randomEquipPool(rarity){
  return Object.keys(EQUIPMENT).filter(id=>{
    const eq=EQUIPMENT[id];
    return eq.rarity===rarity;
  });
}

// 生成箱子内容
function rollChest(tier){
  const C=CHEST_TIERS[tier];
  const lv=player.level;
  const loot={tier,gold:0,items:{},equips:[],skills:[],dupRefund:0};

  loot.gold=Math.floor(C.gold[0]+Math.random()*(C.gold[1]-C.gold[0])+C.goldPerLv*lv);
  if(isHard())loot.gold=Math.floor(loot.gold*1.3);

  // 丹药：等级越高，越可能出高级丹
  const cnt=C.items[0]+Math.floor(Math.random()*(C.items[1]-C.items[0]+1));
  if(cnt<=0)return finishChestItems(loot,C,tier);
  const pool=(tier==='bronze')?{hp_pot:.65,mp_pot:.35}
    :(tier==='silver')?{hp_pot:.4,mp_pot:.25,antidote:.15,hp_pot_l:.15,mp_pot_l:.05}
    :(tier==='gold')?{hp_pot_l:.35,mp_pot_l:.3,antidote:.2,elixir:.15}
    :{hp_pot_l:.3,mp_pot_l:.25,antidote:.15,elixir:.30};
  for(let i=0;i<cnt;i++){
    const id=pickWeighted(pool);
    loot.items[id]=(loot.items[id]||0)+1;
  }
  return finishChestItems(loot,C,tier);
}

// 装备 / 功法部分（拆出来，便于"无丹药"时也能走同一条路）
function finishChestItems(loot,C,tier){

  // 装备（多次独立判定）
  for(let i=0;i<(C.equipCount||1);i++){
    if(Math.random()>=C.equipChance)continue;
    let rar=pickWeighted(C.equipRarity);
    let cand=randomEquipPool(rar);
    const chain=['legend','rare','fine','common'];
    let gi=chain.indexOf(rar);
    while(cand.length===0&&gi<chain.length-1){gi++;cand=randomEquipPool(chain[gi])}
    if(cand.length===0)continue;
    const id=cand[Math.floor(Math.random()*cand.length)];
    if(loot.equips.includes(id))continue;
    loot.equips.push(id);
  }

  // 功法（多次独立判定）
  for(let i=0;i<(C.skillCount||1);i++){
    if(Math.random()>=C.skillChance)continue;
    let t=pickWeighted(C.skillTier);
    let cand=randomSkillPool(t).filter(x=>!loot.skills.includes(x));
    const chain=['tian','di','xuan','huang'];
    let gi=chain.indexOf(t);
    while(cand.length===0&&gi<chain.length-1){gi++;cand=randomSkillPool(chain[gi]).filter(x=>!loot.skills.includes(x))}
    if(cand.length)loot.skills.push(cand[Math.floor(Math.random()*cand.length)]);
  }
  return loot;
}

function chestSparks(){
  const el=$('chest-emoji');
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const chars=['✨','⭐','💫','🌟'];
  for(let i=0;i<14;i++){
    const sp=document.createElement('div');
    sp.className='chest-spark';
    sp.textContent=chars[Math.floor(Math.random()*chars.length)];
    sp.style.left=cx+'px';sp.style.top=cy+'px';
    const a=Math.random()*Math.PI*2, d=60+Math.random()*110;
    sp.style.setProperty('--sx',Math.cos(a)*d+'px');
    sp.style.setProperty('--sy',(Math.sin(a)*d-40)+'px');
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),1100);
  }
}

function openChest(){
  if(!_chestState||_chestState.opened)return;
  _chestState.opened=true;
  const {loot}=_chestState;
  const C=CHEST_TIERS[loot.tier];
  $('chest-emoji').classList.add('opening');
  $('chest-hint').style.display='none';
  chestSparks();

  setTimeout(()=>{
    $('chest-emoji').textContent='🎊';
    const rows=[];

    // 银两
    player.gold+=loot.gold;
    rows.push({icon:'💰',name:`银两 ×${loot.gold}`,sub:'',cls:'rarity-common',tag:''});

    // 丹药
    for(const [id,c] of Object.entries(loot.items)){
      const it=ITEMS[id];
      player.inventory[id]=(player.inventory[id]||0)+c;
      rows.push({icon:it.icon,name:`${it.name} ×${c}`,sub:it.desc,cls:rarityClass(it.rarity),tag:'丹药'});

      const owned=player.equipInventory.includes(id)||Object.values(player.equipment).includes(id);
      if(owned){
        const refund=Math.floor((eq.price||100)*0.4);
        player.gold+=refund;
        rows.push({icon:eq.icon,name:`${eq.name}（重复）`,sub:`已有同物，折价 ${refund} 两`,cls:'rarity-common',tag:'折价'});
      }else{
        player.equipInventory.push(id);
        addLog(`宝箱开出 ${eq.icon} ${eq.name}`,'loot');
        const spec=eqSpecials(eq);
        rows.push({icon:eq.icon,name:eq.name,
          sub:eqBaseStats(eq).join(' ')+(spec.length?'　✦ '+spec.join('　✦ '):''),
          cls:rarityClass(eq.rarity),tag:getTierName(eq.tier)+'·'+slotName(eq.slot)});
      }
    });

    // 功法（可能是别的武器流派 —— 这正是转型的契机）
    const wtNow=getWeaponType();
    loot.skills.forEach(sid=>{
      const sk=SKILLS[sid];
      player.skills.push(sid);
      autoEquipSkill(sid);
      addLog(`宝箱开出功法 ${sk.name}`,'skill');
      const other=(sk.reqWeapon!=='any'&&sk.reqWeapon!==wtNow);
      rows.push({icon:sk.icon,name:sk.name+(other?`　<span style="color:#cd5c5c;font-size:10px">需${getWtypeName(sk.reqWeapon)}类武器</span>`:''),
        sub:(sk.desc||sk.flavor||'')+(other?`　<span style="color:#daa520">— 换上${getWtypeName(sk.reqWeapon)}便可施展</span>`:''),
        cls:'',color:getTierColor(sk.tier),tag:getTierName(sk.tier)+'·'+(sk.reqWeapon==='any'?'心法':getWtypeName(sk.reqWeapon)+'法')});
    });

    const box=$('chest-loot');
    box.innerHTML=rows.map((r,i)=>`
      <div class="chest-row" style="animation-delay:${i*0.08}s">
        <span class="cr-icon">${r.icon}</span>
        <div class="cr-name">
          <div class="${r.cls}" ${r.color?`style="color:${r.color}"`:''}>${r.name}</div>
          ${r.sub?`<div class="cr-sub">${r.sub}</div>`:''}
        </div>
        ${r.tag?`<span class="cr-tag">${r.tag}</span>`:''}
      </div>`).join('');
    box.classList.add('show');
    $('chest-continue').style.display='';
    recalcStats();updateUI();
  },600);
}

  $('chest-overlay').classList.remove('active');

// ======================= 敌人出招决策 =======================
// 普通：粗略启发式 + 随机。困难：对每个招式打分，抓空档、破盾、断集气、残血搏命。
// 估算一招打在玩家身上的期望伤害（AI 用）
function estEnemyDamage(s,e){
  if(s.type!=='attack'&&s.type!=='multi')return 0;
  const hits=(s.hits||1);
  const pDef=getEffectiveDef(player,false);
  const def=s.trueDmg?0:pDef*0.7*(1-(s.pierce||0))/hits;
  let d=Math.max(1,(getEffectiveAtk(true)*(s.mult||1)-def)*enemyDmgCoef())*hits;
  const nb=e.buffs.find(b=>b.key==='nextAtk');
  if(nb)d*=nb.val;
  if(s.execute&&player.hp/player.maxHp<=s.execute.hp)d*=s.execute.mult;
  const pDodge=getDodgeChance(false);
  if(!s.ignoreDodge)d*=(1-Math.min(pDodge,75)/100);
  return d;
}

function chooseEnemySkill(avail,e){
  const hpPct=e.hp/e.maxHp;
  const pHpPct=player.hp/player.maxHp;

  // 该招式能打出多少伤害（用于把所有非攻击招式换算成"伤害当量"）
  const dmgOf={};
  let bestDmg=1;
  avail.forEach(sid=>{
    const d=estEnemyDamage(SKILLS[sid],e);
    dmgOf[sid]=d;
    if(d>bestDmg)bestDmg=d;
  });
  // 已经有蓄势增益了 → 必须打出去，不许再铺场
  const hasNextAtk=e.buffs.some(b=>b.key==='nextAtk');

  if(!isHard()){
    // 普通模式：残血找治疗，有蓄势就攻击，否则偏向攻击、少量概率铺场
    const atks=avail.filter(sid=>['attack','multi'].includes(SKILLS[sid].type));
    if(hpPct<0.35){
      const heals=avail.filter(sid=>SKILLS[sid].type==='heal'||SKILLS[sid].shield);
      if(heals.length)return heals[Math.floor(Math.random()*heals.length)];
    }
    if(hasNextAtk&&atks.length)return atks[Math.floor(Math.random()*atks.length)];
    const support=avail.filter(sid=>!['attack','multi'].includes(SKILLS[sid].type));
    if(support.length&&atks.length&&Math.random()<0.25)return support[Math.floor(Math.random()*support.length)];
    if(atks.length)return atks[Math.floor(Math.random()*atks.length)];
    return avail[Math.floor(Math.random()*avail.length)];
  }

  // —— 困难模式 ——
  // 先看要不要"攒内力放大招"：贪心 AI 会一直放便宜招，导致大招永远攒不出来。
  const affordable=avail;
  const bigOnes=e.skills.filter(sid=>{
    const k=SKILLS[sid];
    if(!k||!['attack','multi'].includes(k.type))return false;
    return (k.mp||0)>e.mp&&(k.mp||0)<=e.maxMp&&(e.skillCd[sid]||0)<=0;
  });
  if(bigOnes.length){
    let bigBest=null,bigDmg=0;
    bigOnes.forEach(sid=>{const d=estEnemyDamage(SKILLS[sid],e);if(d>bigDmg){bigDmg=d;bigBest=sid}});
    const regen=Math.floor(e.maxMp*0.12);
    const turnsToAfford=regen>0?Math.ceil(((SKILLS[bigBest].mp||0)-e.mp)/regen):99;
    // 大招明显更强、且两三回合内攒得出来 → 这回合先用免费/廉价招式蓄力
    if(bigDmg>bestDmg*1.45&&turnsToAfford<=3){
      // 优先用免费招式蓄力；没有免费招式就用最便宜的那一招（净内力仍在增长）
      const atks=avail.filter(sid=>['attack','multi'].includes(SKILLS[sid].type));
      const cheap=atks.filter(sid=>(SKILLS[sid].mp||0)<regen).sort((a,b)=>(SKILLS[a].mp||0)-(SKILLS[b].mp||0));
      if(cheap.length)return cheap[0];
    }
  }

  const pCharge=battleState.playerCharge||0;
  const pShield=player.shield||0;
  const pDef=getEffectiveDef(player,false);
  const pDodge=getDodgeChance(false);
  const playerBuffed=player.buffs.some(b=>['defBuff','ironShirt','taijiBarrier','swordParry','counterStance'].includes(b.key));

  let best=null,bestScore=-1e9;
  avail.forEach(sid=>{
    const s=SKILLS[sid];
    let sc=0;
    const isAtk=(s.type==='attack'||s.type==='multi');

    if(isAtk){
      sc=dmgOf[sid];
      if(s.execute&&pHpPct<=s.execute.hp)sc*=1.35;
      if(s.trueDmg&&pDef>40)sc*=1.2;
      if(s.drain&&hpPct<0.5)sc*=1.3;
      if(s.hpCost&&hpPct<0.25)sc*=0.3;
      if(hasNextAtk)sc*=1.5;          // 蓄势已就绪 → 优先兑现
    }

    // —— 非攻击招式：全部换算成伤害当量 ——
    // 蓄势(nextAtk)：价值 = 下一击能多打出多少
    if(s.buffKey==='nextAtk'){
      sc=hasNextAtk?-99999:bestDmg*(s.buffVal-1)*0.55;   // 要多花一回合，打折
    }
    // 攻击增益：按剩余回合数折算
    else if(s.buffKey&&['flamePalm','rage','nineYang','eagleEye'].includes(s.buffKey)){
      sc=bestDmg*s.buffVal*Math.max(1,(s.buffDur||3)-1)*0.5;
      if(s.selfBleed)sc-=e.maxHp*s.selfBleed*(s.buffDur||3)*0.5;
    }
    // 防御增益/闪避：按"少挨多少"折算（粗估玩家每回合输出 ≈ 敌人最大生命的 6%）
    else if(s.buffKey&&['defBuff','ironShirt','taijiBarrier','dodge','cloudStep','smoke'].includes(s.buffKey)){
      sc=e.maxHp*0.06*(s.buffDur||3)*0.45;
    }
    if(s.shield){
      sc+=e.maxHp*s.shield*0.9;
      if(pShield>0)sc*=0.9;
    }
    if(s.type==='heal'){
      const missing=(1-hpPct)*e.maxHp;
      sc=Math.min(missing,e.maxHp*(s.healMult||0.3))*1.1;
      if(hpPct>0.5)sc=-99999;
    }
    if(s.type==='debuff'){
      sc=bestDmg*0.7*(playerBuffed?1.6:1.0);
    }

    // —— 战术加分（不受招式类型限制）——
    if(s.chargeDrain)sc+=(pCharge/100)*bestDmg*1.6;                     // 你快出手了 → 打断
    if(s.stun)sc+=s.stun*(0.4+pCharge/100)*bestDmg*1.8;                 // 眩晕 = 白赚一回合
    if(s.armorBreak&&!player.buffs.some(b=>b.key==='armorBreak'))sc+=bestDmg*0.5+(playerBuffed?bestDmg*0.3:0);
    if(s.poison)sc+=s.poison.dmg*s.poison.turns*(s.poisonStacks||1)*0.8;
    if(s.mpDrain)sc+=bestDmg*0.15;

    // 内力管理
    if((s.mp||0)>e.mp)sc=-99999;
    if((s.mp||0)>e.maxMp*0.5&&hpPct>0.7)sc*=0.85;

    sc*=(0.92+Math.random()*0.16);
    if(sc>bestScore){bestScore=sc;best=sid}
  });
  // 兜底：如果所有招式都被判为负分，就直接打人
  if(!best||bestScore<=0){
    const atks=avail.filter(sid=>['attack','multi'].includes(SKILLS[sid].type));
    if(atks.length)return atks[Math.floor(Math.random()*atks.length)];
  }
  return best||avail[Math.floor(Math.random()*avail.length)];
}

function endBattle(won){
  battleState.finished=true;const e=battleState.enemy;
  if(won){
    addBattleLog(`击败了 ${e.name}！`,'system');
    const D=getDiff();
    e.exp=Math.round(e.exp*D.exp);e.gold=Math.round(e.gold*D.gold);

    player.exp+=e.exp;player.gold+=e.gold;

    addBattleLog(`+${e.exp}经验 +${e.gold}银两`,'system');
    // —— 战利品统一走宝箱 ——
    const baseHp=(ENEMIES[e.id]||{}).hp||0;

// 胜利结算顺序：宝箱 → 升级 → 转场
function endBattleTransition(scene){
  const chest=battleState&&battleState.pendingChest;
  if(chest){
    battleState.pendingChest=null;
    setTimeout(()=>showChest(chest,()=>doEndBattleTransition(scene)),500);
    return;
  }
  doEndBattleTransition(scene);
}

function doEndBattleTransition(scene){
  if(player.exp>=player.expNext){
    const showEnd=battleState._showCh1Ending;
    setTimeout(()=>{
      levelUp();
      battleState._nextScene=scene;
      battleState._showCh1Ending=showEnd;
    },400);
  }else{
    $('battle-screen').style.display='none';
    if(scene)goScene(scene);
    updateUI();
    if(battleState&&battleState._showCh1Ending){battleState._showCh1Ending=false;setTimeout(triggerVictory,500)}
  }
}

function levelUp(){
  if(player.level>=25){
    player.exp=player.expNext; // cap exp at max level
    $('battle-screen').style.display='none';goScene(currentScene);updateUI();
    return;
  }
  player.level++;player.exp-=player.expNext;
  player.expNext=Math.floor(100+player.level*50+player.level*player.level*3);
  const hg=15+Math.floor(Math.random()*11)+Math.floor(player.level*0.5);
  const mg=5;
  const ag=2+Math.floor(Math.random()*2),dg=1+Math.floor(Math.random()*2),sg=1+Math.floor(Math.random()*2);
  player.baseAtk+=ag;player.baseDef+=dg;player.baseSpd+=sg;
  recalcStats();
  player.maxHp=100+((player.level-1)*22);player.maxMp=68+((player.level-1)*5);
  recalcStats();
  player.hp=player.maxHp;player.mp=player.maxMp;

  let ns=null;
  const wt=getWeaponType();
  // 【改动】升级不再固定给同一套功法 —— 按品阶随机赠予一门未习之技，
  // 这样每周目走出的流派都不一样。
  const LEVEL_GRANTS={2:'huang',3:'xuan',5:'xuan',7:'xuan',9:'di',11:'di',13:'di',15:'tian',17:'di',19:'tian',21:'tian',23:'tian'};
  const gt=LEVEL_GRANTS[player.level];
  if(gt)ns=gainRandomSkill(gt);
  // 换了武器类型时补齐对应的基础招式
  if(wt==='blade'&&!player.skills.includes('basic_blade')){player.skills.push('basic_blade')}
  if(wt==='hidden'&&!player.skills.includes('basic_hidden')){player.skills.push('basic_hidden')}
  if(wt==='sword'&&!player.skills.includes('basic_sword')){player.skills.push('basic_sword')}

  let info=`等级 ${player.level}<br>生命 +${hg} → ${player.maxHp}<br>内力 +${mg} → ${player.maxMp}<br>攻击 +${ag} → ${player.atk}<br>防御 +${dg} → ${player.def}<br>集气 +${sg} → ${player.spd}`;
  if(player.level===10)info+=`<br><br><span>📿 心诀栏位 +1（共 2 格）</span>`;
  if(player.level===20)info+=`<br><br><span>📿 心诀栏位 +1（共 3 格）</span>`;
  if(ns){info+=`<br><br>领悟新武学: <span>${ns.icon} ${ns.name}</span>`;addLog(`领悟了 ${ns.name}！`,'skill')}
  $('levelup-info').innerHTML=info;$('levelup-overlay').classList.add('active');
  addLog(`升级到 ${player.level} 级！`,'important');updateUI();
}

function closeLevelUp(){
  $('levelup-overlay').classList.remove('active');
  if(player.exp>=player.expNext)setTimeout(()=>levelUp(),300);
  else{
    $('battle-screen').style.display='none';
    const next=battleState?battleState._nextScene:null;
    const showEnd=battleState?battleState._showCh1Ending:false;
    if(battleState){battleState._nextScene=null;battleState._showCh1Ending=false}
    if(next)goScene(next);else goScene(currentScene);
    updateUI();
    if(showEnd)setTimeout(triggerVictory,500);
  }
}

function reviveCost(){return Math.max(30,player.level*20)}
function showGameOver(){
  const cost=reviveCost();
  const can=player.gold>=cost;
  $('gameover-revive-btn').disabled=!can;
  $('gameover-revive-tip').textContent=can?`疗伤费用：${cost} 两（现有 ${player.gold} 两，复活后恢复一半生命）`:`疗伤需 ${cost} 两，你只有 ${player.gold} 两`;
  $('gameover-overlay').classList.add('active');
}
function reviveWithGold(){
  const cost=reviveCost();
  if(player.gold<cost){showToast('银两不足','warn');return}
  player.gold-=cost;
  player.hp=Math.floor(player.maxHp*0.5);
  player.mp=Math.floor(player.maxMp*0.5);
  player.buffs=[];player.poison=[];player.buffNextAtk=1;player.stunned=false;
  $('gameover-overlay').classList.remove('active');
  $('battle-screen').style.display='none';
  addLog(`花费 ${cost} 两疗伤，捡回一条命`,'heal');
  showToast('你捡回了一条命','info');
  updateUI();
  goScene(currentScene||'town');
}
function loadLatestAfterDeath(){
  const latest=getLatestSave();
  if(!latest){showToast('没有可用存档','warn');return}
  $('gameover-overlay').classList.remove('active');
  doLoadSlot(latest.slot);
}

// ======================= SAVE / LOAD SYSTEM =======================
const SAVE_KEY='wuxia_rpg_saves';
const MAX_SLOTS=3;
let saveMode='save'; // 'save' or 'load'

let _memSaves=null; // in-memory fallback when localStorage unavailable
function _lsOk(){try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true}catch(e){return false}}

function getAllSaves(){
  if(_lsOk()){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{}}catch(e){return{}}}
  if(_memSaves)return JSON.parse(JSON.stringify(_memSaves));
  return{};
}
function writeAllSaves(data){
  if(_lsOk()){try{localStorage.setItem(SAVE_KEY,JSON.stringify(data));return}catch(e){}}
  _memSaves=JSON.parse(JSON.stringify(data));
}

function exportSave(){
  const data=getAllSaves();
  if(!Object.keys(data).length){showToast('\u6ca1\u6709\u5b58\u6863\u53ef\u5bfc\u51fa','warn');return}
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='\u6c5f\u6e56\u884c_\u5b58\u6863_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('\u5b58\u6863\u5df2\u5bfc\u51fa','success');
}
function importSave(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        if(!data||typeof data!=='object')throw new Error('bad');
        writeAllSaves(data);
        renderSaveSlots();checkContinueBtn();
        showToast('\u5b58\u6863\u5bfc\u5165\u6210\u529f','success');
      }catch(err){showToast('\u6587\u4ef6\u683c\u5f0f\u9519\u8bef','warn')}
    };
    reader.readAsText(f);
  };
  inp.click();
}

function buildSaveData(slot){
  return {
    player:JSON.parse(JSON.stringify(player)),
    gameFlags:JSON.parse(JSON.stringify(gameFlags)),
    currentScene:currentScene,
    logEntries:logEntries.slice(0,40),
    slot:slot,
    time:new Date().toLocaleString('zh-CN'),
    ts:Date.now()
  };
}

function saveGame(slot){
  const data=getAllSaves();
  data[slot]=buildSaveData(slot);
  writeAllSaves(data);
  showToast('存档成功 — 档位 '+slot,'success');
  addLog('游戏已存档至档位 '+slot,'important');
  renderSaveSlots();
}

function loadGame(slot){
  const data=getAllSaves();
  if(!data[slot]){showToast('该档位无存档','warn');return false}
  const save=data[slot];
  player=save.player;
  
  if(!player.equippedWeaponSkills)player.equippedWeaponSkills=[];
  if(!player.equippedInnerSkills)player.equippedInnerSkills=[];
  if(!player.startWeaponType){
    const wt=getWeaponType();
    player.startWeaponType=wt;
  }
  if(!player.poison)player.poison=[];
  if(!player.buffs)player.buffs=[];
  if(typeof player.bonusHp!=='number')player.bonusHp=0;
  if(typeof player.bonusMp!=='number')player.bonusMp=0;
  if(!player.passives)player.passives=[];
  if(!player.equippedPassives)player.equippedPassives=[];
  player.momentum=0;player.shield=0;
  if(typeof gameFlags.karma!=='number')gameFlags.karma=0;
  if(!gameFlags.difficulty)gameFlags.difficulty='normal';
  if(!gameFlags.auc2)gameFlags.auc2=null;
  if(!gameFlags.auc3)gameFlags.auc3=null;
  player.buffNextAtk=1;
  player.stunned=false;

  gameFlags=save.gameFlags;
  currentScene=save.currentScene;
  logEntries.length=0;
  if(save.logEntries)save.logEntries.forEach(e=>logEntries.push(e));
  recalcStats();
  return true;
}

function deleteSave(slot){
  const data=getAllSaves();
  if(!data[slot])return;
  delete data[slot];
  writeAllSaves(data);
  showToast('已删除档位 '+slot,'info');
  renderSaveSlots();
}

function hasAnySave(){
  const data=getAllSaves();
  return Object.keys(data).length>0;
}

function getLatestSave(){
  const data=getAllSaves();
  let latest=null;
  for(let k in data){if(!latest||(data[k].ts||0)>(latest.ts||0))latest=data[k]}
  return latest;
}

function showToast(msg,type='info'){
  const t=$('save-toast');
  t.textContent=msg;
  t.className='save-toast '+type+' show';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2000);
}

const _popupQueue=[];
let _popupBusy=false;
function showItemPopup(type,item){
  if(_popupBusy){_popupQueue.push([type,item]);return}
  _popupBusy=true;
  _renderItemPopup(type,item);
}
function _renderItemPopup(type,item){
  const modal=$('item-popup');
  const icons={skill:'📜',equipment:'⚔️',consumable:'🧪'};
  const titles={skill:'获得功法',equipment:'获得装备',consumable:'获得药品'};
  
  let desc='';
  if(type==='skill'){
    desc=item.desc||item.flavor||'';
  }else if(type==='equipment'){
    desc=item.desc||'';
    if(item.atk)desc+=' 攻击+'+item.atk;
    if(item.def)desc+=' 防御+'+item.def;
    if(item.spd)desc+=' 速度+'+item.spd;
    if(item.hp)desc+=' 生命+'+item.hp;
    if(item.mp)desc+=' 内力+'+item.mp;
  }else if(type==='consumable'){
    desc=item.desc||'';
  }
  
  modal.innerHTML=`
    <div class="item-popup-content">
      <div class="item-popup-icon">${icons[type]}</div>
      <div class="item-popup-title">${titles[type]}</div>
      <div class="item-popup-item">${item.icon} ${item.name}</div>
      <div class="item-popup-desc">${desc}</div>
      <button class="item-popup-btn" onclick="hideItemPopup()">确定</button>
    </div>
  `;
  modal.classList.add('active');
}

function hideItemPopup(){
  $('item-popup').classList.remove('active');
  const next=_popupQueue.shift();
  if(next){setTimeout(()=>_renderItemPopup(next[0],next[1]),220);}
  else _popupBusy=false;
}

function openSaveModal(){
  saveMode='save';
  $('saveslots-title').textContent='存档';
  renderSaveSlots();
  $('modal-saveslots').classList.add('active');
}

function openLoadModal(){
  saveMode='load';
  $('saveslots-title').textContent='读档';
  renderSaveSlots();
  $('modal-saveslots').classList.add('active');
}

function closeSaveModal(){$('modal-saveslots').classList.remove('active')}

function renderSaveSlots(){
  const data=getAllSaves();
  const titles=['第一卷','第二卷','第三卷'];
  let html='<div class="save-slots">';
  for(let i=1;i<=MAX_SLOTS;i++){
    const save=data[i];
    if(save){
      const p=save.player;
      const sceneName=(SCENES[save.currentScene]||{}).name||save.currentScene;
      const titles_arr=['江湖新秀','初出茅庐','小有所成','武林好汉','一方豪杰','名震江湖','绝世高手','一代宗师'];
      const title=titles_arr[Math.min(p.level-1,titles_arr.length-1)]||'传说侠客';
      html+=`<div class="save-slot">
        <div class="save-slot-info">
          <div class="save-slot-title">${titles[i-1]} · ${esc(p.name)}</div>
          <div class="save-slot-detail">Lv.${p.level} ${title} | ${sceneName} | 💰${p.gold} | ❤${p.hp}/${p.maxHp}</div>
          <div class="save-slot-time">${save.time}</div>
        </div>
        <div class="save-slot-actions">
          ${saveMode==='save'?`<button class="save-slot-btn sv-save" onclick="event.stopPropagation();saveGame(${i})">覆盖</button>`:''}
          <button class="save-slot-btn sv-load" onclick="event.stopPropagation();doLoadSlot(${i})">读取</button>
          <button class="save-slot-btn sv-del" onclick="event.stopPropagation();if(confirm('确定删除档位${i}？'))deleteSave(${i})">删除</button>
        </div>
      </div>`;
    }else{
      html+=`<div class="save-slot">
        <div class="save-slot-info">
          <div class="save-slot-title">${titles[i-1]}</div>
          <div class="save-slot-empty">— 空档位 —</div>
        </div>
        <div class="save-slot-actions">
          ${saveMode==='save'?`<button class="save-slot-btn sv-save" onclick="event.stopPropagation();saveGame(${i})">存档</button>`:''}
        </div>
      </div>`;
    }
  }
  html+='</div>';
  $('saveslots-body').innerHTML=html;
}

function doLoadSlot(slot){
  if(loadGame(slot)){
    closeSaveModal();
    $('battle-screen').style.display='none';
    $('battle-log').innerHTML='';
    ['gameover-overlay','victory-overlay','levelup-overlay'].forEach(id=>$(id).classList.remove('active'));
    $('title-screen').style.display='none';
    $('game-screen').style.display='flex';
    updateUI();
    goScene(currentScene);
    showToast('读档成功','success');
    addLog('读取了存档','important');
  }
}

function loadAndContinue(){
  const latest=getLatestSave();
  if(!latest){showToast('没有找到存档','warn');return}
  if(loadGame(latest.slot)){
    $('title-screen').style.display='none';
    $('game-screen').style.display='flex';
    updateUI();
    goScene(currentScene);
    showToast('续写江湖 — 读档成功','success');
    addLog('续写江湖，读取存档成功','important');
  }
}

function checkContinueBtn(){
  if(hasAnySave())$('continue-btn').style.display='';
  else $('continue-btn').style.display='none';
}

function autoSave(){
  if(!player||!player.name)return;
  const data=getAllSaves();
  data['auto']=buildSaveData('auto');
  data['auto'].time=new Date().toLocaleString('zh-CN')+' [自动]';
  writeAllSaves(data);
}

// ======================= CHARACTER CREATION =======================
let selectedWeapon='';
let selectedDifficulty='normal';

function showCharacterCreation(){
  $('title-screen').style.display='none';
  $('char-create-screen').style.display='flex';
  $('char-name-input').value='';
  selectedWeapon='';
  selectedDifficulty='normal';
  ['weapon-sword','weapon-blade','weapon-hidden'].forEach(id=>$(id).classList.remove('selected'));
  $('diff-hard').classList.remove('selected');
  $('diff-normal').classList.add('selected');
  $('confirm-char-btn').disabled=true;
  $('char-name-input').focus();
}

function selectDifficulty(d){
  selectedDifficulty=d;
  $('diff-normal').classList.toggle('selected',d==='normal');
  $('diff-hard').classList.toggle('selected',d==='hard');
}

function backToTitle(){
  $('char-create-screen').style.display='none';
  $('title-screen').style.display='flex';
}

function selectWeapon(wtype){
  selectedWeapon=wtype;
  ['weapon-sword','weapon-blade','weapon-hidden'].forEach(id=>$(id).classList.remove('selected'));
  $('weapon-'+wtype).classList.add('selected');
  checkConfirmButton();
}

function checkConfirmButton(){
  const name=$('char-name-input').value.trim().replace(/[<>&"'`]/g,'');
  $('confirm-char-btn').disabled=!name||!selectedWeapon;
}

function confirmCharacter(){
  const name=$('char-name-input').value.trim().replace(/[<>&"'`]/g,'');
  if(!name||!selectedWeapon)return;
  
  $('char-create-screen').style.display='none';
  $('game-screen').style.display='flex';
  initPlayer(name,selectedWeapon);
  updateUI();
  addLog(`${name}踏入了江湖……`,'important');
  if(isHard())addLog('【血雨腥风】你选了一条难走的路。','important');
  goScene('town');
  // 起手功法也要弹窗告知（否则玩家根本不知道自己会什么）
  [gameFlags.startSkill1,gameFlags.startSkill2].forEach(sid=>{
    if(sid&&SKILLS[sid]){
      addLog('起手功法：'+SKILLS[sid].name,'skill');
      showItemPopup('skill',SKILLS[sid]);
    }
  });
}

// ======================= INIT =======================
function startGame(){
  showCharacterCreation();
}
function restartGame(){
  ['gameover-overlay','victory-overlay','levelup-overlay'].forEach(id=>$(id).classList.remove('active'));
  $('battle-screen').style.display='none';$('battle-log').innerHTML='';
  logEntries.length=0;
  $('game-screen').style.display='none';$('title-screen').style.display='flex';
  checkContinueBtn();
}

// Page init
checkContinueBtn();
</script>
</body>
</html>
